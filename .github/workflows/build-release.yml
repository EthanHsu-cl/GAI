name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r Scripts/requirements.txt
          pip install pyinstaller
      
      - name: Build macOS app
        working-directory: Scripts
        run: |
          pyinstaller --name "AI Video Suite" \
            --onedir \
            --windowed \
            --add-data "config:config" \
            --add-data "templates:templates" \
            --add-data "core:core" \
            --add-data "handlers:handlers" \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import yaml \
            --hidden-import gradio_client \
            --hidden-import cv2 \
            --hidden-import pillow_heif \
            --hidden-import wakepy \
            --hidden-import pptx \
            --hidden-import ruamel.yaml \
            --collect-data gradio_client \
            gui_app.py
      
      - name: Create zip archive
        working-directory: Scripts/dist
        run: |
          zip -r "AI-Video-Suite-macOS.zip" "AI Video Suite.app"
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Video-Suite-macOS
          path: Scripts/dist/AI-Video-Suite-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r Scripts/requirements.txt
          pip install pyinstaller
      
      - name: Build Windows exe
        working-directory: Scripts
        run: |
          pyinstaller --name "AI Video Suite" `
            --onefile `
            --windowed `
            --add-data "config;config" `
            --add-data "templates;templates" `
            --add-data "core;core" `
            --add-data "handlers;handlers" `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import yaml `
            --hidden-import gradio_client `
            --hidden-import cv2 `
            --hidden-import pillow_heif `
            --hidden-import wakepy `
            --hidden-import pptx `
            --hidden-import ruamel.yaml `
            --collect-data gradio_client `
            gui_app.py
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Video-Suite-Windows
          path: Scripts/dist/AI Video Suite.exe

  upload-release-assets:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: AI-Video-Suite-macOS
          path: ./artifacts
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AI-Video-Suite-Windows
          path: ./artifacts
      
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/AI-Video-Suite-macOS.zip
            ./artifacts/AI Video Suite.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
