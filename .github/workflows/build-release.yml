name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Scripts/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          cd Scripts
          pyinstaller GAI_Launcher.spec

      - name: Create release package
        run: |
          mkdir release
          copy Scripts\dist\GAI_Launcher.exe release\
          xcopy Scripts\config release\config\ /E /I
          xcopy Scripts\templates release\templates\ /E /I
          
      - name: Create ZIP archive
        run: |
          Compress-Archive -Path release\* -DestinationPath GAI_Launcher_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GAI_Launcher_Windows
          path: GAI_Launcher_Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Scripts/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          cd Scripts
          pyinstaller GAI_Launcher.spec

      - name: Create release package
        run: |
          mkdir -p release
          cp -R Scripts/dist/GAI_Launcher.app release/
          cp -R Scripts/config release/
          cp -R Scripts/templates release/

      - name: Create ZIP archive
        run: |
          cd release && zip -r ../GAI_Launcher_macOS.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GAI_Launcher_macOS
          path: GAI_Launcher_macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: GAI_Launcher_Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: GAI_Launcher_macOS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            GAI_Launcher_Windows.zip
            GAI_Launcher_macOS.zip
          body: |
            ## GAI Launcher Release
            
            ### Downloads
            - **Windows**: `GAI_Launcher_Windows.zip`
            - **macOS**: `GAI_Launcher_macOS.zip`
            
            ### Installation
            1. Download the appropriate zip file for your platform
            2. Extract the contents
            3. Run `GAI_Launcher.exe` (Windows) or `GAI_Launcher.app` (macOS)
            
            ### What's Included
            - GAI Launcher executable
            - Configuration files (`config/`)
            - PowerPoint templates (`templates/`)
            
            ### Requirements
            - Windows 10+ or macOS 11+
            - Network access for API calls
            - Media files at configured paths
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
