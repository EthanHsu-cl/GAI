name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          brew install libheif

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r Scripts/requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        working-directory: Scripts
        run: |
          pyinstaller --name "AI Video Suite" \
            --onedir \
            --windowed \
            --add-data "config:config" \
            --add-data "templates:templates" \
            --add-data "core:core" \
            --add-data "handlers:handlers" \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import yaml \
            --hidden-import gradio_client \
            --hidden-import cv2 \
            --hidden-import pillow_heif \
            --hidden-import wakepy \
            --hidden-import pptx \
            --hidden-import ruamel.yaml \
            --collect-data gradio_client \
            gui_app.py

      - name: Create zip archive
        working-directory: Scripts/dist
        run: |
          zip -r "AI-Video-Suite-macOS.zip" "AI Video Suite.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Video-Suite-macOS
          path: Scripts/dist/AI-Video-Suite-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r Scripts/requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        working-directory: Scripts
        shell: cmd
        run: |
          pyinstaller --name "AI Video Suite" --onefile --windowed --add-data "config;config" --add-data "templates;templates" --add-data "core;core" --add-data "handlers;handlers" --hidden-import PIL --hidden-import PIL.Image --hidden-import yaml --hidden-import gradio_client --hidden-import cv2 --hidden-import pillow_heif --hidden-import wakepy --hidden-import pptx --hidden-import ruamel.yaml --collect-data gradio_client gui_app.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Video-Suite-Windows
          path: Scripts/dist/AI Video Suite.exe

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag message
        id: tag_info
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          # Fetch the tag explicitly to ensure annotated tag data is available
          git fetch origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME" --force

          # Extract full annotated tag message, skip the subject (first line)
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$TAG_NAME")
          # Remove the first line (subject) to get just the body
          TAG_BODY=$(echo "$TAG_MESSAGE" | tail -n +2 | sed '/^$/N;/^\n$/d;s/^\n//')

          if [ -z "$TAG_BODY" ]; then
            # Fallback: use the full tag message including subject
            TAG_BODY="$TAG_MESSAGE"
          fi

          # Use EOF delimiter for multi-line output
          {
            echo "tag_body<<ENDOFTAGBODY"
            echo "$TAG_BODY"
            echo "ENDOFTAGBODY"
          } >> "$GITHUB_OUTPUT"

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: AI-Video-Suite-macOS
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: AI-Video-Suite-Windows
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_info.outputs.tag_name }}
          name: Release ${{ steps.tag_info.outputs.tag_name }}
          body: ${{ steps.tag_info.outputs.tag_body }}
          generate_release_notes: false
          files: |
            ./artifacts/AI-Video-Suite-macOS.zip
            ./artifacts/AI Video Suite.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
