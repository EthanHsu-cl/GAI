comments:
  pipeline: |
    For each source image, the handler runs up to three API calls:
      1. /on_generate_frame   (only if generate_start: true)
      2. /on_generate_frame_1 (only if generate_end: true)
      3. /on_generate_video   (always — uses whichever frames were produced)
    At least one of generate_start / generate_end must be true.

  prompts: |
    Each task may specify up to four prompts:
      - start_frame_prompt   – image gen prompt for the start frame
      - end_frame_prompt     – image gen prompt for the end   frame
      - video_prompt         – motion / scene prompt for the video model
      - video_negative_prompt – kept in metadata for traceability (not all video
                                services accept a negative prompt parameter)

  service_models: |
    service: one of [kling, wan, pixverse, google_veo, seedance]
    model values depend on service. For kling:
      - v2.6 (Kling 2.6)
      - v3   (Kling 3.0) — default
      - v2.5-turbo
      - v2.1
      - v2.0-master
      - v1.6
    Run /on_service_change is handled implicitly by passing matching service+model.

  frame_model: |
    Image-generation model used for /on_generate_frame and /on_generate_frame_1.
    Options:
      - flux-2-pro
      - flux-2-flex
      - gpt-image-2
      - gpt-image-1
      - kling-image-o1
      - kling-v3-omni
      - seedream-5-0-260128
      - gemini-2.5-flash-image
      - gemini-3-pro-image-preview (default)
      - gemini-3.1-flash-image-preview

  output_naming: |
    Videos:  {source_image_name}_{generation_number}.mp4
    Frames:  {source_image_name}_{generation_number}_{start|end}.png

  folder_structure: |
    root_folder/
    ├── {style_name}/
    │   ├── Source/             # Input images
    │   ├── Generated_Frames/   # {name}_{n}_start.png / {name}_{n}_end.png
    │   ├── Generated_Video/    # {name}_{n}.mp4
    │   └── Metadata/
