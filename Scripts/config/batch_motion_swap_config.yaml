comments:
  folder_structure: |
    Each task folder should have 'Source Image' and 'Source Video' subfolders.
    All subject images will be cross-matched with all motion reference videos
    (e.g., 3 images × 4 videos = 12 total generations).
  comparison: |
    Cross-API comparison mode (optional). When 'comparison_folders' is added at the
    top level, running `report` produces one side-by-side report instead of the
    normal one: the primary task folder (tasks[0].folder) plus each listed folder
    become labeled columns, sharing the same Source Image + Source Video. All folders
    must belong to the SAME family (image+video here) — mixing in an image-to-video
    or text-to-video folder stops the run with an error. Each column is auto-labeled
    from its metadata 'api_name'; override per folder with 'label'. Example:
      comparison:
        primary_label: ''
      comparison_folders:
        - folder: Media Files/DreamActor/0529 9 Style
          label: ''
        - folder: Media Files/Wan 2.2/0529 9 Style
