    prompt: |
      The subject should be a person, and their facial features, makeup,race, hairstyle, skin tone, and body proportions must be preserved to ensure consistency with the uploaded photo. The photo should be taken in a softly lit kitchen environment, employing the aesthetic style characteristic of Fujifilm—cool-toned sunlight, bright whites, soft, low-contrast shadows, clean highlights, and a subtle matte finish. The overall atmosphere should evoke a tranquil morning, with soft, transparent, and relaxing colors, similar to the style of Fujifilm Pro 400H or Fujifilm Reala film: pure whites, natural skin tones, soft cool tones in shadows, and dreamy halos around bright areas.​

      ​

      The kitchen island countertop uses white marble tiles to create a natural, warm, and inviting atmosphere, rather than an artificial one—open cabinet doors, mismatched plates, scattered cutlery, jars on the countertop, books and ingredients casually placed in the background, and a slightly messy island stained with chocolate. Melted chocolate stains, chocolate shavings, chocolate pieces, a spoon dipped in chocolate, a half-eaten chocolate bar, and an imperfect handmade chocolate cake—these elements intertwine to create a warm, everyday sense of chaos.​

      ​

      Her posture should be natural and relaxed, unrestrained, as if capturing a moment from her real life, rather than a deliberately posed half-body portrait. She might lean against a table, one hand supporting her cheek or chin, fingers casually holding a piece of chocolate, elegantly and enticingly licking it from her fingertips, or holding a piece of chocolate as if about to offer it to someone else; or perhaps, bathed in dreamy morning light, gazing tenderly at the camera, or gently pressing her palm or fingers to her cheek, creating a visual effect that makes her face appear more pitiful. Everything should appear natural and casual, with a touch of unrefined beauty.​

      ​

      The woman in the photo is wearing an off-the-shoulder white chiffon knit top with a tank top underneath, and skinny jeans (but her lower body is not visible because of the table in front of her), creating a charming, soft, and languid atmosphere.​

      ​

      The scene is serene and peaceful, with natural window light illuminating her face and highlighting the soft grain and subtle depth of field of the film. The overall image is warm and clean, both nostalgic and refreshing—like a genuine family photograph taken with Fujifilm, where sweetness, chocolate, and a languid sense of comfort intertwine to create a tranquil and cozy kitchen scene.​  
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
