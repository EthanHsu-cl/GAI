  - folder: ../Media Files/Nano Banana/0102 8 Styles/0102 浪漫邱比特天使 亞洲人
    model: gemini-2.5-flash-image
    resolution: 
    aspect_ratio: 
    prompt: |
      The subject should be the person in the uploaded photo, whose facial features, makeup, hairstyle, skin tone, and body proportions are completely identical to the uploaded photo.

      In a soft pink-toned studio, create a dreamlike, angelic portrait. The lighting should be bright yet soft, with slightly overexposed highlights, surrounding the subject to create a hazy, ethereal halo, like a dreamlike cosplay photo.

      The following two actions will occur randomly (one must appear, both must have a relaxed and natural feel, and must be a close-up or half-body shot):
      Only one Cupid bow and one Cupid arrow may exist in the scene. No duplicates are allowed.

      Action 1 (must be a close-up or half-body shot):

      She holds a delicate Cupid's bow in one hand, casually placed beside her lap. The bow is slender and white, adorned with delicate gold decorations, and the arrows match. Her posture is gentle and slightly shy: knees together, upper body relaxed, head slightly tilted, gaze softly at the camera.

      Action Two (must be a close-up or half-body shot):

      The subject leans forward, resting against a fallen white Roman column, her torso resting on the edge of the column's top, causing her shoulders, upper arms, and part of her chest to naturally sag.

      A heart-shaped arrow shaft rests on a Roman column base; the shaft must be made of white oak, and the arrowhead must be a solid red heart. The arrow itself is also red, resting steadily on the table, not suspended in mid-air. The model's head is slightly tilted, creating an elegant and soft three-quarter profile. One hand gently supports her chin, the knuckles relaxed and naturally curved, creating a soft perspective effect. Her gaze is calm and ethereal, looking directly at the camera.

      Her clothing must be: a light pink, super-short, puffy, off-the-shoulder dress. The bodice is a shapewear corset with steel support, a softly curved heart-shaped neckline edged with delicate lace, and thin straps. The skirt is a layered, light, pleated ballet tutu, flaring out around the hips and reaching the upper thighs. Made of sheer tulle and organza, it appears soft and translucent. A small, cute necklace or ribbon adorns her neck, adding to her doll-like sweetness. She wears white over-the-knee knit stockings with ribbed cuffs and soft fan-shaped lace trim, revealing her bare feet. The overall look should be sweet, girlish, and slightly Lolita-esque, rather than a simple long dress.

      Behind her are a pair of soft, layered white angel wings. A fluffy feathered angel halo adorns her head, forming a shimmering circle above and around her hair.

      These two movements will create the following background:

      Around her, three white doves must be fixed, flying at different distances and heights, wings outstretched. Some are close to the camera with slight motion blur, while others are in the distance, collectively outlining her figure. The background should be a clean, pastel gradient with no harsh edges, and the clouds at the base of the pillars should emit a soft glow.

      The overall image must convey the effect of a high-end, dreamy angelic portrait: soft pink tones, bright white, and a dreamlike atmosphere.
    reference_folder: ""
