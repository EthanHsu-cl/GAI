  - folder: ../Media Files/Nano Banana/0116 3 Styles CNY/0116 農曆年走春 四格 Male
    model: gemini-2.5-flash-image
    resolution: 
    aspect_ratio: "3:4" 
    prompt: |
      Use the uploaded person as the ONLY subject in all panels. Preserve the subject’s real face, facial features, identity, skin tone, hairstyle, expression, and body proportions EXACTLY as in the uploaded photo. Maintain a realistic photographic appearance with natural facial detail and texture. Do not change age or identity. No extra people may appear.

      Create a perfectly balanced 2×2 four-panel grid image. Panels are equal size and seamlessly stitched into one single image with NO borders, gaps, margins, dividers, or white lines—edge-to-edge continuous grid.

      Theme & setting: Create a four-panel outdoor springtime New Year photo series inspired by a traditional “zou chun” (spring outing) atmosphere. All four panels must feature the same subject and must clearly feel like they were captured at the same traditional courtyard location, with consistent environment, lighting direction, color tone, and overall mood. The scene takes place outdoors on a clear, sunny day in a traditional Taiwanese or Chinese courtyard setting. The environment includes red-toned walls, wooden pillars, tiled roof eaves, and open walkways. Natural sunlight creates warm highlights and soft shadows, producing a bright, gentle, and slightly nostalgic film-like tone suitable for New Year imagery. The atmosphere feels calm, elegant, and quietly festive rather than busy or playful.

      Four-panel composition rules:
      Top-left: Close-up. The subject is framed in a close-up portrait near a traditional building structure. The subject raises one hand upward and naturally holds a traditional Chinese knot ornament in the hand at slightly above eye level. The knot and its tassels hang downward in a realistic manner, following gravity naturally. The face remains clearly visible and softly lit by sunlight. The pose feels gentle and reflective, with a quiet sense of reaching rather than a dramatic gesture, maintaining a calm, everyday intimacy.

      Top-right: Close-up near a wooden pillar. The subject’s body is slightly sideways while facing the camera. The subject holds a single tanghulu skewer at chest to face level. The gaze is calm, steady, and composed, conveying quiet elegance. There must be only one candied hawthorn skewer.

      Bottom-left: Medium shot in the same courtyard environment. The subject is seated or resting naturally within the architectural space. Posture is relaxed and composed, framed by traditional structures. The moment feels grounded, still, and contemplative.

      Bottom-left: Close-up shot. The subject holds a traditional Chinese paper-cut (jianzhi) gently near the hands, interacting with it softly. The head may tilt slightly or the gaze soften, conveying warmth and serenity. In this panel only, the background must show a noticeable depth-of-field effect: the subject’s face and hands remain sharp, while parts of the background are softly blurred, creating a gentle, dreamy bokeh while preserving realistic detail and visible background outlines.

      Wardrobe (all panels): Red-toned New Year styling that is realistic, well-fitted, elegant, and modern (not costume-like).
      High-saturation pure red magua with refined embroidery, paired with a white knitted inner layer.
      All reds must remain stable, evenly saturated, and clearly red (not leaning orange).

      Lighting & color: Lighting must be entirely natural daylight with a warm, soft quality. Sunlight should feel diffused and gentle, wrapping softly around the subject rather than creating harsh contrast. Highlights should appear warm and luminous, shadows soft and gradual. The overall color grading should feel bright, warm, and slightly nostalgic, with a subtle film-like softness that enhances realism. Avoid artificial lighting, harsh contrast, overexposure, or modern cool-toned color grading.

      Final output: A realistic, cohesive four-panel photographic series that feels naturally captured in the same place and atmosphere, preserving identity without artifacts. The result should feel elegant, hopeful, and refined, evoking a classic New Year mood while remaining grounded in realism.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 4
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0116 3 Styles CNY/0116 農曆年四宮格-錦鯉 Female
    model: gemini-2.5-flash-image
    resolution: 
    aspect_ratio: "3:4" 
    prompt: |
      Please use the person in the uploaded photo as the sole subject of the image. The person's real face, features, identity, skin tone, hairstyle, and body proportions must be exactly the same as in the uploaded photo. Do not beautify, stylize, or alter the person's identity in any way.

      Please create a perfect 2x2 four-panel puzzle. All four puzzle pieces must be the same size and seamlessly joined; absolutely no white lines, borders, gaps, or spacing are allowed; please maintain the continuity of the puzzle.

      The top right and bottom left corners of the puzzle must be close-ups, and the top left and bottom right corners must be full-body shots. The composition and poses of the four puzzle pieces must be completely different. The poses should be elegant and natural (avoid being too stiff; unnatural body movements and unnecessary gestures are prohibited).

      The background style should be bright and refined: soft sunlight (warm tones, not yellow tones) fixed on the left, with a slight (5%) underwater light effect on the floor, and overall simple lighting. All photos should be taken in the same minimalist-style studio.

      Key requirements for koi fish photos: Each of the four photos must feature exactly two koi fish (no more, no fewer, no more, and the Koi fish should NEVER be too large.Each frame must occupy no more than 30% of the screen area.). These two koi fish must be artistic and stylized, not realistic: translucent red koi with flowing, graceful fins, light as silk/veil, presenting a dreamlike, painterly quality. The fins should have a soft motion blur effect, creating a slightly surreal, "floating in the air" fashion art effect.

      The koi fish must not obscure the subject's face, eyes, nose, or mouth, and in each photo, there must be at least one face width between the koi fish and the subject's face. The proportion and relative spatial relationship of the koi fish must remain consistent across all four photos.

      At least one of the two koi fish in EACH photo must be clearly positioned IN FRONT OF the model in the foreground (closer to the camera than the model), or actively interacting with the model’s body space (such as swimming across the torso line, passing in front of the arms, drifting near the waist or skirt area, or visually overlapping the foreground space), creating a strong depth relationship and interaction.  

      The second koi fish may appear slightly behind or beside the model to create layered depth, but BOTH koi fish must remain clearly visible and artistically balanced. 

      The model wears a deep red sleeveless long dress with a simple, fitted bodice and smooth, matte satin fabric. The skirt slightly trails on the floor and has a slit. She pairs it with a light, flowing red chiffon/organza scarf, the skirt swaying in the wind, creating an elegant and natural look, like a fashion magazine spread.

      The overall style is simple and bright, like a magazine spread, featuring only two stylized koi fish. All four sections must show the characters' faces; scenes without heads are prohibited.
