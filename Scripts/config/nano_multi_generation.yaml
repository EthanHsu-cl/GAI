tasks:
  - folder: ../Media Files/Nano Banana/0127 Pixel FoodV2
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: 
    prompt: |
      Use the uploaded photo as the ONLY reference and the ONLY human subject.
      The person’s real identity must be strictly preserved.

      Do NOT alter the face, facial features, face shape, eyes, nose, mouth, skin tone, expression, hairstyle, age appearance, body proportions, pose, or camera angle in any way.
      No beautification, stylization, cartoonization, or facial reinterpretation is allowed.

      Output format (ABSOLUTE)

      The final image must keep EXACTLY the same aspect ratio as the user’s uploaded photo.

      Do NOT crop, extend, pad, stretch, zoom, or reframe the image.

      The original framing, field of view, and composition must remain unchanged.

      Target transformation — FOOD OBJECTS ONLY (MANDATORY, GLOBAL)

      All visible food items in the image MUST be transformed into pixel art.

      This includes ALL of the following without exception:

      Food held in the left hand

      Food held in the right hand

      Food placed on forks, spoons, chopsticks, knives

      Food placed on plates, bowls, trays, or table surfaces

      Food currently being bitten, lifted, or partially eaten

      Partial or selective transformation is NOT allowed.
      If food appears in multiple locations, ALL instances must be pixelized.

      Do NOT select a single primary food object.
      Food transformation must be global and exhaustive across the entire image.

      Pixel art style requirements (OBJECT-ONLY, STRICT)

      All food items must be rendered as 32-bit style pixel art

      Clearly visible chunky square pixels (approximately 32px blocks)

      Flat, solid color blocks ONLY

      NO blur

      NO gradients

      NO outlines

      NO anti-aliasing

      NO glow, haze, translucency, or painterly effects

      Pixel food must resemble simplified retro game sprites, NOT illustrations or filters.

      Shape preservation (CRITICAL)

      Preserve the original food shape, volume, silhouette, and structure EXACTLY

      Do NOT redesign, simplify, exaggerate, round, or reinterpret food forms

      Pixelization must follow the exact contours and proportions of the source food

      Pixel art is a resolution translation, NOT a redesign

      Integration & realism (SHADOW & OCCLUSION CONTROL)

      Pixel food must remain in the exact original position, scale, orientation, and perspective

      Maintain original composition, depth, and camera angle

      Lighting and shadow rules:

      Pixel food may cast shadows ONLY if they are hard-edged and fully opaque

      NO semi-transparent shadows

      NO soft or feathered shadows

      Shadow direction and footprint must match the original lighting

      Pixel objects must appear physically embedded into the real scene.

      Photorealism lock (NON-NEGOTIABLE)

      All non-food elements must remain 100% photorealistic and untouched, including:

      Human face, skin, hands, body

      Clothing and accessories

      Tableware (plates, bowls, cups, utensils themselves)

      Furniture, background, and environment

      Hard prohibitions

      Do NOT pixelate hands, fingers, utensils, plates, bowls, or containers

      Do NOT pixelate clothing, face, hair, or background

      Do NOT introduce new objects

      Do NOT remove existing objects

      Do NOT alter facial expression or identity under any circumstance

      Final validation rule

      The final image must look like a realistic photograph in which EVERY visible food item has been fully replaced with clean, opaque, retro pixel art, while ALL other elements remain untouched and photorealistic, and the original photo’s aspect ratio is perfectly preserved.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 1
    max_images: 3
    num_iterations: 50


# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (images can be reused)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: false
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
