    model: gemini-2.5-flash-image
    resolution: 
    aspect_ratio: "3:4"
    prompt: |
      Use the uploaded person as the ONLY subject in all panels. Preserve the subject’s real face, facial features, identity, skin tone, hairstyle, expression, and body proportions EXACTLY as in the uploaded photo. Do NOT beautify, stylize, or alter identity. No extra people.

      Create a perfectly balanced 2×2 four-panel grid image. Panels are equal size and seamlessly stitched into one single image with NO borders, gaps, margins, dividers, or white lines—edge-to-edge continuous grid.

      Theme & setting:
      Create a four-panel outdoor springtime New Year photo series inspired by a traditional “zou chun” (spring outing) atmosphere. All four panels must feature the same subject and must clearly feel like they were captured consecutively at the same traditional courtyard location, with consistent lighting, environment, color tone, and mood. The scene takes place outdoors on a clear, sunny day in a traditional Taiwanese or Chinese courtyard setting. The environment includes red-toned walls, wooden pillars, tiled roof eaves, and open walkways. Natural sunlight creates warm highlights and soft shadows, producing a bright, gentle, and slightly vintage film-like tone suitable for New Year imagery. The atmosphere feels calm, elegant, and quietly festive rather than busy or playful.

      Panel directions:
      1)The subject is framed in a close-up portrait near a traditional building structure. The subject raises one hand upward, clearly gripping the hanging loop / top cord of a traditional Chinese knot ornament charm between the fingers, holding it slightly above eye level. The Chinese knot charm hangs naturally downward from the loop, fully affected by gravity, with the decorative body and tassels visibly dangling below the hand—not floating, not suspended in midair, and not detached from the hand. The face remains clearly visible, softly lit by sunlight. The pose feels gentle and reflective, with a quiet sense of reaching toward light rather than posing dramatically, maintaining a calm, everyday intimacy.
      2) Close-up (Tanghulu): Close-up near a pillar. Body sideways facing the camera.Hold a tanghulu at chest/face level. Calm, steady gaze; composed and elegant.There must be only one candied hawthorn skewer.
      3) Medium shot (resting): Medium shot in the same courtyard. Seated or resting naturally. Relaxed, composed posture; architecture frames the subject. Quiet, grounded moment.
      4) Close-up (Chinese paper-cut): Close-up. Hold a traditional Chinese paper-cut (jianzhi) near the hands, interacting softly. Slight head tilt or softened gaze; gentle, warm, serene. In the fourth image alone, the background must be partially blurred and have a strong depth-of-field effect.The character's face and hands remain clear, while some background elements are partially out of focus, creating a soft and dreamy bokeh effect without sacrificing realism.realism.The outline is still visible in the background.

      Wardrobe (all panels):
      Red-toned New Year styling, realistic and well-fitted, elegant and modern (not costume-like). 
      Female: high-saturation pure red qipao with subtle same-tone embroidery + white shawl.
      Male: high-saturation pure red magua with refined embroidery + white knitted inner layer.
      All reds must be stable, evenly saturated, and clearly red (not orange-leaning).

      Lighting & color:
      Lighting must be entirely natural daylight, with a noticeably warm and soft quality. Sunlight should appear diffused and gentle, wrapping softly around the subject’s face and surroundings rather than creating harsh contrast. Highlights should feel warm and luminous, shadows soft and gradual, enhancing a bright yet comfortable visual experience. The overall color grading should be bright, warm, and slightly nostalgic, with a subtle vintage film softness that feels refined and airy. The image should evoke a classic New Year mood—radiant, hopeful, and elegant—without losing clarity or realism. Avoid artificial lighting, harsh contrast, overexposure, or modern cool tones.

      Final output:
      Realistic, cohesive, naturally photographed four-panel series with consistent time/place/mood, preserving identity with no artifacts.
