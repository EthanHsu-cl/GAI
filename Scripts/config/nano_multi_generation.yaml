tasks:
  - folder: ../Media Files/Nano Banana/0109 2 Styles/0109 Younger & Older Me v1
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "16:9"
    prompt: |
      Using the provided photo as an identity reference, generate a horizontal three-panel collage.

      From LEFT to RIGHT, the three images represent the SAME PERSON at different life stages:
      - Left panel: approximately 5 years old
      - Middle panel: present age (must closely match the original reference image)
      - Right panel: approximately 60 years old

      Do NOT generate different individuals.

      ====================
      GLOBAL FRAMING & COMPOSITION RULE (CRITICAL)
      ====================
      - All three panels MUST use the same framing distance and crop level
      - The subject size relative to the frame must be consistent across all panels
      - Choose ONE framing style and apply it to all three images:
        - Either all full-body shots
        - Or all half-body / upper-body shots
      - Do NOT mix full-body and half-body framing
      - Camera distance, perspective, and zoom level must remain visually consistent

      ====================
      GLOBAL IDENTITY RULES
      ====================
      - The middle panel is the primary identity anchor and must closely match the original reference image
      - Facial structure, feature spacing, ethnicity, and gender must remain consistent across all panels
      - Avoid generic age templates for both children and elderly
      - Background and lighting should remain visually similar

      ====================
      LEFT PANEL – AGE 5 (CHILD)
      ====================
      - Depict the same person as a realistic 5-year-old child
      - The child’s face MUST be derived from the original facial structure
      - Preserve eye shape, eye spacing, nose shape, mouth shape, and overall facial proportions
      - Avoid generic or stereotypical child faces

      - The body should clearly reflect a child’s age:
        - Smaller stature
        - Narrower shoulders
        - Childlike body proportions
      - Pose and clothing do not need to be identical, but must be natural for a child
      - The child must feel like a younger version of the same person, not a different child

      ====================
      MIDDLE PANEL – PRESENT (REFERENCE)
      ====================
      - Must closely match the original reference image
      - Serves as the identity, scale, and framing reference
      - No aging or de-aging effects should be applied

      ====================
      RIGHT PANEL – AGE 60 (ELDERLY)
      ====================
      - Depict the same person at approximately 60 years old
      - The elderly face MUST be an aged transformation of the original face, not a generic elderly face
      - Preserve:
        - Eye shape and spacing
        - Nose bridge and tip shape
        - Mouth width and lip shape
        - Jawline and face contour (with natural aging softness)

      - Apply aging as deformation, not replacement:
        - Wrinkles follow the original facial structure
        - Skin aging respects bone structure
        - Facial proportions remain recognizable

      - The body should reflect natural aging:
        - Softer contours
        - Reduced muscle tone
        - Age-appropriate posture

      - Pose and clothing should be natural for an older adult

      ====================
      FINAL CONSISTENCY CHECK
      ====================
      - All three panels must look like the same person photographed at different ages
      - Framing distance must feel identical across panels
      - Facial similarity must remain high in both child and elderly versions
      - If results should look intentional and coherent, not like three unrelated photos


    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
    num_iterations: 50

