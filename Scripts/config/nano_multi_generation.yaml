tasks:
  - folder: ../Media Files/Nano Banana/0129 賀年斗方情境圖V3
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:5"
    prompt: |
      Create ONE single photorealistic Lunar New Year “斗方” using the uploaded image
      (any subject type: person, baby, pet, or group photo).

      The result must look like a real New Year photograph,
      NOT an illustration, collage, or graphic mockup.

      ==================================================
      ASPECT RATIO
      ==================================================

      Final image must be vertical 4:5.

      ==================================================
      MANDATORY SUBJECT INCLUSION (CRITICAL – NO EXCEPTIONS)
      ==================================================

      ALL people and/or pets present in the uploaded image MUST be included in the final design.

      No person or pet may be omitted, removed, cropped out, replaced, or substituted.

      If the uploaded image contains multiple people and/or pets:
      - Every individual must appear together within the SAME single 斗方.
      - Partial inclusion is strictly prohibited.

      Do NOT generate additional people or animals.

      All subjects must remain recognizable and clearly identifiable,
      preserving their key features and identity.

      ==================================================
      STRICT COMPOSITION RULES
      ==================================================

      The image must contain ONLY ONE 斗方.

      The 斗方 must be slightly smaller than typical center decorations,
      leaving visible surrounding space.

      The 斗方 must be centered but not oversized or edge-to-edge.

      ==================================================
      PLACEMENT SCENE
      ==================================================

      Choose ONE scene only:
      - A traditional or modern dark wooden door
      - A clean white wall

      If placed on a wooden door:
      - The 斗方 is centered on the door.
      - Hang traditional Lunar New Year firecracker decorations (鞭炮串)
        vertically on BOTH the left and right sides of the door.
      - Firecrackers must be festive, red-dominant, and clearly visible.
      - Firecrackers must NOT overlap, cover, or block the 斗方.

      ==================================================
      DESIGN, COLOR & ILLUSTRATION STYLE (DOUFANG ONLY)
      ==================================================

      The 斗方 must be square (1:1) and rotated 45 degrees (diamond orientation).

      Base color must be predominantly RED.
      Gold is accent color only (text, patterns, highlights).

      Avoid pale, beige, pink, or non-festive base colors.

      The CONTENT inside the 斗方 must be rendered in an illustration style:
      - Flat to softly shaded illustration
      - Clean edges and stylized linework
      - No photorealistic textures within the printed artwork

      ==================================================
      CONTENT
      ==================================================

      Preserve the identity and key features of ALL uploaded subjects.

      Include ONE main Chinese New Year character or phrase (e.g. 福, 春, 財).
      The year “2026” must appear.

      Include several Lunar New Year decorative elements such as:
      pineapple, gold ingots, 财神, festive clouds, coins, or firecrackers.

      Decorative elements must support the design,
      and must NOT dominate, replace, or obscure the 斗方 or the subjects.

      ==================================================
      PHYSICAL PAPER & REALISM (CRITICAL)
      ==================================================

      The 斗方 must appear as real printed paper physically pasted onto the surface,
      even though the printed artwork itself is illustrated.

      - The paper must be completely flat and firmly attached.
      - NO lifted corners, peeling edges, curling, folds, wrinkles, waves, or deformation.
      - The surface must remain smooth, rigid, and planar.

      The 斗方 must NOT appear as a digital overlay, sticker,
      or post-processed pasted element.

      ==================================================
      LIGHTING & ENVIRONMENT INTEGRATION
      ==================================================

      The 斗方 must naturally integrate with the surrounding environment lighting.

      - It must receive the SAME light direction, intensity, and color temperature
        as the door or wall.
      - Shadows, highlights, and midtones on the paper
        must match the ambient lighting of the scene.
      - Subtle contact shadows must appear where the paper meets the surface.

      The 斗方 must NOT look glowing, floating,
      or separately lit from the environment.

      ==================================================
      FINAL GOAL
      ==================================================

      A realistic vertical 4:5 Lunar New Year photograph showing
      ONE single red-based illustrated 斗方,
      naturally and flatly pasted onto a door or wall,
      with ALL uploaded people and/or pets fully included,
      balanced festive decorations,
      correct lighting integration,
      and a joyful, traditional atmosphere.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    use_deterministic_random: true
    random_seed: 42
    min_images: 1
    max_images: 3
    num_iterations: 50


# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (images can be reused)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: false
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
