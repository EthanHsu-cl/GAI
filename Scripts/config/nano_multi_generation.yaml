      Using the uploaded photo of the person as the primary subject, preserve their facial features, makeup, hairstyle, skin tone, and body proportions, ensuring complete consistency with the uploaded image.

      Transform it into a cinematic close-up portrait inspired by lifestyle photography.

      She lies on a soft, neutral-colored sofa, without any blankets.

      Her hair falls naturally in soft waves, and a few fresh cherries or strawberries (arranged randomly, but only one type of fruit at a time) are casually scattered around her, seemingly effortless and harmoniously natural. Three hands or illogical poses are strictly prohibited.

      She wears a white spaghetti strap dress—simple yet elegant—that gleams softly in the sunlight. The V-neck and thin straps accentuate her beautiful shoulders and collarbones.

      Her pose is relaxed and natural: she leans back, holding fruit near her nose, blinking only one eye, a warm, playful smile on her lips, or gazing captivatingly at the camera; or one hand holds fruit (fresh cherries or strawberries, randomly selected, but only one type at a time), the other resting naturally—all her movements are relaxed and natural.

      The lighting is soft and diffused, simulating natural window light shining from above at approximately a 45° angle. The color temperature is approximately 5200K, creating a clean, bright, sunny atmosphere, leaving soft highlights on her skin and hair. The overall tone should remain bright and fresh, with natural shadow transitions.

      Use a medium-close-up composition (approximately from head to chest), with an equivalent focal length of 50-85mm and an aperture of f/1.8-f/2.2, emphasizing eye contact, hair texture, and the natural glow of her skin.

      The final atmosphere should showcase the elegant temperament of a modern woman—fresh, romantic, and naturally radiant—like a magazine spread shot in the morning light.
