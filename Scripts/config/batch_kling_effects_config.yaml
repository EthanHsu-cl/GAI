# Kling Video Effects Configuration
# Applies premade video effects to images using the Kling API

testbed: http://192.168.31.161/external-testbed/kling/
template_path: templates/I2V templates 3rd party.pptx

# Global settings (can be overridden per task)
duration: 5

output:
  directory: /Users/ethanhsu/Desktop/EthanHsu-cl/GAI/Report
  group_tasks_by: 4

schedule:
  start_time: ''
  comment: 'Time format: HH:MM (24-hour format). Leave empty to start immediately'

base_folder: Media Files/Kling Effects/0612 4 Effects

design_link: https://docs.google.com/spreadsheets/d/18pNGtPzinObrhQt4aiLkyCRLTULZwQDHk7wlobe8FKI/edit?gid=1225550147#gid=1225550147
provider_reference_link: https://app.klingai.com/global/dev/document-api/quickStart/productIntroduction/effectsCenter
source_video_link: https://cyberlinkcorp-my.sharepoint.com/:f:/g/personal/onedrive_qa1_cyberlink_com/IgAuKZ6W95glT4F1E4vx78euAbRzq29GDHcETV9s8R7V-3c?e=GqahUY

# Tasks - each represents a style/effect to apply
# Effect selection per task:
# - Use 'effect' to select from preset effects (see effect_options below)
# - Use 'custom_effect' to specify a custom effect name (has priority over 'effect')
# The effect name (custom_effect or effect) is used as the subfolder name in base_folder
tasks:
  - effect:
    custom_effect: 'swish_swish'
  - effect:
    custom_effect: 'shush_my_dreams'
  - effect:
    custom_effect: 'skateskate'
  - effect:
    custom_effect: 'snowboarding'

comments:
  base_folder: |
    Root folder containing effect subfolders. Each effect folder should have 
    'Source', 'Generated_Video', and 'Metadata' subfolders.
    Folder names should match the effect or custom_effect name.
  effect: |
    Preset effect from the available options (see effect_options list).
    Used as folder name if custom_effect is empty.
  custom_effect: |
    Custom effect name that takes priority over the preset 'effect' option.
    Also used as the folder name when specified.
    Use for new/unreleased effects or custom named effects.
  duration: |
    Video duration in seconds.
    Options: 5, 10
    Default: 5 (global setting)
  output_group_tasks_by: |
    Set to 0 (or omit) to create individual reports per task. 
    Set to N to group N tasks into one combined report.
  design_link: |
    URL to design reference document or effect list.
    Used for report generation.
  source_video_link: |
    URL to source files location (e.g., OneDrive folder).
    Used for report generation.
  schedule: |
    start_time: HH:MM (24-hour format). Leave empty to start immediately.
    Allows delayed start for batch processing.
  folder_structure: |
    Expected structure:
    base_folder/
    ├── effect_name_1/
    │   ├── Source/
    │   │   └── image.jpg
    │   ├── Generated_Video/  (created automatically)
    │   └── Metadata/  (created automatically)
    └── effect_name_2/
        └── ...
