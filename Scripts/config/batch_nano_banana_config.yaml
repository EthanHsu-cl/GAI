tasks:
  - folder: ../Media Files/Nano Banana/1212 1 Style/1212 Pizza盒
    model: gemini-2.5-flash-image
    prompt: |
      Use the uploaded female subject as the only person in the image. Her real face, facial features, hairstyle, expression, makeup, skin texture, and identity must remain exactly the same as in the uploaded photo. Do not beautify, stylize, or alter her appearance in any way. No extra people may appear.

      Create a warm, intimate indoor scene where the subject holds an open pizza box close to the camera. The pizza box should be positioned beside her face, clearly visible within the frame. The inside of the pizza box lid must have handwriting that reads “CHEERS TO NEW BEGINNINGS❤️
      ,” written using lipstick so the strokes appear creamy, slightly smudged, and vivid, as if drawn directly onto cardboard with lipstick. Inside the box, place a pizza with a single small candle inserted on top, softly glowing and contributing to the warm celebratory mood.

      The subject should wear a white spaghetti-strap top with a bright, vibrant red knit cardigan layered loosely over it. Her outfit must appear natural, textured, and correctly fitted, matching realistic fabric behavior and her body proportions.

      The lighting should feel as if the room itself is dark, with a single strong warm spotlight shining directly on the subject and the pizza box. This warm, focused light should illuminate her face and the pizza box intensely from the front, creating a dramatic contrast with the darker room. Because the light source is strong and frontal, the background must show a clean white wall with a noticeable soft shadow cast behind the subject. The lighting should maintain a cozy, intimate, slightly nostalgic atmosphere, with warm highlights on both her face and the open pizza box lid.

      The camera distance should be very close, focusing mainly on the subject’s face and the pizza box she is holding. Her pose should feel natural, friendly, and slightly playful, with a warm expression. The framing must clearly show her illuminated face, the lipstick-written message on the box lid, and the pizza with its candle.

      The final image must look realistic, cohesive, and warmly lit, preserving the subject’s true identity while creating a charming New Year–themed photo in a cozy indoor setting with strong frontal warm lighting.
    reference_folder: ""
    use_comparison_template: false
    use_multi_image: false

# Comments and documentation
