tasks:
  - folder: ../Media Files/Nano Banana/0102 4 Styles/0102 My Favorite Wine Beer
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Create a photorealistic portrait using:
      (1) the uploaded person photo
      (2) the uploaded liquor bottle photo.

      SCENE TARGET
      Rebuild the entire image as if it was photographed inside a warm, premium wooden bar.
      The person and the giant bottle must stay in a standing pose on the floor, side by side, interacting naturally.
      Do NOT place the bottle on a table. Do NOT move the person to a different pose.

      STRICT FACE & OUTFIT PRESERVATION
      • Keep the person’s face EXACTLY as in the uploaded photo: same features, skin texture, expression, hairstyle.
      • Do NOT beautify or reinterpret the face.
      • Keep the exact same clothing and accessories.
      • Do NOT change the person’s pose from the original standing posture.

      BODY PROPORTION ENHANCEMENT (SUBTLE, ALLOWED)
      • Slightly lengthen ONLY the lower body (legs) to improve overall visual balance.
      • Target a natural 4:6 body ratio (longer legs, shorter torso).
      • Do NOT change the feet position, arm position, or interaction with the bottle.
      • Upper body (head, shoulders, torso) must remain identical in shape and pose.

      ABSOLUTE COMPOSITION RULES (DO NOT CHANGE)
      • The person must remain standing beside the bottle.
      • The person’s arm must rest on or lightly touch the top/side of the bottle.
      • The bottle must stay on the floor, NOT on a table or counter.
      • No repositioning of the person or bottle.
      • No replacing the interaction pose.

      PROPORTION & FRAMING
      • The person and the giant bottle should appear slightly smaller than earlier versions.
      • They should occupy roughly 50–60% of the central area of the frame.
      • Maintain full-body framing with feet visible.

      BOTTLE RECREATION
      • Recreate the liquor bottle as a giant glass bottle.
      • Keep shape and material accurate: transparency, reflections, refractions, internal liquid depth.
      • Rewrite label text with placeholder characters in a similar style.
      • Ensure the bottle is physically integrated into the scene with correct shadows and reflections.

      LIGHTING & SHADOW INTEGRATION
      • Match lighting direction and color temperature to the bar environment.
      • Apply realistic soft shadows under both the person and the bottle.
      • Ensure the bottle reflects warm bar lights and the person receives matching ambient light.
      • Absolutely no cutout or collage appearance.

      BACKGROUND
      • Premium wooden bar interior, warm lights, shelves with liquor bottles.
      • Slight depth-of-field but still realistic.

      PHOTO STYLE
      • Eye-level camera angle, full-body portrait.
      • Natural skin texture, true fabric detail, realistic glass rendering.
      • No CGI look or reshaping other than the subtle leg-length refinement.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false

