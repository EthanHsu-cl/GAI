  - folder: ../Media Files/Nano Banana/0204 4 Styles Creative Studio/0204 夜櫻微光
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Cinematic night photography, 3/4 side profile of a subject gazing upward, wearing a school-inspired outfit: a white button-up shirt, a deep burgundy tie, and a dark navy blue knit sweater. The subject holds a clear transparent umbrella covered in glistening raindrops. A powerful, hazy warm-white backlight (3000K) originates from behind the umbrella, creating intense halation and soft-glow diffusion that blurs the subject's edges.
      The frame is filled with a chaotic and dense arrangement of cherry blossoms: massive out-of-focus floral clusters in the extreme foreground, layered branches in the midground, and a continuous rain of falling petals with varied motion blur. Multiple translucent circular lens flares, rainbow-edged ghosting, and large soft bokeh discs are scattered asymmetrically, overlapping with the petals and the umbrella to create a messy, dreamlike depth.
      The image is intentionally not over-sharpened, featuring 35mm film grain, subtle optical imperfections, and a soft-focus aesthetic. The background is a solid deep black void, emphasizing the contrast between the warm-white light spill and the dark navy clothing. High visual density, atmospheric mist, ethereal and fleeting. --ar 3:4 --stylize 300 --v 6.0
