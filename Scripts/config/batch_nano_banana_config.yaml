    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:5"
    prompt: |
      MODEL: Gemini 3 / Banana Pro

      CRITICAL FACE ID LOCK — HIGHEST PRIORITY:
      Use the uploaded photos as absolute identity references.
      Each person’s face must remain IDENTICAL to the uploaded photo.

      DO NOT change, adjust, enhance, beautify, idealize, stylize, or reinterpret:
      – face shape
      – facial proportions
      – eye shape, size, spacing, or eyelids
      – eyebrow shape or thickness
      – nose size, bridge, or tip
      – mouth shape, lip thickness, or smile curve
      – jawline, chin, cheekbones
      – skin texture or skin tone
      – age appearance

      NO AI beauty face.
      NO average face.
      NO “more attractive” face.
      NO similar-looking person.
      NO celebrity resemblance.

      If the generated face does not look like the SAME REAL PERSON from the uploaded photo, the result is INVALID.

      The face must look like the exact same person photographed again in a studio,
      not a reinterpretation, not an illustration, not an idealized version.

      ────────────────────────

      Use the uploaded user photos as the ONLY subjects in the image.
      The number of people in the final image must exactly match the number of uploaded photos (1–4 people only).
      No extra people. No merged identities.

      SCENE & BACKGROUND:
      A professional studio photoshoot with a clean, seamless light grey to off-white background.
      Background must be plain, smooth, and minimal.

      OUTFITS (STRICT):
      – All subjects wear solid red knit sweaters (no logos, no patterns).
      – Bottoms are pure white only:
        – Adults: white trousers or white skirts
        – Children: white skirts or white shorts
      – Shoes: white or red only.
      No other colors allowed.

      POSE & MOOD:
      Avoid stiff standing poses.
      Subjects should appear lively and natural:
      – slight leaning toward each other
      – relaxed arms
      – gentle body angles
      – playful, warm family interaction
      The mood should feel joyful, festive, and candid.

      PROP — CHINESE CHARACTER:
      All subjects hold one oversized red Chinese character “好”.
      – Physical prop only (foam board or cardboard)
      – Color: festive red
      – Typography: traditional calligraphy similar to 凝書體
      – Thick, rounded brush strokes
      – Handcrafted, friendly feeling
      – Not geometric, not modern, not sharp

      HAND-DRAWN DECORATIONS:
      Add cute hand-drawn doodles similar to the reference image:
      – Handwritten “Happy New Year”
      – Small hand-drawn flowers and simple festive icons
      – Childlike, playful, hand-sketched style
      – Decorations must NOT cover faces or distort bodies

      LIGHTING & CAMERA:
      Soft, even studio lighting.
      No harsh shadows.
      Eye-level camera.
      High resolution, sharp focus.
      Clean commercial photography.

      FINAL FACE CHECK (MANDATORY):
      Before finalizing the image, verify:
      – Faces match the uploaded photos exactly
      – Identity is immediately recognizable
      If not, regenerate until identity matches.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
