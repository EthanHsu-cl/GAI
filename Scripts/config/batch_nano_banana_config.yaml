  - folder: ../Media Files/Nano Banana/1222 5 Styles/1222 日系自然照片 女生送巧克力-兩公格
    model: gemini-2.5-flash-image
    resolution: 
    aspect_ratio: 
    prompt: |
      The artwork will be presented as a diptych vertical collage (overall aspect ratio 3:4, single panel aspect ratio 4:3).

      The subject's face shape, hairstyle, and skin tone must be exactly the same as the uploaded photograph; no modifications or stylization are allowed. The subject's face shape, features, skin tone, hairstyle, makeup, and body proportions must not be altered.

      The scene will be processed into a soft-focus, cinematic close-up portrait, taken in natural morning light.

      The subject is positioned around a wooden table, surrounded by fruit, various chocolates, and chocolate-making ingredients (the fruit will be randomly selected: cherries or strawberries—only one type of fruit can appear in the frame at a time). Sunlight streams in from a nearby window, casting a warm, soft, honey-gold glow.

      The model's hair is tied in a slightly messy side ponytail at the nape of her neck, with a few stray strands falling on either side of her face (this step is unnecessary if the model has short hair). A small red bow is pinned near her left temple, the end of which is slightly upturned and sparkles in the light.

      The poses and actions of the figures in the top and bottom images must be 95% different. Both must wear white off-the-shoulder tops to create a romantic and warm atmosphere. (One type of fruit will appear randomly in the image: cherry or strawberry – only one is needed):

      Top Image: The model sits at a table, gently holding a fruit. Her gaze is alluring as she looks at the camera. Fruit is scattered in the background.

      Bottom Image: Close-up shot. The model leans slightly forward, her chin resting on the table, looking directly at the camera with a curious, dreamy, and intimate expression. Fruit is scattered on the table.

      A third hand or any uncoordinated human movements, hands, or limbs are prohibited in the image; they must conform to human anatomy. This composition captures the subtle atmosphere between tranquility and intimacy. Natural, soft lighting, with a color temperature of approximately 4200-4600K, illuminates from a low angle of 30° on the left, casting soft shadows and halos on the cheeks and fruit. Soft highlights give the entire image a nostalgic film-like quality.

      The background should be softly blurred; the image should primarily feature natural wood tones, white linen napkins, and scattered fruit, with touches of red adding a bright accent. The overall color scheme blends soft beige, warm ivory, cherry red, and amber gold, creating a gentle afternoon glow reminiscent of vintage Japanese magazine portrait photography.
