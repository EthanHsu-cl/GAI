  - folder: ../Media Files/Nano Banana/0115 6 Styles CNY/0115 火鍋全家福
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:3"
    prompt: |
      Create one single 3:4 vertical image (NOT a collage, NOT a multi-panel image).

      Scene setup:
      Lunar New Year reunion dinner. Solid red background. Red tablecloth.
      A traditional hot pot placed at the center of the table, with dumplings and fruits arranged naturally around it.

      Background detail (IMPORTANT):
      On the red background, include one traditional Chinese calligraphy artwork (framed plaque or hanging scroll style, festive and elegant).
      The calligraphy must clearly and correctly display the four Chinese characters: 「恭賀新禧」.
      Brush-style calligraphy only.
      Do NOT add any other text, logos, seals, watermarks, or branding.

      Camera & framing (STRICT):
      Camera at eye level.
      Frame must be tightly and cleanly composed.
      Do NOT show the ceiling.
      Do NOT show any lighting equipment.
      Do NOT show lamps, softboxes, light panels, reflectors, rigs, cables, or studio gear.
      Do NOT include behind-the-scenes elements.
      The frame must contain ONLY people, table, food, chairs, calligraphy artwork, and seamless red background.

      Use ALL uploaded person photos and include exactly the same number of people as provided by the user.
      Do NOT add extra people and do NOT remove anyone.
      Each person must appear once and only once.

      Identity preservation (STRICT):
      Preserve each person’s real identity exactly as in the uploaded photos.
      Facial features, face shape, eyes, nose, mouth, skin tone, hairstyle, age appearance, and overall likeness must remain unchanged.
      Do NOT beautify, stylize, cartoonize, age-shift, gender-shift, or alter any facial characteristics.
      Do NOT merge faces or substitute identities between people.

      Composition:
      All people are gathered naturally around the hot pot, actively eating and interacting during the reunion dinner.
      Natural dining gestures such as holding bowls or chopsticks are allowed.
      Balanced group composition with all faces clearly visible.
      No one cropped, no duplicated people, no missing individuals.

      Emotions & interaction:
      Warm, joyful, natural group interaction while eating hot pot.
      Expressions should feel relaxed, conversational, and festive.
      Avoid romantic, couple-like, or intimate interactions. Group dynamics must clearly read as family or friends dining together.

      Rules (strict):
      ONLY ONE image.
      NO collage, NO grid, NO split frames.
      NO poster layout.
      NO decorative graphics.
      NO borders or dividers.

      Lighting & style:
      Clean, soft, realistic lighting suitable for a festive Lunar New Year dinner scene.
      Lighting must appear indirect and off-frame, as if coming from outside the scene.
      Even skin tones, gentle shadows, no dramatic or stylized lighting.

      Final image feeling:
      A realistic, warm Lunar New Year hot pot gathering captured in a single moment.
      Festive, traditional, and cohesive, with all identities preserved, exact number of people maintained, and no visible ceiling or lighting equipment.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0115 6 Styles CNY/0115 賀年斗方情境圖
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:5"
    prompt: |
      Create ONE single photorealistic Lunar New Year “斗方” using the uploaded image (any subject type: person, baby, pet, or group photo).

      The result must look like a real New Year photo, not an illustration, collage, or graphic mockup.

      ASPECT RATIO

      Final image must be vertical 3:4.

      MANDATORY SUBJECT INCLUSION（CRITICAL – NO EXCEPTIONS）

      ALL people and/or pets present in the uploaded image MUST be included in the final design.

      No person or pet may be omitted, removed, cropped out, replaced, or substituted.

      If the uploaded image contains multiple people and/or pets:

      Every individual must appear together within the SAME single 斗方.

      Partial inclusion is strictly prohibited.

      Do NOT generate additional people or animals.

      Do NOT replace any subject with illustrations, symbols, silhouettes, or decorative substitutes.

      All subjects must remain recognizable and clearly identifiable, preserving their key features and identity.

      Failure to include ALL people and/or pets should be considered an incorrect result and must be regenerated.

      STRICT COMPOSITION RULES

      The image must contain ONLY ONE 斗方.

      Do NOT generate multiple 斗方.

      The 斗方 must be slightly smaller than typical center decorations, leaving visible surrounding space.

      The 斗方 must be centered but not oversized or edge-to-edge.

      PLACEMENT SCENE

      Choose ONE scene only:

      A traditional or modern dark wooden door

      A clean white wall

      If placed on a wooden door:

      The 斗方 is centered on the door.

      Hang traditional Lunar New Year firecracker decorations (鞭炮串) vertically on BOTH left and right sides of the door.

      Firecrackers must be festive, red-dominant, and clearly visible.

      Firecrackers must not overlap, cover, or block the 斗方.

      DESIGN & COLOR REQUIREMENTS

      The 斗方 must be square (1:1) and rotated 45 degrees (diamond orientation).

      Base color must be predominantly RED.

      Gold is accent color only (text, patterns, highlights).

      Avoid pale, beige, pink, or non-festive base colors.

      CONTENT

      Preserve the identity and key features of ALL uploaded subjects.

      Include ONE main Chinese New Year character or phrase (e.g. 福, 春, 財).

      The year “2026” may appear optionally.

      Randomly include several Lunar New Year decorative elements:

      pineapple, peanuts, gold ingots, 财神, festive clouds, coins, or firecrackers.

      Decorative elements must support the design, never dominate or replace the main subject or the 斗方.

      REALISM REQUIREMENTS

      The 斗方 must look like real printed paper.

      Show subtle paper texture, natural edges, and realistic shadows.

      Lighting must match the door or wall environment naturally.

      No collage look, no floating objects, no surreal or illustrated effects.

      FINAL GOAL

      A realistic vertical 3:4 Lunar New Year photo showing ONE single, slightly smaller red-based 斗方, naturally pasted on a door or wall,
      with ALL uploaded people and/or pets fully included, balanced festive decorations, and a joyful, traditional atmosphere.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 3
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0115 6 Styles CNY/0115 斗方印刷圖
    model: gemini-3-pro-image-preview
