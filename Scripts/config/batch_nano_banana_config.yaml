  - folder: ../Media Files/Nano Banana/0102 4 Styles/0102 My Silly Human
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      A highly realistic photograph using the uploaded domestic pet as the main subject.  
      Do not change the pet’s face, markings, body type, or breed from the uploaded photo.

      The pet sits in the foreground, leaning against a wooden sign that it is holding or resting on.  
      The sign must clearly read: “MY SILLY HUMAN”.

      In the background, use the uploaded human photo as the sleeping pet owner.  
      Do not change the human’s face, hairstyle, or identity.  
      The human is sleeping soundly on the living room sofa with mouth slightly open, captured candidly in a natural and humorous moment.

      The scene takes place in a cozy modern living room.  
      Warm soft lighting, shallow depth of field (bokeh), and realistic cinematic atmosphere.  
      50mm lens realism, ultra-realistic lighting, sharp focus on the pet and the sign, detailed fur texture, photographic clarity.  
      Aspect ratio 3:4.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    multi_image_config:
      enabled: true
      mode: sequential
      folders:
        - ../Media Files/Nano Banana/0102 4 Styles/0102 My Silly Human/Additional
