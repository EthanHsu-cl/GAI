  - folder: ../Media Files/Nano Banana/0102 4 Styles/0102 My internal Angel and Devil
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      A beautifully composed 3:4 portrait featuring the uploaded photo of the user as the main subject in the center.

      Do not alter the user’s face or identity. Keep their natural look and expression.
      Enhance lighting slightly to match a cinematic Japanese romance-drama poster style—soft, bright, clean, with smooth skin tones and gentle contrast.

      Left side (user’s left ear):
      A miniature angel version of the user, around 25–30% of the user’s height.
      They have elegant white angel wings, a soft halo light, and wear a delicate white outfit similar in style to the reference angel costume.
      If the user presents as female, the outfit should include a white short skirt.
      If the user presents as male, the outfit should consist of a white top paired with pants.
      They are leaning toward the user’s left ear, gently whispering, hand near their mouth.
      Lighting is soft, glowing, pure, and slightly ethereal.

      Right side (user’s right ear):
      A miniature devil version of the user, the same size as the angel version.
      They have stylish black wings, a subtle dark aura, and are dressed in a black gothic outfit similar to the reference devil costume.
      If the user presents as female, the outfit should include a black gothic short skirt.
      If the user presents as male, the outfit should consist of a black gothic top paired with pants.
      Their expression is playful or mischievous, whispering toward the user’s right ear.
      Lighting is moodier, with hints of red or purple highlights.

      Keep both miniature characters proportional, aesthetic, and realistically integrated into the main photo, as if physically present near the user’s shoulders.

      Background:
      Clean, modern, softly stylized.
      Optional split-tone background (dark gray × white in soft gradient) echoing the contrast between angel vs devil sides.But it should not affect the user in the foreground.

      Overall style:
      A polished, high-end promotional visual.
      Cute, aesthetic, but not cartoonish.
      Clean edges, high resolution.

      Aspect ratio: 3:4.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0102 4 Styles/0102 Life Instruction
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Create a 3:4 IKEA-style instruction sheet titled **LIFE INSTRUCTIONS**, using:
      (1) the uploaded user photo  
      (2) the uploaded CyberLink logo image  

      IMPORTANT — LOGO RULE (DO NOT GENERATE A NEW LOGO):
      – Use the uploaded CyberLink logo EXACTLY as-is.
      – Do NOT redraw it, reinterpret it, or simplify it.
      – Do NOT replace it with other shapes or icons.
      – Insert the uploaded logo image directly in the upper-right corner.
      – Keep its proportions, angle, thickness, and geometry unchanged.
      – Only scale it uniformly if needed.

      TITLE & HEADER:
      – Upper-left: **LIFE INSTRUCTIONS**
      – Upper-right: the uploaded CyberLink logo (unaltered)
      – Below logo: small code “cl-xxxxxx-1”

      ART STYLE (STRICT BLACK & WHITE):
      – Pure black line-art on white background, IKEA manual style.
      – No colors, no shading, no grey fills. 
      – ONLY Panel 4 background may use extremely light grey OUTLINE lines (no fills).

      TOP ACCESSORY ROW:
      Draw thin black line icons representing visible clothing/accessories from the uploaded photo.

      FOUR PANELS:
      1) Putting on clothing  
      2) Adjusting accessories  
      3) Checking phone  
      4) Final pose with checkmark + “DONE”

      PANEL 4 BACKGROUND:
      – Only Panel 4 contains background.
      – Background must be very light grey **outline-only** based on the uploaded photo’s scenery.
      – Keep outline subtle so the character stays dominant.
      – Must stay inside Panel 4 only.

      RULES:
      – Keep proportions adult-like, no detached limbs.
      – Use IKEA-style arrows and minimal icons.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
    num_iterations: 50


# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (images can be reused)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: true
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
