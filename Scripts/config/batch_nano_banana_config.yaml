tasks:
  - folder: ../Media Files/Nano Banana/0108 5 Styles/0108 Collage V1
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      Layout & Style: Generate a 9:16 vertical layout in a cold, minimal, high-fashion editorial style. The entire scene must remain strictly on a flat surface with no depth, no perspective, and no floating elements. Use a smooth, solid gray background viewed from a straight-down, top-view angle.

      Central Element: Place a large white sheet of paper at the center of the composition. On this sheet, print a single centered text block consisting of:

      A title inspired by the theme of the user-uploaded photos.

      A short documentary-style line that feels minimal and poetic.

      Note on Typography (The "Medium-Large" Scale): The typography must be elegantly centered. The scale should be equivalent to a refined magazine sub-headline. It must be distinctly larger and heavier than standard body copy to act as a clear focal point, but it must remain restrained and compact, occupying only a small percentage of the white sheet's total area to emphasize the minimal aesthetic. Do not include any years or dates.

      Surrounding Elements: Around the central sheet, place Polaroid-style photographs. The number of Polaroids must match the number of images uploaded by the user. Each Polaroid must display one user-uploaded photo exactly as provided, with natural cropping to fit the frame. The Polaroids should be noticeably larger than typical instant-film proportions.

      Composition & Lighting: Arrange the Polaroids in an intentionally asymmetrical, organic layout on the flat surface. They may be slightly rotated or offset but must remain fully grounded (no elevation). Use soft, diffused, low-contrast shadows directly beneath the Polaroids and the central sheet to reinforce the flat tabletop placement.

      Aesthetic Constraints: Maintain a cold, minimal, quiet fashion aesthetic. Do not include props, hands, decorative elements, environmental cues, or anything beyond the sheet, Polaroids, and flat gray surface.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0108 5 Styles/0108 Fortune Cookies
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:5"
    prompt: |
      Directives for Image Generation: A ultra-high-definition macro photograph capturing a photorealistic 15mm miniature human sitting on a colossal, single cracked fortune cookie.

      Subject & Likeness:

      Facial Fidelity: The miniature figure must be an exact, high-fidelity replica of the person in the uploaded image. Every facial feature, from the eye shape to the facial structure, must be sharp, highly recognizable, and perfectly clear.

      Physical Realism: The figure is a living, breathing human shrunk down, not a figurine. Render natural human skin textures, visible pores, and organic light absorption (subsurface scattering).

      Proportions: Maintain strict 1:7.5 adult human head-to-body proportions.

      Pose & Attire: A relaxed, candid sitting posture on the far-left crest of the cookie. Wearing a white cotton t-shirt with visible fabric grain, blue denim jeans with realistic folds, and clean white canvas sneakers.

      The Fortune Cookie & Text:

      Environment: One giant, golden-brown fortune cookie, cracked into two clean halves, positioned in the center. The cookie texture should be hyper-detailed, showing its crispy, porous, baked surface.

      Fortune Paper: A crisp, white rectangular paper strip bridges the two cookie halves.

      Text Integrity: The text [INSERT_RANDOM_POSITIVE_FORTUNE_HERE] is printed clearly on the paper. The text must be fully legible, unobstructed by the figure or crumbs, and centered. No part of the message is hidden.

      Photography & Composition:

      Framing: A medium-macro full view that contains the entire structure of the cookie. The composition is clean, minimalist, and uncluttered.

      Optics: A shallow depth-of-field effect (tilt-shift style). The miniature person's face and the fortune text are in razor-sharp focus, while the far edges of the cookie and the background transition into a smooth, creamy bokeh.

      Lighting: Soft, directional studio lighting that defines the organic volume of the skin and cookie texture, casting a subtle, tiny contact shadow beneath the person.

      Background & Lighting:

      Background: A randomly selected, ultra-saturated solid color (chosen from a vibrant palette: #A61023, #FF7F24, #FFBF00, #008B8B, #D2B48C, #F08080, #FF69B4, or #0047AB). The background must be a 100% flat, monochromatic plane with zero gradients, zero vignetting, and zero lighting falloff. It must appear as a pure, uniform block of intense color.

      Lighting: Soft, directional studio lighting that defines the cookie's volume and creates a tiny, realistic contact shadow beneath the object, while ensuring the background remains a perfectly even, flat color without any light-to-dark variance.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0108 5 Styles/0108 求籤-TW
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:5"
    prompt: |
      A realistic fortune-telling scene.

      The camera is level and parallel to the scene.
      The background and overall composition remain straight and aligned,
      with no tilt, rotation, angled perspective, or diagonal framing.

      The photo fills the entire frame edge-to-edge, with no borders, margins, or visible background outside the image.

      The subject is framed in a chest-up shot,
      seated at the center behind a traditional fortune-telling table,
      sitting upright and facing directly toward the camera.

      Both the body and face are front-facing, and the subject is looking directly at the camera.

      The main subject is based on the user-uploaded photo, with appearance and identity remaining consistent.
      The subject’s facial features and clothing must remain unchanged,
      preserving the original facial structure, proportions, recognizability,
      and original outfit exactly as shown in the uploaded photo.

      The subject is in the act of drawing a fortune.

      One hand is lifting a wooden fortune stick from the fortune container,
      while the other hand is holding a small paper fortune slip.

      The subject is drawing a fortune and is not writing calligraphy
      or performing any writing actions.

      The background is a traditional fortune-telling room
      with warm wooden elements and subtle calligraphy decorations.

      The background composition should remain simple and not overly complex,
      keeping the visual focus on the subject.

      Overall background lighting is dim and subdued.

      Apply a shallow depth of field to the background,
      creating noticeable background blur.

      Within the blurred background, include two traditional Chinese calligraphy artworks,
      two to three softly glowing lantern lights,
      and two green potted plants.

      All background elements must remain out of focus, indistinct, and non-detailed,
      serving only as atmospheric accents rather than focal objects.

      At the top of the image, fortune result text is displayed
      and randomly alternates between options such as
      “上上”, “上”, “中”, or “平”.

      All displayed text must be written in Traditional Chinese (繁體中文).

      The text is arranged in a horizontal layout
      and written in a bold Chinese calligraphy style.

      The fortune text is placed on a white background
      enclosed by a thin red square outline frame.

      The frame is flat, minimal, and graphic,
      presented as a layout overlay aligned to the image,
      not as a physical object, sign, hanging element, or picture frame within the scene.

      On the left and right sides of the image,
      display the labels “宜” and “忌” respectively.

      Each label is placed inside a solid red circular background,
      with the character rendered in white and centered within the circle.

      Each side forms its own vertical panel.

      Under each label (“宜” on the left, “忌” on the right),
      display exactly two short items arranged vertically.

      The items are presented in a vertical, top-to-bottom layout
      inspired by traditional almanac-style reading flow,
      and are content items only,
      not additional labels or repeated headings.

      Only one set of “宜” and “忌” labels should appear in the entire image.
      Do not duplicate or repeat the labels in any other form.

      All fortune-related text, including result text, labels, and items,
      is rendered in black text.

      Each vertical panel is placed on a white background
      and enclosed by thin red outline frames,
      aligned neatly along the left and right sides of the image
      as flat graphic layout overlays,
      not as physical objects, hanging elements, or scrolls within the scene.

      The items should be randomly generated for each result,
      concise and culturally appropriate,
      representing commonly accepted suitable or unsuitable actions
      in a fortune-telling context
      (such as work, relationships, communication, planning, rest, or decision-making).

      Keep the content symbolic, neutral, and broadly applicable.
      Avoid extreme, harmful, or overly specific actions.

      The overall style is highly realistic with natural proportions.

      Warm lighting and soft shadows create a cinematic atmosphere.
      The dim background lighting, combined with layered light-and-shadow contrast,
      produces a subdued and mysterious mood
      without leaning toward fantasy or supernatural styles.

      Do not alter the subject’s facial features, identity, clothing, or expression style.
      Avoid calligraphy writing actions, calligraphy tools, fantasy elements,
      or any decorative physical frames.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0108 5 Styles/0108 塔羅 V1
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      A beautifully composed tarot card scene based on a classic tarot deck.

      The tarot card type is randomly selected from a standard tarot deck for each generation including:
      The Fool, The Emperor, The Hierophant, The Chariot, Strength, The Hermit, Wheel of Fortune, Justice, Temperance, The Moon, The Sun, Judgement, and The World

      The tarot card illustration appears only within the printed card artwork itself. The character illustrated on the tarot card is transformed from the uploaded user photo, remaining recognizable while enhancing and slightly enlarging the person’s facial features, especially the eyes and facial structure, to suit a tarot illustration style.

      Only the imagery inside the tarot card is illustrated.
      All other elements remain realistic and photographic, including the physical tarot card, the open book beneath it, the printed text on the book pages, surrounding objects, materials, lighting, and shadows.

      The illustration inside the tarot card features clean, precise linework with clear contours and controlled detail, avoiding rough sketch lines, painterly textures, or excessive ornamentation.

      The tarot card is placed on top of an open book.
      The book displays a brief interpretation of the selected tarot card, written as a single sentence or a small set of concise keywords that summarize the card’s meaning.
      The text appears as printed content on real paper, not illustrated lettering.

      The scene is viewed from a clear top-down perspective (overhead view), with no tilt or dramatic camera angle.
      The tarot card and book lie flat on a surface, maintaining natural proportions and realistic depth.

      The tabletop is black, covered with a gypsy-inspired cloth featuring subtle patterns and rich fabric texture.
      Crystals, candles, and dried botanical elements are arranged naturally around the book, such as dried flowers, grasses, or leaves.
      All tabletop elements are rendered realistically with natural shadows and believable materials.

      The composition is clearly focused on the tarot card as the primary subject.
      The card is centered or visually dominant in the frame, while the book, cloth, crystals, candles, and dried botanicals remain secondary and do not compete for attention.

      The overall environment is calm, elegant, and mysterious, with soft, warm lighting.
      The atmosphere feels magical and spiritual, but never dark, scary, surreal, or horror-like.

      Style contrast: illustrated tarot card artwork combined with a realistic, photographic environment, maintaining clear separation between illustration and reality.

      Mood keywords: mystical, elegant, calm, symbolic, refined.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
    num_iterations: 50

