      Photo usage rules (strict):
      Each input photo must be used exactly once.
      Every tile must contain a different photo.
      No photo may appear more than once in the entire layout.
      Duplicating or cloning photos across tiles is strictly forbidden.
      One tile contains exactly one photo only.
