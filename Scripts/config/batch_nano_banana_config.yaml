    prompt: |
      CRITICAL FACE ID LOCK — PRIORITY 1 (EXTREME) :
      Use the uploaded photo(s) as the ONLY and ABSOLUTE source of the SUBJECT’s face.
      The person in the uploaded image must be the only human in the final result.
      Preserve the subject’s real face, facial features, identity, skin tone, hairstyle, facial expression, and body proportions exactly as shown in the uploaded photo.
      Do not beautify, stylize, replace, or reinterpret the face in any way.

      Create a two-panel vertical split composition inspired by Japanese cinematic school drama visuals for White Day.

      uploaded photo into one of a student in a Japanese high school uniform standing quietly in a classroom.

      Top panel

      Framing and camera rules (NON-NEGOTIABLE):

      Medium full shot.

      Subject occupies approximately 70–75% of the vertical height of the top panel.
      (The figure must appear visually dominant and proportionally similar to a medium-distance cinematic portrait — NOT small in frame.)

      Camera distance closer than a wide shot but not cropped at knees.

      Body turned slightly 15–25 degrees to one side only.
      ⚠️ STRICT LIMIT — DO NOT exceed 30 degrees.
      NOT front-facing flat.
      NOT full profile.
      NOT strong 3/4 side.
      NOT exaggerated side-body pose.

      Upper torso slightly angled.
      Head gently angled downward.
      Face subtly turned toward camera just enough to show partial cheek contour.
      Both eyes still partially visible from camera view.
      No sharp side angle.
      No near-profile silhouette.

      Hands placed naturally behind the back.

      Camera positioned at eye-level.
      Straight perspective.
      No tilt.
      No dramatic angle.

      Classroom perspective rules:

      Desks and chairs must follow a consistent depth perspective.
      Rows angled gently toward depth (subtle diagonal flow).
      NOT extreme diagonal.
      NOT symmetrical flat layout.

      Background:

      Large classroom windows behind subject.
      Cherry blossoms clearly visible outside.
      Curtains softly lit.
      Soft spring daylight atmosphere.

      Lighting:

      Primary light source from window side.
      Soft rim light outlining hair edge and shoulder contour.
      Gentle directional side light on face.
      Natural shadow on opposite cheek.
      Warm spring tone.
      No flat lighting.

      🔴 ENHANCED FACE BRIGHTNESS CORRECTION (HIGH PRIORITY FIX)

      Even if the subject is backlit by the window, the face must appear clearly illuminated and naturally bright — never dim, muddy, or underexposed.

      Apply the following precise exposure adjustments:

      • Increase facial exposure approximately +1 stops relative to current output.
      • Maintain overall scene exposure balance — do NOT overexpose window highlights.
      • Add natural bounce-fill effect from classroom interior (as if light reflects from pale walls and desks).
      • Midtones on face must be lifted noticeably while keeping realistic contrast.
      • Eye sockets must NOT fall into shadow.
      • Under-eye and cheek shadow density must be softened (not erased).
      • Preserve natural shadow direction and structure — do not flatten the face.

      CRITICAL:

      The face brightness must visually match reference image 2 (well-lit, readable skin tone, not backlit-dark).

      No harsh flash.
      No studio beauty light.
      No glam lighting.
      No artificial spotlight.
      No HDR look.
      No over-smoothing.

      Skin texture must remain realistic.
      Natural micro-contrast preserved.

      Add subtle natural eye catchlight from window direction.
      Eyes must remain clearly visible and readable.

      Facial expression:

      Soft, shy, sweet expression.
      Eyes gently lowered.
      Subtle restrained smile.
      Emotion bashful, warm, quietly affectionate.
      No exaggerated smile.
      No dramatic sadness.

      Text overlay (STRICT PLACEMENT RULE):

      Text must be positioned EXACTLY at the horizontal boundary between the top and bottom panels.

      Centered across full width.

      White color only.

      “White Day” — large serif font.

      「ホワイトデー」 — smaller, placed directly below.

      No alternative placement.
      No decorative effects.
      No drop shadow.
      No repositioning.

      Bottom panel ( EXACTLY — CRITICAL )

      ⚠️ Must match upper body orientation angle.

      Camera perspective:

      Close-up from a mild rear-side angle consistent with 15–25 degree body rotation.
      NOT straight-on symmetrical.
      NOT strong side profile.

      Envelope held behind the back.
      Arms angled slightly according to subtle body rotation.

      Hands & envelope framing rules (NON-NEGOTIABLE):

      Only hands and envelope visible.
      NO face.
      NO torso.
      NO shoulders.
      NO silhouette.

      Envelope slightly angled consistent with body angle (very mild tilt only).
      Wax seal visible.
      Natural perspective aligned with top panel rotation.

      Scale:

      Envelope large and central but not rigidly symmetrical.
      Hands positioned naturally according to slight body angle.

      Envelope details:

      Cream-colored envelope.
      Small red wax heart seal centered.

      Background:

      Softly blurred classroom wall or window.
      Same lighting direction as top panel.
      No narrative shift.
      No added props.

      BOTTOM PANEL EXPOSURE CONSISTENCY (CRITICAL):

      Keep overall brightness consistent with corrected top panel.

      Do NOT darken bottom panel.
      Maintain soft readable shadows.
      Preserve natural daylight tone.

      Global strict rules

      Top panel = visually dominant medium full shot with slight 15–25° rotation only.
      NOT strong side pose.
      NOT full profile.

      Bottom panel = mild rear-side angled close-up consistent with top angle.

      Text fixed at center boundary.

      No frontal flat pose.
      No exaggerated side-body pose.
      No cinematic reinterpretation.
      No extra props.
      No extra gestures.

      Overall tone:

      Quiet.
      Restrained.
      Shy-sweet.
      Japanese school drama aesthetic.
      Soft spring light with controlled directional window glow.
      Overall exposure lifted to natural bright spring daylight while preserving realism (no overexposure, no flat lighting).
