tasks:
  - folder: ../Media Files/Nano Banana/0202 4 Styles/0202 白馬櫻花
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Use the uploaded photo as the only reference for the human subject. The person in the uploaded image must be the only human in the final result. Preserve the subject’s real face, facial features, identity, skin tone, hairstyle, facial expression, and body proportions exactly as shown in the uploaded photo. Do not beautify, stylize, replace, or reinterpret the face in any way.

      Create a very close-up, intimate portrait composition. The subject and the horse are positioned extremely close, with their heads gently touching. The subject is looking directly at the camera, maintaining a natural and calm expression. One hand of the subject is softly resting on and caressing the horse’s face, conveying a sense of trust, tenderness, and emotional connection between the human and the animal.

      The lighting is highly romantic and dreamlike, featuring soft frontal fill light gently illuminates the subject’s face, ensuring the facial features remain clear, warm, and naturally visible without flattening the image. At the same time, soft backlighting and diffused glow. Warm spring sunlight filters from behind, creating a radiant rim light along the edges of the subject and the horse. The balance between backlight and fill light preserves depth while preventing the face from appearing too dark. Overall scene brightness is subtly elevated, with enhanced highlights and increased luminous intensity, creating a sparkling, radiant, and shimmering atmosphere without overexposure. Subtle light particles, glow effects, and soft highlights shimmer in the air, giving the scene a luminous, almost unreal quality. The atmosphere feels magical, sparkling, and otherworldly, as if an elf or forest spirit has appeared within a cherry blossom dream, while still maintaining realistic skin texture and photographic depth.

      The horse must be a pure white horse with a gentle and serene presence. The horse’s eyes are gently half-closed, as if resting or gazing downward in a shy, restrained manner. Long, unscientific white eyelashes curve downward and veil most of the eye area, covering and softening what lies beneath. Behind the lashes, the eye surface is entirely flesh-toned pink, with no pupils, no iris structure, no eyeball definition, and no reflective membrane of any kind—only a smooth, continuous pink surface. There are absolutely no black, dark, or glassy elements present. The half-closed eyelids and cascading white eyelashes obscure most of this pink surface, creating a subdued, modest, and otherworldly expression, as if the horse perceives the world through magic rather than vision.  The horse’s nostrils are soft pink. The horse’s facial details are realistic and anatomically accurate, with smooth white fur and subtle natural texture. The horse wears no bridle, no reins, no saddle, and no equipment of any kind; its body is completely unadorned and free. The horse’s head is adorned with abundant cherry blossoms, arranged naturally around the mane and forehead, reinforcing a magical and ethereal atmosphere. The horse’s expression is calm and affectionate, matching the intimacy of the scene.

      The subject wears an elegant Japanese kimono. If the subject is female, the kimono is ornate and highly decorative, richly covered with dense, layered floral embroidery featuring cherry blossoms, seasonal flowers, and traditional motifs. Fine gold-thread embroidery is woven throughout, subtly shimmering as it catches the light and creating a luxurious, jewel-like effect. The color palette is elegant pastel green with soft iridescent highlights. The fabric appears flowing, delicate, radiant, and ceremonial, traditional in structure yet fantastical in presence. If the subject is male, the attire is a refined yet ornate traditional ensemble with a haori worn over the kimono. The color palette remains light and harmonious, with soft neutral tones enhanced by gentle luminous accents, giving the male attire a luxurious, high-end presence without appearing excessive. Subtle, intricate patterns and fine gold-thread embroidery add dignified, ceremonial richness while maintaining composed masculine elegance. If the subject is an animal, the subject is randomly dressed in either a female’s or male’s Japanese kimono.

      If the subject is female, her hair is styled in an elegant low updo decorated with abundant cherry blossoms. A gentle breeze loosens a few strands around the face, creating a soft, wind-swept effect that feels natural, romantic, and graceful. Makeup does not alter facial structure and consists only of soft pink tones: natural blush, pink lips, and subtle doll-like eye definition with light eyeliner and naturally enhanced lashes. Skin texture remains fully authentic with no smoothing effects.

      The entire environment is filled with cherry blossoms in full bloom. An intensified cherry blossom rain fills the entire scene, with a much higher density of petals floating, swirling, and cascading through the air in multiple layers. Petals overlap the foreground, midground, and background, creating a rich, immersive, and sparkling sakura storm that surrounds both the subject and the horse. The background is softly blurred but clearly suggests a springtime setting immersed in sakura trees. The air is dense with petals, creating a continuous, abundant cherry-blossom rain that fills the frame from foreground to background.
