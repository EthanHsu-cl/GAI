tasks:
  - folder: ../Media Files/Nano Banana/0204 4 Styles Creative Studio/0204 櫻花微夢
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Theme: “Cherry Blossom Soft Dream (Wrapped in Sakura)”

      The user will upload 1 to 4 reference photos, which may include humans and/or pets.
      The total number of subjects in the final image must exactly match the number of uploaded photos.

      No additional people or animals may be generated. Only the individuals or pets provided by the user may appear in the final image.

      Strict facial identity preservation is mandatory. Each human subject’s face must remain fully consistent with the uploaded photo and be immediately recognizable as the same person. Facial features must not be redesigned, stylized, or altered.

      Generate a soft top-down (overhead) composition with a closer camera distance, creating a more intimate framing than a wide overhead shot.

      Natural pose variation requirement:
      Subjects should appear relaxed and natural rather than stiff or posed. Hands and body posture may vary organically, such as gently holding a cherry blossom, resting on one side while supporting the body with an arm on the ground, or lying with hands softly crossed behind the head as a pillow. The pose should feel lively, casual, and comfortable.

      Single-subject framing rule:
      When only one subject is present, the head should occupy approximately 50% of the total image height, ensuring a closer, more immersive portrait while still clearly showing the subject lying on the sakura-covered ground.

      Multi-subject framing rule:
      When two to four subjects are present, maintain a balanced overhead composition that comfortably fits all subjects within the frame without excessive spacing, while preserving the lying-down perspective.

      All subjects should be lying on a grass field densely and heavily covered with cherry blossom petals, forming a thick, continuous layer. Green grass should be only faintly visible beneath the blossoms.

      Cherry blossom color enforcement:
      Even under soft lighting, petals must preserve a gentle blush tone, with no washed-out or colorless appearance.

      Large, softly blurred cherry petals should appear in the foreground, occupying a noticeable portion of the frame and enhancing depth.

      A small number of petals should rest naturally on hair, clothing, or fur.

      All human subjects must wear spring-inspired outfits, such as pastel coats, light scarves, or soft seasonal fabrics.

      Lighting and atmosphere:
      Introduce a subtle and gentle play of light and shadow across the scene. The lighting should be soft and minimal, adding slight dimensionality and warmth without overpowering the dreamy, delicate atmosphere.

      The overall mood should remain romantic, evoking the feeling of being quietly wrapped in falling sakura petals.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    use_deterministic_random: true
    random_seed: 42
    min_images: 1
    max_images: 4
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0204 4 Styles Creative Studio/0204 春光微醺
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      A nostalgic, cinematic medium shot exactly mirroring the input subject's 100% identical face shape, specific facial features, and exact hairstyle; the subject maintains a serene, closed-mouth expression with no teeth showing. If the subject is a human, they wear the exact same delicate cream-colored eyelet lace blouse with a clearly defined, structured Cuban collar and intricate perforated patterns. If the subject is an animal, it must be depicted naturally without any clothing, maintaining its raw anatomical form while preserving the specific facial markers of the input.

      In the foreground, scattered individual cherry blossoms and slender, delicate floral stems occupy the right mid-ground and immediate foreground, rendered with a soft-focus blur that creates a translucent, airy veil over the subject's left cheek and shoulder, avoiding any dense clusters. The sunlight, filtering through the sparse floral canopy, casts distinct, sharp lace-like shadows of individual petals and fine twigs across the lower-left portion of the subject's form (either the white blouse or the animal’s natural fur), with the shadows following the soft contours of the surface.

      The aesthetic is strictly a vintage 35mm film style with a muted color palette and soft contrast. The sky is rendered in a pale, desaturated periwinkle, while the blossoms feature an interplay of pale shell-pink and dusty rose. The foliage is a deep, muted olive-charcoal. Captured during the golden hour, the subject's skin or fur glows with a translucent, waxy warmth. Shadows are lifted and tinged with a subtle warm amber hue, avoiding pure blacks. The image is characterized by a natural film grain and gentle lens softening, with the background dissolving into a creamy bokeh of muted green and hazy sunlight, perfectly replicating the textural soul of a vintage film photograph.
