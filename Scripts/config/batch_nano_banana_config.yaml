      MANDATORY STYLING ADJUSTMENT:
      Refine and blend SUBJECT outfits into a mix of retro varsity aesthetic, 90s preppy style, and city-girl streetwear.

      Tight, symmetrical cinematic fashion photography as a high-fashion magazine cover, with no text, no typography, no logos, and no graphic overlays.
      The camera is positioned slightly above eye level with a gently tilted wide-angle view, creating mild downward compression and strong vertical depth; avoid fully side-on or pure profile viewpoints. The camera remains precisely aligned with the stadium seating lines, forming strong leading lines toward a clear vanishing point.

      Subjects are casually dispersed across nearby rows of forest-green, American vintage-style stadium seats. While the seats themselves remain uniformly oriented in the same forward-facing direction with no variation or rotation—appearing clean and well-maintained—the subjects break this linear rigidity with dynamic, high-fashion poses, such as leaning asymmetrically on armrests or subtly tilting their torsos. Limbs must respect the physical structure of the stadium seats; no legs, feet, or bodies may pass through gaps, armrests, or solid seat components. No subject may appear suspended, floating, or unsupported by the stadium seating or ground.

