  - folder: ../Media Files/Nano Banana/0211 4 Styles/0211 櫻花攝影
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Please use all uploaded photos as the only source of characters in the image. Preserve every person’s real face, facial features, bone structure, skin tone, hairstyle, clothing, and overall identity exactly as shown in their original photos. Do not beautify faces, smooth skin, stylize features, alter proportions, change age, or modify identity in any way. No additional people may appear. Each uploaded person must appear only once in the final image, with no duplication, cloning, or repeated faces.

      Create a vertically oriented image divided clearly into two stacked horizontal frames, resembling a casual photo exchange between friends. The overall mood should feel natural, playful, and nostalgic, inspired by a Japanese springtime aesthetic. The setting should feel like a cherry-blossom-filled park in peak sakura season, with blooming cherry trees, soft sunlight, and a relaxed outdoor picnic atmosphere. The color tone should be light, airy, and slightly warm, emphasizing soft pinks, fresh spring light, and gentle daylight.

      The two stacked frames must be seamlessly stitched together as a single continuous photograph.
      There must be absolutely NO borders, NO frames, NO outlines, NO edge shading, NO vignette, NO gradient darkening, NO semi-transparent overlays, and NO visible or invisible edge treatment separating the frames.
      All image pixels must extend cleanly and fully to the canvas edges with identical brightness and color all the way to the edge.

      [Upper Frame: The Photographer]
      In the upper frame, randomly select one single person from the uploaded users to act as the photographer. This person must appear alone in the upper frame. The character should hold a small camera or film camera in both hands, naturally and gently bringing it close to their face, rather than actively taking a picture. The camera should rest casually against the face, covering only one eye, while the other eye remains clearly visible. Both eyes must be open, relaxed, and clearly visible with no blinking, squinting, or eye closure. The camera must not cover both eyes or obscure the entire face. The background is dominated by cherry blossom trees in full bloom, with small glimpses of soft blue sky visible between the branches and treetops. The pose should feel natural, casual, and intentional, as if capturing a candid spring moment. The photographer must be fully intact within the upper frame with no cut-off limbs or rendering errors.

      [Lower Frame: The Recorded Scene]
      In the lower frame, depict all remaining uploaded users together, excluding the person used in the upper frame. This represents the scene being recorded. The picnic setting takes place on grass partially covered with fallen cherry blossom petals, with patches of fresh green grass still clearly visible rather than being fully covered. The picnic blanket is a light blue checkered picnic blanket. Tables are strictly prohibited. Picnic food includes light spring snacks such as three-color dango, onigiri (rice balls), and drinks or cups suitable for a Japanese picnic, along with pink cherry-blossom-themed wagashi placed naturally on the blanket. The background consists entirely of the grass and the picnic blanket only. Characters should be interacting casually, sitting close together with lively, genuine expressions (peace signs, leaning in, laughing).

      [Recording UI Indicators — GRAPHIC MARKS ONLY]
      The lower frame must simulate an active recording state using ONLY minimal graphic symbols.
      These symbols must NOT be implemented as a frame, border, overlay layer, mask, vignette, or UI container.

      ABSOLUTE PROHIBITIONS:
      – NO black frame
      – NO darkened edge
      – NO semi-transparent rectangle
      – NO outline of any kind
      – NO UI layer
      – NO masking
      – NO shadow near edges
      – NO implied enclosure

      Allowed indicators (STRICT):
      – A small red “REC” text with a solid red dot, floating freely in the upper-right area.
      – A simple battery icon, floating freely in the upper-left area.
      – Four independent L-shaped corner marks indicating the recording area.

      Corner mark rules:
      Each L-shaped mark is a thin black graphic line only.
      They must be visually separate, unconnected, and not aligned to form a rectangle.
      They must not touch the image edges.
      They must not imply a border when viewed together.
      They must not darken or modify any surrounding pixels.

      No Other Guides:
      NO grid lines.
      NO focus boxes.
      NO face detection markers.
      NO center marks.
      The image must remain completely clean except for the specified symbols.

      [Atmosphere]
      Both frames share consistent lighting: soft daylight, gentle shadows, springtime warmth. The final image must clearly read as “Photographer (Top) vs. Live Recording View (Bottom)” without any framing artifacts.

      [Clothing Update]
      Replace all character outfits with natural spring outfits suitable for a cherry blossom picnic. Clothing colors should be soft and seasonal, such as white, pastel pink, light yellow, and light blue. Outfits may include dresses, blouses, shirts, jeans, tailored trousers, or skirts. The overall styling should feel casual, clean, and appropriate for early spring, without dramatic fashion exaggeration. If the subject is an animal, the subject must not wear any clothing or accessories.
