  - folder: ../Media Files/Nano Banana/0202 4 Styles/0202 棒球風網美照
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      All subjects must strictly match the provided input photo in number, identity, and facial features, with no additions or omissions. Faces must retain realistic, undistorted proportions and clear identity consistency.

      Tight, symmetrical cinematic fashion photography as a high-fashion magazine cover, with no text, no typography, no logos, and no graphic overlays.
      The camera is positioned slightly above eye level with a gently tilted wide-angle view, creating mild downward compression and strong vertical depth; avoid fully side-on or pure profile viewpoints. The camera remains precisely aligned with the stadium seating lines, forming strong leading lines toward a clear vanishing point.

      Subjects are tightly framed and dominate the composition, casually dispersed across nearby rows of forest green, American vintage-style stadium seats, uniformly oriented in the same forward-facing direction with no variation or rotation, appearing clean, well-maintained, and free of stains, dirt, or damage, in bold, rebellious, non-conformist poses, explicitly avoiding polite or well-behaved sitting positions.

      Most subjects are not looking directly at the camera, captured in candid, off-guard moments to enhance a natural, lived-in fashion atmosphere, while maintaining cool, detached, confident high-fashion editorial expressions. Faces remain extremely sharp and highly detailed, matching the input photo exactly.

      The background is minimalist and tightly cropped, showing only geometric forest-green plastic seats and the stadium’s clean, non-rusted metal overhead roof structure, with openings revealing a clear, vivid blue sky above, featuring natural, realistic cloud formations. No field or floor is visible.
      Styling blends retro varsity aesthetic, 90s preppy style, and city-girl streetwear in a candid fashion photography approach. Subjects may hold casual stadium snacks or cheering props in vintage packaging, featuring controlled red and yellow accents that add visual highlights without overpowering the overall color palette. No flags.

      Soft, diffused lighting creates a timeless editorial atmosphere with gentle contrast, restrained saturation, and subtle fine-grain texture, evoking an established fashion sensibility without referencing any specific era.
      35mm lens style, clean composition, photorealistic 8k, sharp focus on all subjects.
