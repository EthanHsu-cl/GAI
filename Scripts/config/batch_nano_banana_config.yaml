tasks:
  - folder: ../Media Files/Nano Banana/1211 2 Styles/1211 對鏡畫口紅 2
    model: gemini-2.5-flash-image
    prompt: |
      Please use the uploaded photo as the sole subject. The face shape, hairstyle, makeup, skin tone, expression, and body proportions of the person in the photo must be exactly the same as in the uploaded photo. Hair color must remain unchanged, and flash must not lighten or change the hair color.
      The image must only show the mirror reflection of the person. No entities outside the mirror are allowed, nor are second faces, duplicate reflections, extra limbs, or unnatural angles permitted. The pose of the person in the mirror must conform to the laws of human physics and appear as a continuous whole. (The image is a lens, pointed at the mirror, and absolutely no figures or reflections other than the main person in the mirror are permitted.)
      The person is wearing a sparkly red sequined halter dress with a backless design and thin straps. The sequins must be able to capture flash light, producing a bright, star-like reflection.
      The mirror displays "Happy New Year!" written in red lipstick, next to a small red heart. The text must be precisely positioned on the mirror surface, aligned with the mirror's perspective, and must not float, distort, or appear in the person's reflected image.
      The scene is a modern gray marble bathroom. Do not photograph the ceiling, overhead lights, or any objects outside the frame. The light comes solely from a powerful on-camera flash, creating strong shadows, sharp edges, bright highlights, and high-contrast, glowing skin, like a realistic party snapshot.
      The reflection in the mirror reveals the subject's naturally relaxed posture, their head slightly turned towards the mirror as if glancing back. Movements must be simple, elegant, and fluid, avoiding exaggerated bends or complex gestures. The overall atmosphere must convey a bold, glamorous, and confident aura, captured through close-up, realistic flash photography.
    reference_folder: ""
    use_comparison_template: false
    use_multi_image: false

  - folder: ../Media Files/Nano Banana/1211 2 Styles/1211 對鏡畫口紅 4
    model: gemini-2.5-flash-image
    prompt: |
      Instructions

      Please use the uploaded photo as the sole subject. The face shape, hairstyle, makeup, skin tone, expression, and body proportions of the person in the photo must be exactly the same as the person in the uploaded photo. Hair color must remain unchanged; flash must not lighten or alter hair color.

      The image must only show a mirror reflection of the person. No objects outside the mirror, second faces, duplicate reflections, extra limbs, or unnatural angles are allowed. The pose of the person in the mirror must conform to the laws of human physics and appear as a continuous whole. (The image is a lens pointing towards the mirror; absolutely no other person or reflection other than the person in the mirror is allowed.)

      Based on the uploaded photo, create a vibrant New Year's snapshot (similar to a festive flash effect). The reflected image should include: a bright flash, soft shadows behind the person, and slightly warm-toned indoor lighting. The mirror image must be accurate and match the actual pose of the person. Absolutely no duplicate hand gestures, extra limbs and shadows, uncoordinated expressions, unnatural angles, or extra shadows are allowed.

      The pose should be relaxed and natural: hands naturally raised, palms facing forward, facing the mirror, maintaining a fluid posture. Write "20" on your left palm and "26" on your right palm with red lipstick. Your smile must be natural, lively, and full of New Year's joy.

      Write "Happy New Year 2026 :)" on a mirror with red lipstick, surrounded by small hearts or doodles. The style should coordinate with the casual lipstick strokes. Maintain the same angle as the mirror to avoid floating, distorting, or appearing in the subject's reflection.

      The subject should be seated in front of the mirror, wearing a comfortable red sweater. If the subject is female, she should wear a white pleated skirt; if male, he should wear black leather pants.

      The lighting must be bright and direct, such as using a flash. Shadows should be soft and clear, creating a natural and festive atmosphere. Colors must be warm and bright, highlighting the red element.

      The background should be a simple indoor environment, such as a bedroom or dressing room, using warm-toned lighting, but not too harsh. The ceiling should not be visible in the frame; the camera should be focused on the subject and the mirror, and the subject's movements should be natural and fluid.

      The final product should create a joyful, warm, and happy atmosphere—like a lighthearted New Year's greeting photo shared on social media, with accurate reflections, clean lighting, and a genuine sense of celebration.
    reference_folder: ""
    use_comparison_template: false
    use_multi_image: false

