    model: gemini-2.5-flash-image
    resolution: 
    aspect_ratio: 
    prompt: |
      Using the uploaded person as the sole subject, retaining their facial features and hairstyle, only changing the clothing and scene, a four-panel fashion editorial is generated. The overall atmosphere utilizes cinematic studio lighting, with deep red and black as the main color scheme, creating strong contrasts, a sharp main light, rich shadows, a slight film grain effect, and a cool, porcelain-like skin texture.

      The subject always wears a sharply tailored, loose-fitting black suit jacket (must remain open, with the jacket length fixed to 5 cm below the hips), a white shirt, and a deep red tie; if female, this is paired with black slim-fit suit shorts and black socks or ankle boots; if male, it is paired with a loose black overcoat (reaching mid-calf), suit trousers, and black leather shoes.

      In the upper left corner of the frame, a close-up upper-body portrait of the subject facing the camera is taken, with the head slightly tilted at a 45-degree angle, holding a rose. Facial shadows are soft, and the background is pure red or deep red.

      Top right corner: A half-body or bust portrait of the model, whose expression is cool and focused. The background is deep red, with white candles in the foreground (deep foreground). Side or backlighting illuminates the face, creating a strong contrast of light and shadow, with slight motion blur or double exposure for a hazy glow, creating a dreamlike atmosphere.

      Bottom left corner: A full-body or three-quarter-length portrait of the model, dressed in the same suit, standing in a clean, bright gray-white studio. Specks of light and shadow play on the floor. The right foot rests on a French crystal chandelier, surrounded by scattered rose petals. The pose is relaxed yet powerful, with sharp, clear shadows.

      Bottom right corner: A frontal half-body or three-quarter-length portrait of the model against a pure red or deep red background. The model holds a large bouquet of deep red roses in her right hand, stylishly positioned on her right arm, looking directly at the camera. A few white particles, like snowflakes, float in the air. The four photos maintain a consistent color tone and a fashionable, dramatic atmosphere.
