tasks:
  - folder: ../Media Files/Nano Banana/1217 3 Styles/1217 My word of the year
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Use the uploaded person photo. Do NOT change the person’s face, identity, or appearance.

      Create a photorealistic Japanese “Kanji of the Year” ceremony scene at a temple terrace. Natural lighting.

      Composition:
      - The person faces FORWARD toward the camera (not side view), holding a large calligraphy brush with ink on their hands, as if they just finished writing.
      - On the right side, place a large vertical white calligraphy paper with ONE random Kanji.

      Calligraphy requirements:
      - Extremely expressive bold ink strokes.
      - Strong brush texture, flying white streaks, heavy ink pooling, natural brush pressure changes.
      - Feel like dynamic Japanese sumi-e calligraphy, very powerful and artistic.

      Integrate the person naturally, with realistic shadow and depth. Maintain facial accuracy.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false

  - folder: ../Media Files/Nano Banana/1217 3 Styles/1217 Breaking News CNN
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      A perfectly front-facing shot of a modern flat-screen TV mounted on a living room wall.
      The TV must be shown straight-on with no tilt or perspective distortion.
      A warm, cozy living room surrounds the TV, with natural lighting, plants, wood textures, and simple interior decor.

      INSIDE THE TV SCREEN:
      Display a full BREAKING NEWS broadcast labeled clearly as “NEWS” (NOT NHK).
      All channel logos, corner bugs, headlines, or watermarks that would normally show NHK
      must instead display the text “NEWS” only.

      Do not blur, mirror, or smear the edges of the uploaded photo.
      Instead, use natural content-aware extension so the background is organically continued
      and seamlessly blended across the full screen.

      NEWS SCREEN REQUIREMENTS:
      - Red BREAKING NEWS banner
      - White headline bar with bold black text
      - Channel identifier text must read “NEWS” (no NHK text anywhere)
      - Auto-generate a humorous fictional headline that directly relates to elements detected
        in the uploaded photo
        (for example: if holding flowers → headline about securing last bouquet;
        if holding bubble tea → headline about bubble tea success;
        if smiling outdoors → headline about joyful lifestyle moment)
      - Optional scrolling ticker with light-hearted updates

      Ensure the TV screen glow, contrast, reflections, and edges look realistic.

      The entire output should include the TV and the living room background,
      not only the photo itself.

      High resolution, realistic lighting, natural content-aware fill.
      3:4 ratio.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false

  - folder: ../Media Files/Nano Banana/1217 3 Styles/1217 Breaking News NHK
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      A perfectly front-facing shot of a modern flat-screen TV mounted on a living room wall.
      The TV must be shown straight-on with no tilt or perspective distortion.
      A warm, cozy living room surrounds the TV, with natural lighting, plants, wood textures,
      and simple interior decor.

      INSIDE THE TV SCREEN:
      Display a Japanese public-broadcast–style news program (NHK-style in tone and layout),
      featuring the uploaded person.

      Do not blur, mirror, smear, or soften the edges of the uploaded photo.
      Use natural content-aware background extension so the image fills the entire TV screen
      as one continuous, realistic scene.

      NEWS SCREEN REQUIREMENTS (NHK-STYLE, BUT NO NHK TEXT):
      - Clean, minimal lower-third headline bar in blue and white
      - Calm, neutral Japanese news typography
      - Channel identifier text must read “NEWS” only
      - A concise, factual Japanese headline that directly relates to elements detected
        in the uploaded photo
        (e.g. flowers → 「花束を手に入れる様子を取材」)

      ADD SUBTLE PUBLIC-BROADCAST INFORMATION ELEMENTS:
      - Top-left or top-right small channel logo reading “NEWS” (NOT NHK)
      - A digital clock in the corner (e.g. 7:12)
      - A small location tag such as 「東京・渋谷」 based on scene context
      - A compact weather indicator in one corner (e.g. ☀ 22°C or ☁ 18°C)
      - Optional small LIVE indicator if appropriate
      - Optional thin secondary subtitle line under the main headline for added context

      DESIGN CONSTRAINTS:
      - All on-screen elements must be subtle, restrained, and secondary
      - No bold red banners
      - No American-style breaking news graphics
      - No flashy animations or heavy overlays
      - Maintain a calm, documentary-style Japanese public news tone

      Ensure realistic TV screen glow, proper contrast, soft reflections,
      and accurate brightness.

      The final image must include the full TV frame and the living room environment,
      not only the photo itself.

      High resolution, natural lighting, seamless content-aware fill.
      3:4 ratio.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false

  - folder: ../Media Files/Nano Banana/1217 3 Styles/1217 Another Life
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      A 3:4 cinematic multi-panel composition divided into four equal frames, each representing a different alternate-life universe of the same woman based on the uploaded photo.

      The style must reference the visual tone of the Japanese drama “Rebooting Life（重啟人生）”:  
      quiet realism, soft natural lighting, pastel color palette, subtle emotional depth, documentary-like framing, and gentle film grain.

      Use the uploaded woman as the protagonist.  
      Do not change her facial identity, ethnicity, hairstyle length, or core appearance.  
      Maintain photorealistic Japanese TV-drama aesthetics: simple makeup, natural expression, realistic skin texture.

      Generate **four distinct life paths** for her.  
      Each panel should present a clearly different universe with significantly contrasting life choices, environments, and roles.  
      Gemini may freely decide the careers, lifestyles, or major life directions, as long as the four universes are meaningfully different from one another.

      For each of the four panels:
      - Keep her facial identity consistent.  
      - Place her in a unique alternate life with strong visual storytelling.  
      - Ensure the scenarios feel grounded, human, and realistic—no fantasy or sci-fi.
      - Use natural, soft, cinematic Japanese-drama lighting.
      - Include everyday textures, quiet emotional moments, and subtle slice-of-life composition.

      All four panels must share:
      - A cohesive color palette
      - Naturalistic lighting
      - Consistent cinematic realism
      - Japanese drama–inspired framing

      High resolution.  
      Photorealistic, understated, emotional, and gently cinematic.  
      Aspect ratio: 3:4.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false

  - folder: ../Media Files/Nano Banana/1217 煙火 四公格-鬆弛感UP
    model: gemini-2.5-flash-image
    resolution: 
    aspect_ratio: 
    prompt: |
      Use the uploaded person exactly as they were, maintaining the same facial features, proportions, face shape, hair texture, makeup, expression, body proportions, and natural temperament.

      Generate a four-frame collage of equal size, each frame feeling like a real New Year’s Eve moment captured by a handheld camera with strong, direct on-camera flash. The images must not look posed or studio-like; they must feel spontaneous, imperfect, and full of movement, as if a friend captured them during a night celebration outdoors.

      and the intense direct flash creates slight overexposure on the skin, glossy highlights on the shoulders and cheeks, and small blown-out reflections in the eyes. The subject’s expressions must shift subtly between frames—real smiles, small laughs, relaxed eye contact, or glancing to the side—never the controlled expression of a formal photoshoot. The skin glow should come from the flash, not from soft beauty lighting, and the background should remain dark, grainy, and filled with distant lights and silhouettes of people, giving a lively festival atmosphere.

      Clothing

      The upper body must consist of a white sweatshirt and a loose black leather jacket, while the lower body must be fitted with ripped black jeans. Women's clothing is strictly prohibited.

      In the upper-left frame, a Very close-up view of the subject with fireworks exploding behind them the composition captures a close candid moment, as if shot just as the subject turns toward the camera with a natural,  smile, fireworks blooming behind.

      In the upper-right frame, show the subject from half-body distance, standing outdoors and facing the fireworks while turning their head back toward the camera with a bright, celebratory expression. The background should show an open nighttime space—such as a waterfront, beach, or riverside—with fireworks lighting the sky. The pose must look natural and festive. not intentionally posed, and the expression is soft but unguarded.

      In the lower-left frame, the subject appears in a three-quarter-body shot on a lively nighttime street, captured in a candid celebratory moment. 

      In the lower-right frame, the subject holds a sparkler in the most natural, real-life way—Shaky camera .arm relaxed, wrist loose, not lifted deliberately for the camera—while the flash and sparkler light mix to create uneven shadows and warm reflections, and the expression shows a candid moment rather than a performance for the lens.

      The entire collage must feel like authentic nightlife snapshots: slightly imperfect, full of movement, flash-heavy, high-contrast, and emotionally alive, with no staged gestures, no symmetrical posing, and no beauty-shoot atmosphere—only the spontaneous charm of real New Year fireworks caught in fleeting moments.

    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false

  - folder: ../Media Files/Nano Banana/1216 6 Styles/1216 Future Storyboard
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "9:16"
    prompt: |
      Create a strictly 9:16 vertical image with a consistent light warm-beige paper background, soft natural lighting, and subtle clean paper texture. Place the user’s uploaded photo in the upper left as a complete, intact Polaroid—slightly tilted, taped to the page, and kept exactly as is in full color with no distortion or cropping. In the center, vertically stack three comic-style panels outlined by a single thin black line, positioned with generous margins and vertically centered. The comic panels must be entirely black-and-white only, using pencil or ink texture with absolutely no color. Turn the uploaded photo into one of these black-and-white illustrated panels while keeping its composition recognizable, and use the remaining panels to show future-oriented moments that grow naturally from the mood or content of the original photo. Add handwritten storytelling notes placed randomly to the left or right of each panel in casual handwriting. Include one small, high-quality colored artistic sticker with hand-drawn texture, placed naturally on the page without covering the Polaroid or the comic panels.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 1
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/1216 6 Styles/1216 Collage V1
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "9:16"
    prompt: |
      Generate a 9:16 vertical layout in a cold, minimal, high-fashion editorial style. The entire scene must remain strictly on a flat surface with no depth, no perspective, and no floating elements. Use a smooth, solid gray background viewed from a straight-down, top-view angle.

      Place a large white sheet of paper at the center of the composition. On this sheet, print three elements as a single centered text block:
      “2025” + a title inspired by the theme of the user-uploaded photos + a short documentary-style line that feels minimal and poetic.
      The typography should be small, elegant, understated, and positioned precisely in the visual center of the sheet.

      Around the central sheet, place Polaroid-style photographs. The number of Polaroids must match the number of images uploaded by the user. Each Polaroid must display one user-uploaded photo exactly as provided, without altering its content except for natural cropping to fit the frame. The photo inside each Polaroid should appear naturally centered. The Polaroids should be noticeably larger than typical instant-film proportions, giving them more visual weight in the layout.

      Arrange the Polaroids in an intentionally asymmetrical, organic layout on the flat surface. They may be slightly rotated or offset, but they must remain fully grounded with no elevation. Use soft, diffused, low-contrast shadows directly beneath the Polaroids and the central sheet to reinforce the flat tabletop placement.

      Maintain a cold, minimal, quiet fashion aesthetic throughout. Do not include props, hands, decorative elements, environmental cues, or anything beyond the sheet, Polaroids, and flat gray surface.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/1216 6 Styles/1216 Collage V2
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "9:16"
    prompt: |
      Create an elegant 9:16 collage page using a ring–binder notebook as the fixed background. Keep the notebook background unchanged and place the user’s uploaded photos exactly as they are, with no edits, alterations or distortion of any kind, ensuring the original proportions remain intact. Arrange the photos in a clean, balanced layout that feels modern, minimal and aesthetically refined, using soft warm lighting and gentle neutral tones that feel cozy without turning yellow, maintaining a clear and fresh atmosphere. Use a mix of subtle typography, combining simple printed text with a few light handwritten-style accents, without introducing any dates or year numbers. Add small graphic details such as neat labels, minimal tape pieces or understated design elements that complement the photos without overpowering them. Maintain a high-quality, contemporary and quietly sophisticated mood, allowing the user’s photos to remain the main focus while the surrounding text and layout gently enhance the visual tone.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/1216 6 Styles/1216 Collage V3
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "9:16"
    prompt: |
      Create a 9:16 image in a clean iOS-inspired style, featuring a floating file-browser window placed very close to the canvas edges with only a thin border of the background visible. The background should be a soft, scenic image related to the general theme of the user’s photos, such as nature, city, beach, or any environment that visually fits the content. The window must include clear UI elements—the top bar, the three window control buttons, and a folder title automatically generated based on the overall subject of the user-uploaded photos. Inside the window, arrange the photos in a loose, random, non-grid layout, keeping each image unchanged with sharp corners, no cropping, no distortion, and adding a subtle drop shadow to every photo for depth. Add a simple filename below each image using short text derived from the content of each photo. Maintain a modern, minimal iOS aesthetic that keeps the user’s photos as the central focus while ensuring the UI elements and scenic background feel cohesive and clean.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/1216 6 Styles/1216 My Keychain
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "9:16"
    prompt: |
      A clean, strictly top-down product layout captured from a perfectly perpendicular overhead viewpoint, with no tilt, no angle, and no perspective distortion. The background resembles a tablecloth rendered in a softly tinted, low-saturation color that harmonizes with the subject’s palette while remaining visually subtle and never overpowering the keychain set. The upper left corner includes the words “Annual Selection” in cursive script, with “Annual Selection Photo” placed below it. The tablecloth surface features gentle small-scale patterns such as checks, florals, or linear motifs to add texture without drawing attention away from the foreground. Every uploaded image is processed to extract multiple distinct objects, with the main extracted character always converted into the primary acrylic keychain charm; the character must appear as a full or partial body and never as a head-only crop. All visuals must remain in realistic photographic style with authentic material textures and absolutely no illustration or drawn effects. The keychain cluster must include a translucent, colored acrylic star-shaped charm—similar to a hollow star frame—where the tint adapts harmoniously to the overall color palette. Additional extracted elements may be transformed into various accessory charms featuring realistic three-dimensional materials, such as glossy plastic, satin-like surfaces, or soft plush textures as an optional variation. These charms are arranged densely around the keychain rings and decorative cord to form a rich clustered set. The cord features a cute multi-strand woven design with playful knots, subtle striped threads, and polished metal or resin end caps for a handcrafted premium look. No extra decorative objects or clipped images appear in the layout—only the keychain set rests on the softly colored patterned background. The overall presentation is realistic, crisp, high-quality, and cohesive, with clean edges and soft shadows enhancing the photo-based product display.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 2
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/1216 6 Styles/1216 跨格互動
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "4:5"
    prompt: |
      Create a split-frame composition with two separate photos arranged in a top-and-bottom layout, divided by a clear, sharp horizontal seam. Each subject is focused on the upper body and may break out of their own frame naturally, allowing parts of the body to extend beyond the border without background blending. The two subjects should engage in natural, expressive physical interaction across the seam, with gestures or movements that clearly connect them while still keeping the frames distinct. The seam remains visible and unblended, and only the subjects’ actions may cross it. Maintain consistent lighting and photographic style so the images feel connected while remaining two separate frames
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 2
    num_iterations: 50

# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (images can be reused)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: true
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
