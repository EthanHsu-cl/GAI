# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (NO REPEATS until pool exhausted)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    optimal_formula: "sources_needed = num_iterations × (min_images + max_images) / 2"
    
    selection_modes:
      sequential_sorted: |
        Default mode. Images sorted alphabetically, consumed in order.
        Predictable, consistent order every run. Best for sequential pairing.
      deterministic_random: |
        Images shuffled with deterministic seed, appears random but reproducible.
        Same seed = same "random" order every run. Best for randomized variety while maintaining reproducibility.
    
    use_deterministic_random: |
      Set to true to enable deterministic randomization (shuffles with seed).
      Set to false or omit for sequential sorted mode (alphabetical order).
      
    random_seed: |
      Optional explicit seed for deterministic random mode (any integer).
      - If specified: Uses this exact seed every time (full manual control)
      - If omitted: Auto-generates seed from folder path hash (consistent per folder)
      AUTO-SEED BEHAVIOR: Seed is based on the folder path STRING from config.
        - Same folder string = same seed = same shuffle (reproducible)
        - Different path formats = different seeds (e.g., "./path" vs "path")
        - Recommended: Use explicit random_seed for guaranteed consistency
    
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations (even bucket distribution)
      - NO REPEATS: Pool is consumed sequentially (sorted or shuffled based on mode)
      - If sources < optimal, images will repeat across cycles (with warning)
      - FULLY DETERMINISTIC: same config + same sources = identical selections every run
      - Selection mode and seed are logged and stored in metadata for reproducibility
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    
    formula_examples: |
      # min=1, max=4, iterations=50 → need 50 × (1+4)/2 = 125 sources
      # min=1, max=5, iterations=50 → need 50 × (1+5)/2 = 150 sources
      # min=1, max=3, iterations=50 → need 50 × (1+3)/2 = 100 sources
    
    example_sequential: |
      # Sequential mode: Images A,B,C,D consumed in alphabetical order
      use_random_source_selection: true
      min_images: 1
      max_images: 4
      num_iterations: 50
      # use_deterministic_random: false  # Default, can be omitted
      model: gemini-3-pro-image-preview
    
    example_random_autoseed: |
      # Deterministic random with auto-seed (based on folder path)
      use_random_source_selection: true
      use_deterministic_random: true  # Enable randomization
      min_images: 1
      max_images: 4
      num_iterations: 50
      model: gemini-3-pro-image-preview
    
    example_random_explicit: |
      # Deterministic random with explicit seed (full control)
      use_random_source_selection: true
      use_deterministic_random: true
      random_seed: 42  # Always uses seed 42
      min_images: 1
      max_images: 4
      num_iterations: 50
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
