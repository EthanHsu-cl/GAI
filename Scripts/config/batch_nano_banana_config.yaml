    aspect_ratio: "3:4"
    prompt: |
      Create ONE single Lunar New Year “斗方” using the uploaded image
      (any subject type: person, baby, pet, or group photo).

      This is a HYBRID OUTPUT:

      The outer 斗方 shape must be completely flat and print-ready

      The inner content may contain photographic or illustrated elements

      Do NOT convert the entire image into a flat illustration style.

      ASPECT RATIO

      Final image must be vertical 3:4.

      BACKGROUND & CUTTING GUIDE (REQUIRED)

      The background must be pure, clean white.

      Outside the 斗方, add a clear cutting guide:

      Thin dashed outline following the exact diamond shape of the 斗方

      Optional small scissor icon near the guide

      Cutting guides must:

      Exist ONLY in the white background

      Never touch or overlap the 斗方 artwork

      The cutting guide is a visual reference only, not part of the 斗方 design.

      CRITICAL FLATNESS RULE (OUTER SHAPE ONLY)

      The 斗方 itself must be perfectly flat:

      NO paper folds

      NO creases

      NO bending

      NO curled corners

      NO paper shadows

      NO physical paper texture

      Treat the 斗方 as a flat printed design, not a photographed object.

      INNER CONTENT STYLE (CONTROLLED FLEXIBILITY)

      The content inside the 斗方 may include:

      Photorealistic portraits

      Photo-based cutouts

      OR a semi-illustrated / portrait-style rendering similar to the previous reference results

      Illustration-style rendering is ALLOWED but must:

      Preserve facial identity and key features

      Not simplify into cartoon or sticker style

      The choice between photorealistic or illustrated rendering may be randomized,
      but the outer 斗方 design must remain consistent.

      MANDATORY SUBJECT INCLUSION (NO EXCEPTIONS)

      ALL people and/or pets in the uploaded image MUST appear.

      No omissions, no replacements, no partial inclusion.

      Do NOT add extra people or animals.

      Subjects must remain clearly recognizable.

      STRICT COMPOSITION RULES

      The image must contain ONLY ONE 斗方.

      The 斗方 must be:

      Square (1:1)

      Rotated 45 degrees (diamond orientation)

      Centered with generous white space around it

      DESIGN & COLOR REQUIREMENTS

      Base color: rich Lunar New Year red

      Gold used as accent only (text, borders, decorative elements)

      Overall design language should match:

      Traditional Lunar New Year door couplet aesthetics

      The previously referenced door-mounted 斗方 style

      CONTENT

      Include ONE main Chinese New Year character or phrase (e.g. 福).

      The year 2026 may appear.

      Decorative elements may include:
      clouds, firecrackers, coins, peanuts, gold ingots, pineapple, 财神

      Decorations must remain graphic and flat, supporting the design.

      FINAL GOAL

      A print-ready Lunar New Year 斗方 on a white background,
      with:

      A perfectly flat, clean-cut outer shape

      Hybrid inner content (photo or illustrated portrait)

      Clear cutting guide outside the artwork

      No folds, no paper shadows, no physical paper behavior

      Optimized for printing, cutting, and real-world use,
      while preserving the festive, traditional New Year aesthetic.
