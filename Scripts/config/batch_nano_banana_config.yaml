tasks:
  - folder: ../Media Files/Nano Banana/0120 4 Styles Creative Studio 2/0120 Collage - Light Leak Snapshot
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      Create a film-style visual layout designed strictly as a reusable presentation template.

      ### Composition & Film Strip Structure
      The central element is one vertical black film strip placed perfectly at the center of the canvas. This strip must occupy approximately 80% of the total image height. It must not touch the top or bottom edges of the image, leaving visible, balanced padding above and below.

      The film strip holds exactly vertically stacked photo frames. The film border is always solid black, clean, and uniform, resembling real photographic negative film. Add subtle, understated film-style markings to this border, such as small technical text (e.g., "KODAK PORTRA 400"), frame numbers (e.g., "14", "14A"), or minimal symbols commonly found on negatives. These markings must be decorative and non-distracting.

      ### Background Generation & Effects
      The background filling the entire canvas behind the film strip must be a generated image.
      - Content: Generate a natural landscape scene with sky or a composition of natural elements. The background must contain no people, man-made structures, or distracting subjects.
      - Tonal Matching: The color palette, lighting temperature, and overall atmosphere of this generated natural background must be directly derived from, and complementary to, the dominant tones found within the three photos inside the film strip.
      - Darkening & Texture: The entire generated background must be significantly darkened overall so it visually recedes. Apply a very subtle, fine film grain effect across the background, most noticeable near the bottom area.
      - Light Leak: Add a warm, softly diffused light leak effect exclusively to the background image, positioned prominently along the right edge. Do not apply any light leak to the film strip itself.

      ### Photo Treatment (Inside the Film Strip)
      Strictly preserve all user-uploaded photos inside the frames: DO NOT alter faces, features, expressions, poses, or objects. DO NOT warp, crop, or change their original aspect ratio.
      - Filter: Apply a consistent analog / cinematic film filter only to the three photos within the strip (soft contrast, subtle color shifts, natural nostalgic tone).
      - Vignette: Apply a subtle film-style vignette gently darkening the edges and corners of each of the three photo frames.

      ### Typography
      Add exactly two handwritten-style words in an elegant, delicate script font. The words should be inspired by the emotional theme of the photos.
      - Word 1 Placement: Near the bottom-left area of the second (middle) photo frame.
      - Word 2 Placement: Near the top-right area of the third (bottom) photo frame.
      - Each word may slightly overlap its respective photo frame and extend onto the surrounding background, creating a layered, organic look.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 3
    max_images: 3
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0120 4 Styles Creative Studio 2/0120 美式高校置物櫃
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "2:3"
    prompt: |
      Use the provided 2–5 input photos as visual source materials and transform them into a single, cohesive final artwork inspired by an American high school locker aesthetic.
      The entire background must be the surface of a school locker only. The locker door fills the entire frame with no visible hallways, classrooms, or surrounding school environments. Everything appears attached directly onto the locker surface.
      Set the locker background color to a fixed pink tone defined by the HEX color code #ff82a0.
      Treat this color as locked and non-negotiable. Do not increase saturation, do not shift hue, and do not reinterpret this pink. Avoid neon, fluorescent, overly vivid, or pastel variations. The locker color must stay within this exact pink range.
      Apply this pink to a metal locker surface with a slightly matte-to-satin finish. Subtle reflections, soft highlights, and horizontal locker vents should remain visible without altering the base color.
      At the center, place a slightly wrinkled poster or paper sheet taped casually onto the locker door. Integrate the people or subjects from the input photos into this central poster area, arranged as a cohesive group image resembling a fashion editorial, pop album cover, or stylized yearbook photo.
      Surround the central poster with playful locker decorations: stickers, star shapes, ticket stubs, doodles, handwritten-style graphics, polaroid photos, and nostalgic icons. These elements should complement the fixed pink locker color without overpowering it.
      The overall mood should be youthful, nostalgic, and feminine with a Y2K-inspired “hot mess” locker aesthetic. Maintain balanced saturation, soft contrast, and a polished scrapbook collage finish.
      Ensure the final output looks like one finished poster-style artwork photographed directly on a pink locker door, with the locker’s color clearly framing the entire composition.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0120 4 Styles Creative Studio 2/0120 拍貼系列-Style3 2020S
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "3:4"
    prompt: |
      Use all uploaded photos as the only subjects. Their real identities must remain recognizable and consistent.
      Preserve the subjects’ facial features, identity, skin tone, hairstyle, and body proportions EXACTLY as in the uploaded photos.
      Do not redraw, replace, or re-generate the people.
      Adding any other person or repeating the same person is prohibited.
      This is a photographic purikura-style filter application inspired by CURRENT Japanese purikura trends (FJK / SJK / LJK),
      NOT a realistic portrait and NOT a modern beauty editorial.

      Identity preservation rules

      – The same people must remain clearly identifiable
      – Facial structure, face shape, and hairstyle must remain consistent
      – Do NOT replace faces
      – Do NOT turn subjects into illustrations, anime, or dolls

      Facial treatment (EYES ARE CRITICAL – CURRENT PURIKURA STYLE)

      – Eyes must appear about 25–30% larger than the original image, achieved through facial proportion refinement, NOT exaggerated scaling
      – Slightly taller eye shape with soft rounded corners
      – Clean, soft upper eyelid line (no harsh eyeliner, no cat-eye)
      – Subtle lower eyelid fullness (natural aegyo-sal impression, not drawn)
      – Iris size and color remain realistic (no glow, no anime shine)
      – Eye whites clean and bright but NOT over-whitened
      – Eyes must feel soft, friendly, and human, never cartoonish or doll-like

      Face & skin:
      – Overall face slightly more compact and centralized (very subtle)
      – Mild jawline softening only
      – Skin retouching light, clean, and purikura-like
      – No plastic skin, no heavy whitening, no editorial beauty look.

      Style & booth identity

      Create a playful four-frame photo-booth collage styled like a CURRENT Japanese purikura booth popular among FJK / SJK / LJK.

      Overall vibe:
      – cute
      – trendy
      – clean
      – soft
      – girly
      – Instagram-ready
      – unmistakably modern Japanese purikura aesthetic

      Layout

      – Perfect 2×2 four-frame grid
      – Equal-sized panels
      – Seamlessly stitched edge-to-edge
      – NO borders, margins, dividers, or white lines
      – One unified purikura output (not separated images)

      Subjects & poses (REFERENCE-ALIGNED)

      – All subjects must appear together in all four frames
      – Relative positions and scale remain consistent across frames
      – Each frame must feature a DIFFERENT pose
      – Poses must closely imitate the reference purikura poses, including:
        • peace signs close to the face or eyes
        • cheek-touch pose
        • finger-heart near chin
        • slight head tilt with close shoulder distance
        • leaning together for intimacy
      – Expressions should be soft, cute, and natural:
        gentle smile / shy smile / light pout
      – Avoid exaggerated comedy poses or large spacing between subjects
      – Clothing must remain unchanged

      Head accessories (KEY UPDATE – MORE VIVID & EXAGGERATED, REF-ACCURATE)

      – Add bows or headbands to SOME subjects only
      – Accessories appear in RANDOM 1–2 frames only
      – At most TWO frames may contain head accessories
      – Never appear in all four frames

      – Sequined pink ribbon headband
      – Lace plush headband (soft, fluffy texture)
      – Kitty-style pink glitter bow headband (purikura booth rental feel)

      – Accessories should feel playful, bold, and slightly exaggerated
      – Slightly oversized but controlled
      – Clearly readable at thumbnail size

      Color direction (IMPORTANT):
      – High-saturation candy colors:
        hot pink, vivid baby pink, cherry red, bright mint green
      – Must stand out clearly from hair and background
      – Avoid muted or dusty tones

      Placement rules:
      – On top of the head or slightly off-center
      – Do NOT obscure bangs, eyes, eyebrows, or facial features

      Restrictions:
      – Do NOT use animal ears
      – Do NOT use cosplay or luxury accessories
      – Do NOT overload accessories

      Background & lighting

      – Simple, clean purikura booth background
      – Soft pastel tones only (pink / white / light purple)
      – Flat, friendly booth lighting
      – Soft glow without haze
      – No detailed environments

      Decorations (CRITICAL UPDATE – HEARTS ONLY, NON-NEON, REF-MATCHED)

      – DO NOT add ANY text, letters, numbers, words, or typography of any kind
      – DO NOT add speech bubbles, stars, sparkles, stickers, outlines, glow effects, or neon effects
      – Add ONLY hand-drawn heart doodles

      Heart appearance (STRICTLY MATCH REFERENCE – NOT NEON):

      – Hand-drawn pen / marker style (like writing directly on purikura print)
      – Flat color fill or simple outline ONLY
      – NO glow, NO neon, NO light emission, NO gradient
      – Uneven, imperfect stroke thickness
      – Slight wobble, casual asymmetry
      – Organic, human-drawn feeling
      – NOT vector, NOT sticker-like, NOT digital icon style

      Heart color palette ONLY:
      – hot pink
      – bright red
      – vivid pastel pink
      – matte or flat ink appearance (no shine)

      Heart distribution rules (VERY IMPORTANT):
      – ONLY 2 out of the 4 frames may contain hearts
      – The remaining 2 frames must have ZERO decorations
      – Do NOT distribute hearts evenly across frames
      – Heart quantity must be limited and intentional (a few hearts per frame)

      Placement:
      – Floating loosely around faces, cheeks, or hands
      – Near gestures (peace signs, finger-heart)
      – Never overlapping eyes, eyebrows, nose, or mouth
      – Must float clearly ON TOP of the photo layer

      STRICTLY FORBIDDEN:
      – Neon-style hearts
      – Glowing or luminous hearts
      – Gradient or outlined neon hearts
      – Hearts in all four frames
      – Any symbols other than hearts
      – Decorative overload

      Mood & intent

      Cute, intimate friendship memories captured in a CURRENT Japanese purikura booth.
      The final image should feel:
      – pastel
      – bubbly
      – clean
      – softly retouched
      – trendy
      – unmistakably modern Japanese purikura.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0120 4 Styles Creative Studio 2/0120 旅遊機票
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:5"
    prompt: |
      Use the uploaded photo as the primary subject. The person in the photo becomes the main character.

      Preserve the facial features clearly and accurately, maintaining natural proportions, and ensure the face is clearly in focus.

      Do not alter the person's identity, facial features, face shape, skin tone, body proportions, or hairstyle.

      Create a simple, neutral, and balanced realistic travel flat lay photograph.

      Use a strict overhead perspective (flat lay perspective) for the entire scene.

      Randomly generate a city from around the world, emphasizing randomness; do not pre-set or imply any city.

      Exclude Kyoto. Kyoto must not appear or be selected in any form.

      Convert the uploaded photo into a Polaroid photograph taken at a randomly generated city's famous landmark.

      Polaroid photographs exhibit subtle, instant imaging effects with soft film grain, gentle tonal transitions, and subtle simulated filters, while maintaining a realistic and natural texture.

      The Polaroid photograph is located at the visual center and is the main focal point of the composition.

      The Polaroid photograph must occupy at least 50% of the entire image area, clearly occupying the center of the frame and becoming the undisputed visual focal point.

      The cityscape in the Polaroid photograph should present a modern yet natural style:

      Natural sunlight, clear skies, neutral-toned architecture, and realistic colors.

      There should be no sunset atmosphere, no golden hour light, and no nostalgic or retro feel.

      Add handwritten text in the lower right corner of the white Polaroid frame, displaying only the city name.

      The handwritten font should be natural, clean, simple, and legible, without any decorative fonts or other text.

      Around the Polaroid photograph, place 3-4 iconic items or miniature landmarks related to the randomly generated city (e.g., souvenirs, architectural models, cultural symbols, maps, food, or travel goods).

      All auxiliary items must be unique and cannot be duplicated.

      Duplicate items, mirrored copies, or duplicate instances of items are not allowed.

      No two auxiliary items can belong to the same category or type.

      Each object must represent a distinct category (e.g., a miniature landmark, a cultural symbol, a food item, a travel accessory, a ticket-like item).

      No multiple objects of the same type may be included under any circumstances.

      All objects must be placed on the same plane as the map.

      Objects must not float or hover.

      Each object must be in full contact with the plane and cast a natural contact shadow.

      All supporting elements must be placed adjacent to the Polaroid photograph and arranged closely around it.

      Objects must be arranged in a compact, tiling composition with minimal spacing.

      Objects visually cluster around the Polaroid photograph with minimal gaps between them.

      Multiple objects must touch or be close to the edges of the Polaroid photograph and the frame.

      Some objects may be partially cropped by the frame to reinforce the compact, edge-to-edge layout.

      The total area of ​​the Polaroid photograph, the ticket, and surrounding objects must exceed 85% of the frame.

      There should be virtually no blank or negative space in the image.

      Place a ticket next to the Polaroid photograph. The destination city name on the ticket must be clearly visible, unobstructed, and easily identifiable at all times.

      It must not be cropped, obscured, or partially hidden.

      Do not add any labels such as "Name," "Passenger Name," individual names, or form fields.

      The background is a large world map occupying the entire frame.

      The map surface is a very light off-white tone.

      Land and sea areas are presented in extremely low contrast, almost identical tones, with only subtle tonal differences distinguishing them.

      Geographical outlines are almost invisible and slightly faded.

      The map appears visually recessed and understated, serving only as a background layer and not clashing with the Polaroid photo, ticket, or surrounding objects.

      Soft natural light shines in from one direction.

      The soft sunlight falls on the world map,

      creating dappled light and shadow that enhances the map's texture while maintaining a subtle and unobtrusive effect.

      Light and Atmosphere:

      Balanced exposure, natural contrast, and simple composition.

      A modern, sophisticated, and realistic style.

      It explicitly rejects retro and nostalgic elements.

      There is no old-fashioned, vintage, rustic, or outdated aesthetic.

      No specific year or period is mentioned.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 3
    max_images: 3
    num_iterations: 50


