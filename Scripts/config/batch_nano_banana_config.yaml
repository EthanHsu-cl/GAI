tasks:
  - folder: ../Media Files/Nano Banana/0122 7 Styles Creative Studio/0122 Collage - Cork Board
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Create a cork board–style bulletin board collage with a warm, cozy, and creative scrapbook feeling. The user will upload between two and five photos, and the final composition must display no more than five photos in total. These photos should be presented as a mix of regular photo prints and Polaroid-style images, naturally arranged and pinned onto a realistic cork board background. All Polaroid-style images must have completely blank lower frames, with no text, captions, numbers, or dates displayed. The photos themselves must remain exactly the same as the original user uploads without any alterations to the content, except for possible cropping of the lower body if needed to fit the layout.
      The overall composition should feel handmade and organic, with photos slightly tilted or overlapping, secured by push pins, clips, or pieces of tape. Add AI-generated decorative elements such as playful stickers, big hearts, different colored synthetic fiber star badges, doodles, stamps, and sparkles to enhance the collage. Include memo notes, sticky notes, or postcards with handwritten or casual typography that complements the photos. No dates, timestamps, calendars, or date-related numbers should appear anywhere in the entire image, including on photos, papers, notes, receipts, or decorative elements.
      Generate one receipt-style paper that reflects the content of the scene, summarizing the visual theme, memories, keywords, or short phrases inspired by the uploaded images. All paper elements should have realistic textures, soft shadows, and subtle depth to create a believable cork board pinboard effect.
      The final output should be a single high-resolution image that looks like a carefully curated cork board collage, with balanced composition, cohesive colors, and a polished yet imperfect, human-made aesthetic consistent with the reference image.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0122 7 Styles Creative Studio/0122 Collage - Photo Strip
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      Using the provided image as the final visual reference, generate a clean and modern “Photo Strip” composition. The user will upload between one and three photos only, and these original photos must not be altered, stylized, recolored, enhanced, or regenerated in any way. Each uploaded photo should visually occupy approximately 50%–60% of the total canvas width, ensuring a strong presence while maintaining balanced negative space. Place a vertical photo strip centered on the canvas, featuring a solid white frame that resembles a classic photo booth strip. The uploaded photos should appear inside the strip in their original quality and order. For the background, generate a full-bleed landscape image that visually echoes and harmonizes with the user’s uploaded photo (e.g., similar setting, mood, colors, or environmental elements), and crop and scale it proportionally to fill the entire canvas. Do not combine multiple uploaded photos to form the background under any circumstances. Remove any light leak, film burn, or vintage exposure effects so the overall aesthetic remains crisp, bright, and contemporary. Add small, decorative, randomly generated text elements on the white photo strip only; these texts should be inspired by the photo content or atmosphere, such as casual phrases, place-related words, or abstract design labels, and should function purely as visual decoration. Maintain a strong visual hierarchy with the centered photo strip as the primary focal point, balanced spacing, and a refined editorial layout aligned with modern lifestyle and design lab aesthetics, while strictly preserving the integrity of all user-uploaded photos.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 3
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0122 7 Styles Creative Studio/0122 Collage - Modular
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      Create a single, vertically oriented modular photo story layout that resembles a cinematic travel journal webpage, presented as one complete scrollable composition. Use one user-uploaded photo as a full-width hero background at the top, with a black gradient overlay (darker at the bottom, lighter at the top) to ensure strong text contrast. Overlay large bold title typography, a smaller location subtitle, navigation-style labels (e.g., “Home”, “Photos”, “Stories”) near the top, a visible date, and a short reflective paragraph aligned left in a clean editorial layout.
      If fewer than six photos are uploaded, generate additional images to support the modular layout. Generated images should either complement the uploaded photos thematically, maintaining strong visual coherence and consistent style.Each photo should function as an independent module while adhering to a strict grid system, and no photo may be repeated—each user-uploaded or generated image may appear only once within the composition.
      As the layout scrolls downward, deepen the black gradient into a darker midsection. Place the remaining user-uploaded photos (up to five) into a centered horizontal carousel module with consistent sizing and spacing. Include visible left and right navigation arrows styled as modern, semi-transparent white carousel controls layered above the images to clearly suggest interactivity. Each photo should function as an independent module while adhering to a strict grid system. Beneath the carousel, add small UI-style supporting text modules that match the overall typographic hierarchy.
      In the lower half, transition the gradient into another large background image to maintain vertical continuity. Overlay minimal footer-style text such as story credits or a subtle social reference.
      Additional rule: the bottom background image should, whenever possible, use one of the user-uploaded photos (preferably a different one from the top hero image) rather than a fully generated image.
      The overall aesthetic should be cinematic and modern, with warm natural tones, deep blacks, soft shadows, consistent typography, and a polished travel story webpage mockup feel.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0122 7 Styles Creative Studio/0122 Collage - Airdrop post
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      The user will four photos (maximum four). The four uploaded photos must be displayed in a strict 2×2 grid layout, evenly aligned with equal spacing, with no variation in size, position, or arrangement. Based on these images, generate a polished, modern fashion lookbook interface that closely resembles an iOS photo album screen. All visual content must be strictly limited to the images uploaded by the user; no additional images may be automatically generated under any circumstances.
      At the very top of the screen, include a clean, minimal album title that reflects the shared theme, mood, or usage scenario inferred from the user’s uploaded photos, written as a short category-style phrase rather than a full sentence. Most importantly, place a clearly visible iOS-style modal popup in the exact center of the screen, appearing as a foreground overlay above the image grid. The modal popup’s width must be strictly limited to approximately 60% of the total screen width, maintaining standard iOS proportions and visual balance. This popup must resemble a native iOS system dialog, featuring rounded corners, a soft shadow, and a light translucent background. The modal should contain a title such as “Rename Album,” a single text input field whose content is dynamically generated to match the theme and meaning of the uploaded photos, and two action buttons at the bottom labeled “Cancel” and “Save,” styled according to standard iOS interface conventions. The text shown inside the input field should be context-aware and directly related to the visual content, avoiding generic or placeholder wording. The background images should remain clearly visible but visually secondary to the popup, reinforcing the impression that the user is actively renaming an album within an iOS photo application. At the bottom of the overall screen, include a short, subtle caption written in a warm, lifestyle-oriented tone that emotionally connects to the images and describes when, how, or why these styles or items might be used. All visual and textual elements—including the top title, the modal dialog, the generated companion images, and the bottom caption—must feel cohesive, intentional, and specifically tailored to the user’s uploaded photos, creating a realistic and believable iOS album-editing experience.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 4
    max_images: 4
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0122 7 Styles Creative Studio/0122 Collage - Soft Lifestyle
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "1:1"
    prompt: |
      Scrapbook collage layout, layered composition. 

      Global Rules:
      - Utilize every user-provided image exactly once in the entire composition. No omissions and no repetitions.
      - STRICT PHOTO INTEGRITY: Aside from the explicitly AI-generated Top & Bottom Frames in the Right Section, all user-uploaded input images must be rendered with their original visual content. Do not color-grade, distort, warp, or stretch user photos. Proportional cropping is allowed to fit the layout, but original aspect ratio integrity must be maintained.

      Background: Flat baby blue checkered pattern, low saturation, clean pastel aesthetics.

      Left Section (Journal Area):
      - Base: Real white wrinkled notebook paper with ruled lines and ripped edges. Organic creases and subtle shadows.
      - Content: Distribute all user-uploaded photos (excluding the one used for the right strip) as printed snapshots. Attached with visible washi tape and paper clips.
      - Details: Short handwritten-style notes rendered in dark brown or dark grey ink, and thematic stickers. Strictly do not include any years, months, days, or date-related references.

      Right Section (Three-Photo Strip):
      - Structure: One vertical strip with three stacked frames on a solid black base.
      - Narrative Logic: Middle frame must feature the one user-uploaded photo that has the largest scenic/landscape area coverage. 
      - Top & Bottom Frames: Ultra-realistic, high-fidelity AI-generated photography related to the Middle frame (landscapes or object close-ups). These frames must be distinct variations or extensions of the environment, not exact duplicates of the middle photo's background scenery. Must have authentic camera texture and natural depth. Strictly no human figures.
      - Finish: Encased in a glossy, semi-reflective transparent plastic sleeve. 
      - Decoration: A small circular dot washi tape at the top. Tiny white typewriter-style text "Memories" at the bottom.

      Composition Rules:
      - Overlap: Right strip partially overlaps the left paper for physical depth.
      - Lighting: Realistic natural lighting with cinematic film-like quality.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0122 7 Styles Creative Studio/0122 日本綜藝海報-不良一族尋愛記
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Please use all uploaded photos as the only source of characters in the image. Preserve every person’s real face, facial features, bone structure, skin tone, hairstyle, clothing, and overall identity exactly as shown in their original photos. No additional people may appear. Each uploaded person must appear only once in the final image, with no duplication, cloning, or repeated faces. Do not beautify faces, smooth skin, stylize features, alter proportions, change age, or modify identity in any way. 

      Create a vertical poster-style image divided cleanly into two equal halves down the center, representing two distinct rooms. Each half must depict a completely different world with strong contrast in color, lighting, and atmosphere, while together forming one unified, cohesive poster. The division between the two rooms must be seamless, with no visible borders or lines.

      Under all circumstances, both rooms must contain at least one person; it is strictly prohibited for either room to be empty. If both male and female users are uploaded, assign all male users exclusively to the male room and all female users exclusively to the female room. If all uploaded users are of the same gender, still divide them between the two rooms. In this case, assign some users to the opposite-themed room purely for visual balance, while strictly preserving each person’s identity, facial features, and gender. The room theme must not imply or alter the person’s gender in any way.

      One half must depict a dark, masculine male room with strong blue-toned lighting. Place a black leather sofa at the center, where male users are seated in relaxed but confident poses. The sofa should feature subtle Japanese graffiti-style markings. Introduce bright white-to-purple key lighting focused directly on the male users, illuminating their faces and upper bodies clearly. The lighting should feel intentional and stage-like, similar to a Japanese variety show poster, rather than dark or cinematic. White and soft purple lights should wash over the subjects, while blue and purple tones remain in the background, creating a lively, high-contrast yet readable look. The space must feel well-lit, energetic, and visually clear rather than shadow-heavy. Behind them, include a small, understated vertical blue neon sign with Japanese characters reading “極惡,” arranged top-to-bottom and rendered in a bold kaishu-style (traditional brush-style) typeface with thick strokes. The neon text should function purely as a subtle decorative accent rather than a focal point, blending naturally into the scene without drawing dominant attention or overpowering the composition. Also include shelves and sections of metal mesh or wire fencing. Add a small, curated number of Japanese-style collectible figures or hobby items to suggest personal taste without clutter. All male users must appear only in this purple-toned room.

      The other half must depict a vivid neon-pink female room inspired by Japanese Harajuku gyaru style. The space should be filled with fluorescent pink tones, bold patterns, and an exaggerated fashion-forward aesthetic. At the center, place a thick, plush, furry cushioned padded lounging mat with noticeable height and volume, clearly soft and fluffy with long fibers, and with no backrest, armrest, or vertical support. Female users should be seated or posed confidently on top of this plush floor mat. The room décor should resemble a stylish, lived-in gyaru hangout rather than a cute or childish bedroom. Include zebra-pattern accents, vanity mirrors with lights, shelves, decorative floral elements, and personality-driven Harajuku-style decorations such as edgy figurines, fashion objects, neon signs, bold accessories, and statement décor pieces. The collectibles should feel fashionable, expressive, and slightly rebellious—not overly cute dolls or childish plush toys—suggesting confident young women with strong taste and attitude. The space should feel layered, cozy, and social, as if friends actually gather and spend time there, while remaining intentional and curated rather than cluttered. The overall atmosphere should be edgy, flashy, and unapologetically bold rather than cute or sweet. Female users must maintain cool, tough, confident expressions with no smiling, conveying a strong, stylish presence typical of Harajuku gyaru aesthetics. All female users must appear only in this pink room.

      All characters must be seated, facing forward or slightly angled toward the camera, with confident, rebellious, and streetwise body language rather than formal or polite poses. Their posture should feel relaxed, slightly slouched or asymmetrical, conveying a delinquent, tough, and cool attitude typical of Japanese street gangs. Room assignment must never affect or alter gender-based styling rules. Regardless of which room they are placed in, male users should be styled in Japanese yankii fashion, while female users should wear leather textures, sheer or semi-transparent tops, short skirts, or fitted silhouettes, but do not change person's hairstyle. The clothing should be simple rather than overly layered or decorative, focusing on a hot, confident, and edgy look with strong personality instead of a traditional gyaru costume style. Subtle to visible tattoos may appear on exposed skin such as arms, shoulders, necks, or hands, reinforcing the delinquent aesthetic without overwhelming the characters. Use a close-up camera distance showing upper bodies and seating clearly, with symmetrical, poster-like framing. Lighting must remain consistent within each room to reinforce the strong color contrast.

      At the bottom portion of the poster, add the title text “恋・地獄。” The typography must closely resemble the original show logo style, using extremely bold, heavy-weight Japanese characters with thick strokes and compact proportions, similar to high-impact Japanese variety show or sports-event typography. The characters should feel powerful, blocky, and visually loud rather than elegant or thin. The text must be vivid pink, bold and eye-catching, and positioned prominently near the bottom center of the poster. Add the subtitle text “— Love Is Hell —” in the same vivid pink color, using a slightly cursive, handwritten-style script that feels expressive and stylish. The subtitle should be smaller than the main title and complement it without overpowering it. Both the main title and subtitle must remain solid pink with no white, black, or any other colored outlines, strokes, shadows, or borders.

      The final image should feel bold, flashy, dramatic, and playful, strongly evoking a high-impact Japanese variety show poster through extreme color contrast, confident group presence, accurate faces, and faithful recreation of the described layout, rooms, lighting, and typography, using only the uploaded people and no external references.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 4
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0122 7 Styles Creative Studio/0122 攝影兩宮格V2
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Please use all uploaded photos as the only source of characters in the image. Preserve every person’s real face, facial features, bone structure, skin tone, hairstyle, clothing, and overall identity exactly as shown in their original photos. Do not beautify faces, smooth skin, stylize features, alter proportions, change age, or modify identity in any way. No additional people may appear. Each uploaded person must appear only once in the final image, with no duplication, cloning, or repeated faces.

      Create a vertically oriented image divided clearly into two stacked horizontal frames, resembling a casual photo exchange between friends. The overall mood should feel natural, playful, and nostalgic, inspired by a Japanese springtime aesthetic. The setting should feel like a green park in early spring, with soft sunlight, fresh greenery, trees, and a relaxed outdoor atmosphere. The color tone should be light, airy, and slightly warm, emphasizing fresh greens and gentle daylight. The two stacked frames must be seamlessly stitched together with no white borders, gaps, margins, or visible separators of any kind. The transition between the upper and lower frames should be clean and continuous, forming a single unified image rather than two separate photos placed side by side or with padding.

      In the upper frame, randomly select one single person from the uploaded users to act as the photographer. This person must appear alone in the upper frame and must not appear anywhere else in the image. The character should be posing with a compact camera or film camera, gently and naturally holding it near their face rather than actively taking a photo. The camera should rest casually against the face, covering only one eye, while the other eye remains clearly visible. Both eyes must be open, relaxed, and clearly visible with no blinking, squinting, or eye closure. The camera must not cover both eyes or obscure the entire face. The upper frame must be shot from a clear low-angle (upward-looking) perspective, meaning the subject is being photographed from below. The background should be dominated by sky, treetops, or bright open air, with no visible ground or floor elements in the frame. The pose should feel calm, casual, and intentional, as if posing playfully for a photo during a relaxed moment in the park. The expression should feel natural, soft, and friendly, not dramatic or exaggerated. The upper frame should feel like a posed yet spontaneous portrait moment rather than an action shot. The photographer must be fully intact within the upper frame with no cut-off, missing limbs, duplicated body parts, stretched anatomy, or incomplete rendering; the head, camera, hands, and upper torso must all be cleanly and fully visible without cropping errors or visual artifacts.

      In the lower frame, depict all remaining uploaded users together, excluding the person already used in the upper frame. No one from the upper frame may reappear here. This lower frame represents the scene being photographed by the person above. Close-up shot that faces are clearly visible and readable. The characters should be seated together on a picnic blanket spread over green grass, clearly engaged in a casual picnic scene. The camera viewpoint in the lower frame should be from above, looking downward toward the group, creating a gentle top-down perspective as if the photographer is standing and photographing them. The background should consist entirely of grass and the picnic blanket, with no visible horizon line, sky, tree branche, or distant background elements. The characters should be grouped naturally, sitting close together on the blanket, interacting casually as friends. Their expressions should feel lively, relaxed, and genuine, as if being photographed during a fun moment in the park. Poses can include small gestures like peace signs, relaxed seated postures, leaning toward one another, or playful body language, but should remain natural rather than exaggerated.  

      The lower frame must include a visible camera-viewfinder overlay, simulating what the photographer sees through the camera. The camera view must be fully enclosed by a continuous, solid black display border that wraps around the entire image area, similar to the physical edge of a real camera screen or electronic viewfinder. This border should be a single, uninterrupted rectangular frame with visible thickness, not thin lines, not floating markers, and not partial corner brackets. The black border should feel like the outer boundary of a camera screen, clearly separating the camera view from the surrounding image, rather than an internal UI element. It must completely frame the scene on all four sides, forming a closed rectangle that visually contains the entire lower-frame image. Inside this black display border, add subtle camera UI elements such as a REC indicator and a battery icon. These UI details must remain minimal and unobtrusive. No grid lines, rule-of-thirds guides, focus boxes, face-detection frames, corner brackets, or segmented overlays of any kind are allowed anywhere in the image. The overlay should clearly suggest a live camera display while remaining clean, cinematic, and realistic, with the black border acting as the dominant framing element rather than thin UI markings.

      Both frames should share the same park environment and seasonal feeling, reinforcing the idea that these moments are happening at the same time. Lighting should be consistent across both frames, with soft daylight, gentle shadows, and a springtime atmosphere. The overall composition should feel intimate, friendly, and observational, as if capturing a memory between friends rather than staging a photoshoot.

      The final image should read as a Japanese-style casual memory photo: warm, green, youthful, and emotionally light. It should clearly communicate the relationship between the photographer (upper frame) and the photographed picnic group (lower frame), with no duplicated characters, no identity confusion, and a strong sense of perspective and storytelling.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 4
    num_iterations: 50


# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (NO REPEATS until pool exhausted)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    optimal_formula: "sources_needed = num_iterations × (min_images + max_images) / 2"
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations (even bucket distribution)
      - NO REPEATS: uses 'consume from shuffled pool' algorithm
      - If sources < optimal, images will repeat across cycles (with warning)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    formula_examples: |
      # min=1, max=4, iterations=50 → need 50 × (1+4)/2 = 125 sources
      # min=1, max=5, iterations=50 → need 50 × (1+5)/2 = 150 sources
      # min=1, max=3, iterations=50 → need 50 × (1+3)/2 = 100 sources
    example: |
      # 125 source images, 50 iterations = 50 API calls, each picks 1-4 images (no repeats)
      use_random_source_selection: true
      min_images: 1
      max_images: 4
      num_iterations: 50
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
