tasks:
  - folder: ../Media Files/Nano Banana/0122 4 Styles Creative Studio/0122 Collage - Highlight Series
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      Please use all user-uploaded photos as the ONLY image sources in the final composition. Every uploaded photo must be displayed exactly once. Do NOT duplicate, omit, replace, merge, hallucinate, or regenerate any photo or person. The total number of photos shown must exactly match the number of images uploaded. Each uploaded photo must preserve its original aspect ratio and proportions exactly. Do not stretch, squeeze, compress, distort, reshape, or reframe any image. Images may be resized uniformly only. No photo may be duplicated or regenerated.

      Create a fashion editorial–style layout inspired by premium apparel brand campaigns and seasonal lookbooks. The overall composition should feel modern, minimal, high-end, and print-ready, similar to a luxury fashion brand presentation rather than a collage or scrapbook. The background must be a textured paper surface with a subtle rough, grainy, tactile quality, resembling high-quality printed or recycled art paper. The background color must be sampled from the dominant color palette of the uploaded photos to ensure visual harmony. Avoid pure white or flat digital backgrounds.

      Select one uploaded portrait photo that is front-facing and suitable for a half-body presentation as the foreground subject, and perform precise background removal. The foreground cut-out subject must be enlarged and placed centered in the lower-middle area of the canvas, visually dominating the composition. The subject’s lower portion must be cropped off by the bottom edge of the frame itself, creating the intentional impression that the body continues beyond the canvas rather than being fully visible. This cropping must feel like a deliberate editorial framing choice, not an obstruction by other elements. The foreground cut-out subject must be placed fully above and in front of all other elements. The subject must clearly and visibly overlap the film negatives, occupying a higher visual layer at all times. Under no circumstances may the subject appear behind, embedded within, masked by, or visually subordinated to the film negatives. The subject must appear as a clean editorial cutout with no white outline, no sticker edge, no glow, no halo, and no artificial border. The cut-out subject must be an exact, pixel-faithful extraction of the original uploaded photo. No changes of any kind are allowed to pose, gesture, angle, expression, gaze direction, posture, or body language. Do NOT generate new actions, poses, angles, or interpretations. The cut-out subject must preserve exact facial features, body proportions, clothing details, wrinkles, folds, hair strands, and silhouette as in the original image. No beautification, enhancement, re-lighting, or stylization is allowed. The foreground subject must be shown as a half-body portrait only. This must be achieved strictly by cropping the original uploaded photo. Do NOT generate, extend, or hallucinate missing body parts. If the uploaded photo is already half-body or upper-body, keep it exactly as is.

      Behind the foreground subject, arrange the remaining uploaded photos into two diagonal, parallel rows of minimalist film-style strips positioned in the lower portion of the composition. The strips must use clean, simple rectangular frames only, with smooth continuous edges. There must be NO perforations, NO sprocket holes, NO grid patterns, NO square cutouts, and NO segmented frame markings of any kind. The rectangles should feel modern, flat, and minimal, maintaining a continuous long-rectangle appearance rather than traditional film negatives, but include subtle, realistic photographic details such as small frame numbers, tiny alphanumeric markings, film stock text, or fine measurement tick marks along the edges.The two strips must be placed close together with a narrow, consistent gap between them, clearly reading as a paired set rather than separated elements. The two rows must be parallel, slightly tilted, and extend horizontally beyond the left and right edges of the canvas, partially running out of frame, creating a sense of depth and flow rather than rigid alignment. These minimalist film-style strips must visually anchor the bottom of the layout and remain clearly behind the foreground subject at all times.

      Each film negative frame must contain one unique uploaded photo, used exactly once, with no repetition. Film border color and tone should be derived from and harmonize with the overall palette.

      All headline typography and primary text must appear only in the upper portion of the composition, clearly separated from the imagery below. The headline should use an elegant, high-quality serif typeface with a refined editorial feel. Text content should be inferred from the user’s photos or mood and must avoid years or numeric dates. The headline should read like a fashion campaign title, not promotional copy.

      Supporting text should be minimal and secondary. Avoid loud graphics, stickers, icons, UI elements, illustration styles, cartoon effects, AI artifacts, surreal distortions, or decorative gimmicks.

      The final result should read as a professionally art-directed fashion editorial or lookbook cover, with clear hierarchy: headline at the top, foreground cut-out subject visually on top of the film negatives, and film negatives grounding the bottom. The image must feel cohesive, premium, restrained, and suitable for brand presentation or editorial use.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 5
    max_images: 6
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0122 4 Styles Creative Studio/0122 Collage - Calendar
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Prompt: A photorealistic flat lay digital scrapbook collage with a strict defined stacking order.

      Composition & Hierarchy: The core of the collage grouping is anchored vertically within the middle third of the canvas width, organized in the following layers from bottom to top:

      Layer 1 (Background Base): A blurred, empty minimalist modern urban street scene with clean architectural walls and pavement. The color palette is dominated by soft, muted Japanese-style pastel tones (beige, light cream, pale grey), creating a calm, low-saturation, and airy atmosphere. Directly on this background surface, in the top-left corner, there is a title rendered in an elegant, casual handwritten script, arranged in two lines: "My Monthly" positioned directly above "Recap", rendered in a muted charcoal color.

      Layer 2 (Bottom Element - Placed directly on the background): A 1:1 square calendar grid made of textured pure white paper. It features a row of fashionable, thin sans-serif weekday abbreviations (e.g., MON, TUE) along the very top edge, immediately followed below by tightly filled numerical dates in the same font, with no year mentioned. Its visual appearance and design serve as a neutral, standalone base, completely independent of and visually unrelated to the content or style of the source photographs in Layer 3 overlying it.

      Layer 3 (Middle Overlay - Scattered across the calendar and spilling onto the background): Three oversized Polaroid-style photos with white borders, scattered in a highly irregular, haphazard fashion, completely breaking central symmetry. Each Polaroid frame holds a unique, distinct source photograph rendered completely unchanged and uncropped. There is no repetition among the images within the four frames. While clustered around the calendar area, they significantly spill over the edges of the calendar grid, extending outwards and resting directly on the surrounding Layer 1 background surface. Their visual scale is significantly larger than the underlying calendar grid, heavily dominating the composition and obscuring most of the dates below them.

      Layer 4 (Top Details - Placed on top of the photos): Two realistic matte photographic stickers depicting non-human subjects (e.g., objects, nature), precisely die-cut without white borders, alongside one piece of translucent, textured torn washi tape. These items are the topmost elements, overlapping the Polaroid photos beneath them.

      Overall Style: High-resolution photograph with authentic textures and soft natural lighting across all layers.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 3
    max_images: 3
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0122 4 Styles Creative Studio/0122 Musical taste
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "3:4"
    prompt: |
      Use the TWO uploaded images as strict references. Image 1 is the user’s real portrait photo and must be used only to preserve the person’s true identity. Image 2 is the music app UI screenshot and must be used only as the phone screen content. Create ONE single composite image only.

      The person’s identity must be preserved exactly. Facial structure, facial proportions, hairstyle, hair color, and skin tone must remain clearly recognizable. Do not beautify, stylize, idealize, cartoonize, or alter the person’s real appearance. This must remain fully photorealistic.

      The person must appear as a real-scale adult human, not miniature. The person’s full height should visually occupy approximately 75–85% of the phone’s long edge, making the figure feel large, confident, and dominant rather than decorative. Head size must feel natural relative to the phone width. Legs must remain full-length without shortening. Feet must clearly and firmly stand on the phone screen surface with full sole contact. The person must not float, sink, clip, or intersect unnaturally with the phone. The posture must feel relaxed and natural, standing upright with balanced weight, gently touching or adjusting the headphones with one hand. The headphones must be white or light gray. Feet must wear realistic shoes and be physically grounded.

      Create a premium, clean, high-end commercial studio visual where a real-scale human is physically standing on top of a single smartphone displaying the music app interface. This is not a fantasy illustration, not a miniature diorama, and not a conceptual art piece. The image must feel like a polished global music-streaming brand key visual.

      The smartphone must be a SINGLE, realistic modern device only. No duplicated phones, no stacked phones, no reflections, no mirrors, and no secondary devices.

      The phone framing must EXACTLY match the reference image (Image 4). The smartphone must appear very large and very close to the camera, strongly dominating the lower portion of the frame. The device must occupy a substantial visual mass so that the phone clearly feels foreground-heavy rather than decorative. One far-end corner of the phone must be intentionally cropped out of the frame, exactly like the reference. This cropped corner must be the far, receding top-right corner of the phone, cleanly cut off by the image edge. The crop must feel deliberate, photographic, and natural.

      The phone angle must EXACTLY match the reference. The phone lies completely flat on the ground plane and is viewed from a calm, low-angle three-quarter perspective. The near end of the phone (bottom-left) must feel very close to the camera, while the far end (top-right) gently recedes into the background. The camera must feel close to the phone surface, not pulled back. The phone must never appear small, distant, or centered loosely in the frame.

      The phone body must remain physically correct and geometrically stable. The device must NOT bend, warp, taper, compress, skew, or distort due to perspective. The long edges of the phone must remain straight and parallel in perspective. Thickness must remain consistent from end to end. The screen must remain a true rectangle in perspective with no keystone distortion.

      The visible screen area must feel broad, generous, and dominant. Bezels must appear thin and realistic. The music app UI must remain sharp, readable, perfectly flush to the screen surface, and completely free of distortion or perspective warping.

      The camera uses a low-angle three-quarter studio perspective identical to the reference image. The camera is positioned slightly above the phone surface and looks across it rather than down onto it. The camera must NOT be top-down, NOT front-facing, and NOT steeply tilted. Use a natural commercial lens look with no wide-angle exaggeration.

      Use clean, soft, evenly distributed studio lighting with a large diffused key light from the upper-left and a gentle fill light. Lighting must be uniform and controlled. There must be absolutely NO vignette, NO dark corners, NO edge falloff, and NO spotlight effect. Shadows must be soft and minimal. A subtle, realistic contact shadow must appear directly beneath the shoes on the phone screen and beneath the phone on the ground plane, grounding both physically.

      The background must be a seamless, infinite studio gradient in light sand tones. The background must be smooth, uniform, and calm, with no texture, no walls, no visible floor line, no color banding, and no environmental elements. The overall palette must feel bright, neutral, premium, and airy.

      The person and the phone must share identical light direction, color temperature, and shadow logic. Integration must feel physically believable and visually refined. There must be no vignette, no dark halo around the subject, no uneven exposure, and no contrast-heavy edges.

      The final image must look like a real, high-end global music streaming campaign visual: clean, minimal, bright, realistic, premium, calm.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 1
    max_images: 1
    num_iterations: 50
    multi_image_config:
      enabled: true
      mode: sequential
      folders:
        - ../Media Files/Nano Banana/0122 4 Styles Creative Studio/0122 Musical taste/Additional
      allow_duplicates: true

  - folder: ../Media Files/Nano Banana/0122 4 Styles Creative Studio/0122 農民曆-TW
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:5"
    prompt: |
      A high-quality, perfectly vertical top-down photograph of a daily calendar pad flat on a vintage surface, captured directly overhead with zero perspective distortion.

      ### Physical Object & Environment:

      Soft, natural side-lighting emphasizes the paper grain and the slight thickness, casting a realistic shadow onto the background. The background features traditional Taiwanese Decorative Tiles with classic geometric patterns. These tiles have a glazed ceramic texture, and thin, clean grout lines, evoking a nostalgic 1950s-70s atmosphere.

      ### Physical Object:

      - Material: A magazine-thick stack of off-white, semi-translucent paper (#FDF9F2). The paper shows a 5% ghosting effect, faintly revealing the layout underneath.

      - Top Binding: Secured at the very top by a solid horizontal Red binding strip (spine).

      - Torn Detail: A neat, horizontal torn edge at the top of the paper sheet, directly below the binding, showing fine, evenly frayed fibers from a clean manual rip.

      - Lighting: Soft side-lighting emphasizes the paper grain, torn texture, and the stack's vertical depth.

      ### Design & Content:

      - Layout: Modernized Traditional Chinese Almanac (Tung Shing) in a strictly limited 4-color palette: Navy Blue (#00437A), Red (#D32F2F), Light Water Blue (#A5C6D8), and Soft Pink (#F2B5B5).

      - Illustration: A modern hand-drawn caricature with grainy, dry-brush lithographic textures (no pencils/crayons), achieving a highly recognizable, 20% realistic likeness closely capturing the user's actual facial features. The character, depicted in a relaxed and happy manner with face fully visible, is performing a humorous, low-energy slacking action that directly illustrates the text in the bottom section.

      - Typography: All text in Traditional Chinese (繁體中文) using Heavy Bold Ming/Song Serif font (粗明體) with a simulated print texture.

      - Composition:

        1. Header: "今日運勢" (centered, unframed).

        2. Sides: Symmetrical Navy/Red scroll banners positioned on the left and right sides, each containing a traditional 4-character auspicious Chinese idiom (e.g., 心平氣和/ 萬事如意/ 心想事成/ 平安喜樂/ 身體健康/ 大吉大利/ 一帆風順).

      3. Bottom: Navy/Red bordered frame containing a Red circular "宜" stamp. Following the stamp is exactly one humorous, "slacking/low-energy survival" phrase.
      - The word "死" is strictly prohibited. Avoid using "躺平" as a standalone term.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 1
    max_images: 1
    num_iterations: 50


# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (NO REPEATS until pool exhausted)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    optimal_formula: "sources_needed = num_iterations × (min_images + max_images) / 2"
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations (even bucket distribution)
      - NO REPEATS: uses 'consume from shuffled pool' algorithm
      - If sources < optimal, images will repeat across cycles (with warning)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    formula_examples: |
      # min=1, max=4, iterations=50 → need 50 × (1+4)/2 = 125 sources
      # min=1, max=5, iterations=50 → need 50 × (1+5)/2 = 150 sources
      # min=1, max=3, iterations=50 → need 50 × (1+3)/2 = 100 sources
    example: |
      # 125 source images, 50 iterations = 50 API calls, each picks 1-4 images (no repeats)
      use_random_source_selection: true
      min_images: 1
      max_images: 4
      num_iterations: 50
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
