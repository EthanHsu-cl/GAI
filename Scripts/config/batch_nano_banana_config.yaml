  - folder: ../Media Files/Nano Banana/0202 4 Styles/0202 櫻花肖像照
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "3:4"
    prompt: |
      Using the uploaded person as the sole subject, keep their identity, facial features, skin tone, hairstyle, and proportions recognizable and consistent. Do not change the person’s identity. Only change the scene, lighting, and pose to match the spring cherry-blossom reference collage.
      Strict negatives
      No extra people, no duplicate faces, no face swapping, no stylization/anime, no gender cross-dressing, no feminization of male subjects, no heavy beauty retouch, no over-whitening, no text, no watermark, no stickers, no added accessories, no extra props beyond dango (TL) and sakura flower (BR, female only).
      Generate a perfect 2×2 four-panel collage (equal panels, seamless edge-to-edge, no borders / no dividers / no white lines).

      All 4 panels must keep the same outfit.
      If the subject is female: a white, semi-sheer chiffon blouse (soft drape, slightly translucent sleeves) paired with a light beige pleated skirt (fine vertical pleats).
      If the subject is male: a plain white cotton top (opaque, non-sheer, non-translucent) paired with light beige long trousers.
      Gender expression must strictly match biological sex.
      Male subjects are strictly forbidden from wearing skirts, pleated skirts, chiffon, sheer fabrics, blouses, ribbons, bows, or any feminine-coded garments.
      Do NOT feminize male clothing silhouettes.
      No outfit variation across panels.

      Overall look (match reference): bright, airy Japanese spring photo tone with Fuji-like clean colors, soft pastel pink sakura, and a stable, muted, low-saturation sky-blue that does not overpower the subject.
      Natural daylight only (no studio look). Gentle high-key exposure, soft shadows, slight film-like clarity. Shallow depth of field with creamy bokeh.
      No text, no stickers, no filters, no extra props besides the food/flower described.

      Panel-by-panel composition (STRICT)

      Top-left (TL) — “Eat dango” close-up, soft blue sky

      A half-body-to-chest portrait (framing includes head + shoulders + upper chest; crop around mid-chest).
      Pose & angle MUST match reference: the subject is in a 3/4 profile, face turned slightly to the left, chin slightly lifted.
      Eyes must NOT look at the camera; gaze is forward-left or off-camera.
      Hold a three-color dango skewer (pink/white/green) near the lips and gently bite/taste it WITHOUT showing teeth (lips softly closed on the dango, no open-mouth teeth).
      Hand action: right hand holds the skewer; wrist relaxed; fingers naturally curved.
      Background: soft, low-saturation sky-blue occupies ~35% of the frame, with a few soft white clouds.
      Sakura branches appear only as subtle framing elements near the edges and must NEVER cover the face.
      Lens/DOF: 85mm look, shallow depth; background clouds and blossoms softly blurred.

      Top-right (TR) — Standing under sakura, hand shading eyes

      A wider half-body portrait showing head to upper thighs for balanced proportions.

      The figure stands under a dense cherry blossom tree; the right hand is raised above the forehead to shield the sunlight (the arm moves naturally and smoothly), and the elbow is slightly outward.

      Face turned slightly up-right with a soft smile.
      Eyes must NOT look at the camera.
      Background: cherry blossoms fill most of the frame (tree canopy), warm spring light. Minimal visible sky.

      Bottom-left (BL) — Side profile reaching blossoms

      A three-quarter / half-body side-profile shot, subject placed slightly left in frame.
      Subject faces left, head tilted upward, one arm raised to lightly touch or reach a sakura branch above.
      Face visibility rule: approximately 45% of the face is visible, with both eyes faintly visible through angle and depth — branches and blossoms must NOT block the face or eyes.
      Background: dense sakura canopy with soft pink bokeh; dreamy, gentle glow.
      Eyes must remain off-camera.

      Bottom-right (BR) — Close-up, direct gaze (ONLY PANEL WITH EYE CONTACT)

      A tight close-up portrait (head + shoulders, minimal torso).
      Pose MUST reference the sample: shoulders angled, one shoulder slightly closer to camera; one arm crosses or rests near the chest/shoulder to form a soft diagonal line.
      This is the ONLY panel where the subject may look toward the camera, with a natural, unforced, slightly downward gaze.
      Add a few softly falling sakura petals in the air.
      Background: MUSTstable, soft sky-blue (~35% of frame), with a few sakura blossoms in the upper area.
      Foreground bokeh(MUST): out-of-focus sakura cluster near the lower foreground, never covering eyes, nose, or mouth.
      Lens/DOF: 85–105mm look, shallow depth, creamy bokeh.

      Sakura distribution & color stability rules (IMPORTANT)

      Sky-blue must remain soft, low-saturation, and consistent across all panels — never overly vivid or dominant.
      TL & BR: balanced sky-blue with gentle contrast.
      TR & BL: blossoms dominate the scene; sky plays a secondary role.
      Foreground blossoms are bokeh only; subject’s face is always sharp and unobstructed.
