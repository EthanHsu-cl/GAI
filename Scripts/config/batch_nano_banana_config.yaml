tasks:
  - folder: ../Media Files/Nano Banana/1222 2 Styles/1222 My word of the year
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Use the uploaded person photo.
      Do NOT change the person’s face, identity, gender presentation, or appearance.
      
      Create a photorealistic Japanese “Kanji of the Year” ceremony scene at a temple terrace.
      Natural lighting, calm and respectful atmosphere.
      
      Composition:
      
      - The person faces FORWARD toward the camera (not side view).
      - The person is holding a large calligraphy brush with ink on their hands, as if they have just finished writing.
      - On the right side of the scene, place a large vertical white calligraphy paper with ONE Kanji written in bold ink.
      
      Kanji selection requirement:
      
      - The Kanji must convey a clearly positive, uplifting, or auspicious meaning.
      - It should represent themes such as hope, growth, harmony, renewal, gratitude, peace, prosperity, or inner strength and resilience.
      - Any sense of “strength” must be expressed as inner strength, perseverance, or resilience, not related to conflict, competition, struggle, or battle.
      - Do NOT generate Kanji related to war, conflict, battle, violence, destruction, suffering, anxiety, or social controversy.
      
      Calligraphy requirements:
      
      - Extremely expressive, bold ink strokes.
      - Strong brush texture with visible flying white streaks.
      - Heavy ink pooling and natural brush pressure variation.
      - The style should feel like powerful, dynamic Japanese sumi-e calligraphy, artistic and emotionally resonant.
      
      Integrate the person naturally into the environment with realistic shadows and depth.
      Maintain high facial accuracy and photorealistic detail.
      
      High resolution.
      Photorealistic, respectful, ceremonial, and emotionally uplifting.
      Aspect ratio: natural photographic composition.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 1
    max_images: 5
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/1222 2 Styles/1222 Another Life
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      A 3:4 cinematic multi-panel composition divided into four equal frames, each representing a different alternate-life universe of the same person based on the uploaded photo.
      
      The style must reference the visual tone of the Japanese drama “Rebooting Life（重啟人生）”:
      quiet realism, soft natural lighting, pastel color palette, subtle emotional depth, documentary-like framing, and gentle film grain.
      
      Use the uploaded person (user) as the protagonist.
      Do not change the user’s facial identity, ethnicity, hairstyle length, or core appearance.
      Maintain photorealistic Japanese TV-drama aesthetics: simple makeup, natural expression, realistic skin texture.
      
      Generate **four distinct life paths** for the user.
      Each panel should present a clearly different universe with significantly contrasting life choices, environments, and roles.
      Gemini may freely decide the careers, lifestyles, or major life directions, as long as the four universes are meaningfully different from one another.
      
      For each of the four panels:
      
      - Keep the user’s facial identity consistent.
      - Place the user in a unique alternate life with strong visual storytelling.
      - Ensure the scenarios feel grounded, human, and realistic — no fantasy or sci-fi.
      - Use natural, soft, cinematic Japanese-drama lighting.
      - Include everyday textures, quiet emotional moments, and subtle slice-of-life composition.
      
      All four panels must share:
      
      - A cohesive color palette
      - Naturalistic lighting
      - Consistent cinematic realism
      - Japanese drama–inspired framing
      
      High resolution.
      Photorealistic, understated, emotional, and gently cinematic.
      Aspect ratio: 3:4.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 1
    max_images: 5
    num_iterations: 50

# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (images can be reused)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: true
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
