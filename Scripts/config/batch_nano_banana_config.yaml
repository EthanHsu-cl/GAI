      Photo integrity rules:
      User photos must preserve their original colors, lighting, subjects, and facial details.
      Photos may be cropped when necessary to achieve a clean and balanced layout, but the subject’s face and key subjects must remain fully visible and unobstructed.
      No distortion, recoloring, filtering, or retouching is allowed.
      No graphic elements, text, or decorations may cover a person’s face.

      Flat graphic editorial collage design.
      Photos form the entire visual surface of the composition with no visible background.
      The collage must fill the canvas completely edge-to-edge.

      Photo layout:
      User photos appear primarily as clean borderless photographic prints with no white borders.
      Photos may be cropped slightly to create a tidy and balanced grid-like collage layout.
      Arrange the photos in a dense mosaic-style collage that fully covers the canvas.
      Photos may touch each other directly and align flush edge-to-edge with no spacing or gaps.
      The composition should resemble a seamless editorial photo wall.

      Polaroid variation rule:
      Only 1–2 photos may transform into classic Polaroid-style instant prints.
      These Polaroid photos include a white instant-film frame with a slightly thicker bottom margin.
      Polaroids must appear flat with no drop shadow or floating effect.

      Decoration rules:
      Only the Polaroid photos may include decorative elements.
      A subtle metallic paper clip may attach to the corner of the Polaroid frame.
      Borderless photos must remain completely clean with no decorations, no clips, and no graphic elements.

      Typography rules:
      Text may appear only on the Polaroid photos, typically centered on the lower white margin of the frame.
      Use subtle vintage typewriter-style lettering for short captions or titles.
      All other photos must contain no text.

      Avoid generating specific dates or years.
