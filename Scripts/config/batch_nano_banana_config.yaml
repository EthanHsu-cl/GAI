      Use the uploaded person as the only human subject. Preserve the subject’s real face, facial features, identity, skin tone, hairstyle, expression, and body proportions exactly as in the uploaded photo. Do NOT beautify, stylize, or alter identity. No extra people.

      Create a slightly wider, editorial-style portrait featuring an intimate interaction between the subject and a traditional Chinese lion dance. Pull the camera back just enough so the entire lion head is fully visible.

      Lion requirements:
      - The lion head faces directly forward toward the camera in a clear frontal orientation with symmetrical features (no profile or angled view).
      - The lion head must be positioned immediately beside the subject’s face, close to the cheek or side of the head, creating a strong sense of proximity and interaction at face level. The lion head should appear large and positioned very close to the subject, creating a strong visual dialogue between the subject and the lion.  
      - A lion dance body (fabric tail) is attached behind the head and extends backward into the frame as continuous flowing fabric with realistic texture, folds, and implied movement; it must remain secondary and never obscure the subject or lion head.

      Subject:
      - At least one of the subject’s hands must be in direct physical contact with the lion head. The hand should clearly touch the lion head surface (such as fur, fabric, or structural elements), making the interaction unmistakably tactile rather than implied or posed at a distance.
      - The subject looks directly into the camera with a firm, confident, determined gaze (not playful or smiling), like a stylized New Year editorial photoshoot.

      Background:
      - Clean solid-red color backdrop that harmonizes with red.
      - Centered rich red velvet curtains parted from the middle and pulled symmetrically to left/right, fixed in place; show luxurious velvet folds/texture. No other patterns or environmental elements.

      Wardrobe:
      - Both genders wear traditional lion dance pants with decorative detailing starting from the waistband and continuing downward (not only from knees/lower legs).
      - Female: red sequined strapless tube top; lion dance pants with a black base, featuring red and gold decorative patterns and embellishments.
      - Male: black fitted sleeveless mock-neck tank top (slim-cut silhouette with a subtle high neckline); lion dance pants with a red base, featuring gold decorative patterns and embellishments.
      - Clothing must be realistic, well-fitted, with no added accessories or outfit redesign.

      Color & materials:
      - Lion head overall palette dominated by gold, with red and white accents from the lion head. Lion head looks handcrafted with authentic fabric, fur, embroidery, and painted patterns (not cartoonish/plastic).

      Atmosphere:
      - Light, controlled smoke/mist only in the lower frame up to about waist level; gently diffused, ceremonial, never obscuring the face, lion head, or curtains; not foggy or overwhelming.

      Lighting:
      - Clean, bright, slightly dramatic studio lighting highlighting facial features and textures (lion head, pants, lion body fabric, velvet curtains). Avoid cinematic blur, fantasy effects, or exaggerated stylization.

      Final image:
      - Realistic, cohesive, professionally photographed, correct proportions/lighting, no artifacts, identity fully preserved.
