  - folder: ../Media Files/Nano Banana/1222 5 Styles/1222 日系自然照片 女生送巧克力-俯角
    model: gemini-2.5-flash-image
    resolution: 
    aspect_ratio: 
    prompt: |
      Using the uploaded photo of the person as the primary subject, preserve their facial features, makeup, hairstyle, skin tone, and body proportions to ensure complete consistency with the uploaded image.

      Transform it into a cinematic close-up portrait inspired by lifestyle photography.

      She lies on a soft, neutral-colored bed, without any blankets.

      Her hair falls naturally in soft waves, with a few fresh cherries or strawberries (arranged randomly, but only one type of fruit at a time) casually scattered in her hair and on the pillow, seemingly effortless yet harmoniously natural. (Three hands or illogical poses are strictly prohibited.)

      She wears a white spaghetti strap dress—simple yet elegant—that gleams softly in the sunlight. The V-neck and thin straps accentuate her beautiful shoulders and collarbones.

      Her posture exudes ease and comfort: she leans back, holding fruit near her nose, blinking only one eye, a warm, playful smile playing on her lips, or gazing captivatingly at the camera; her other hand holds fruit (only fresh cherries or strawberries, randomly selected, but only one type at a time), placed below the foreground—while her other hand holds fruit (fresh, large, highlighted by her blurred face), also placed below the foreground—but without the same vibrancy or size, highlighted by the lighter blur of her face. All her movements are natural and relaxed.

      The lighting is soft and diffused, simulating natural window light from above at approximately a 45° angle. The color temperature is approximately 5200K, creating a clean, sunlit atmosphere, leaving soft highlights on her skin and hair. The overall tone should remain bright and fresh, with natural shadow transitions.

      Use a medium-close-up composition (approximately from head to chest), with an equivalent focal length of 50-85mm and an aperture of f/1.8-f/2.2, emphasizing eye contact, hair texture, and the natural glow of the skin.

      The final atmosphere should showcase the elegant temperament of a modern woman—fresh, romantic, and naturally radiant—like a magazine spread shot in the morning sunlight.
