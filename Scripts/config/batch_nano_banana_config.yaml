  - folder: ../Media Files/Nano Banana/0113 4 Styles/0113 Poster
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      You are a professional graphic designer tasked with creating a minimalist, design-driven poster with a refined editorial aesthetic, based on a user-uploaded photo. The main subject extracted from the user’s photo must remain vertically and horizontally centered in the frame, with a clean cut-out edge and no visible white borders, outlines, frames, or matte edges. Place a bold central headline at the upper area of the composition, positioned behind the main subject, allowing the subject to naturally overlap and partially obscure the title text. The headline text must be white, directly related to the content, mood, or theme of the user’s photo, and rendered in solid, flat typography with absolutely no shadows, outlines, glows, gradients, embossing, bevels, or decorative effects of any kind. Above the headline, place several small supporting texts or short descriptors related to the photo, arranged with clear hierarchy and spacing, and always positioned on the topmost layer. Add a very small paragraph of text closely related to the headline, written like a short editorial caption or micro-essay, positioned on either the left or right side of the composition, and layered in front of the main subject, set in a noticeably smaller font size to create contrast and a magazine-like detail layer without drawing attention away from the main title. Include a decorative color palette element composed of extremely small square-shaped color swatches arranged in a single horizontal row, sampled from colors present in the user’s photo, used purely as a subtle visual accent. Preserve the original background of the user-uploaded photo exactly as provided, with no replacement, no artificial backdrop, no added gradients, textures, or background modifications. The composition should not include any white frames, borders, poster margins, or mockup-style edges. The overall result maintains a clean, minimalist, editorial fashion-poster aesthetic with clear layering, balanced negative space, and a refined, modern tone.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0113 4 Styles/0113 旅遊機票
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "4:5"
    prompt: |
      Create a realistic travel flat-lay scene with a clean, neutral, and well-balanced visual style.
      The entire scene is captured in a strict top-down, bird’s-eye view (flat-lay perspective).

      Use the uploaded photo as the main subject. The person in the photo becomes the protagonist.
      Preserve the original facial features clearly and accurately, with realistic proportions and sharp focus on the face.

      Randomly generate a city in the world, strongly emphasizing randomness without predefining or suggesting any city.
      Exclude Kyoto from the list of possible destinations. Kyoto must not be selected or depicted in any form.

      Transform the uploaded photo into a Polaroid photo taken at a famous landmark of the randomly generated city.
      The Polaroid is placed at the visual center and is the primary focus of the composition.

      The Polaroid photo must occupy more than 50% of the entire image area, clearly dominating the frame and serving as the unquestionable visual anchor.

      The city scenery inside the Polaroid appears contemporary and natural:
      natural daylight, clear sky, neutral architecture, realistic tones.
      No sunset atmosphere, no golden hour lighting, and no nostalgic or retro feeling.

      The Polaroid photo has a subtle instant film look, with gentle film grain, soft tonal transitions, and a light analog film filter, while remaining realistic and natural.

      At the bottom-right corner of the white Polaroid frame, add handwritten-style text showing ONLY the city name.
      The handwriting is natural, clean, subtle, and clearly readable, with no decorative typography or additional text.

      Around the Polaroid, place 3-4 iconic objects or miniature landmark models related to the randomly generated city
      (such as souvenirs, architectural miniatures, cultural symbols, maps, food items, or travel accessories).

      All supporting objects must be unique and non-repeating.
      No duplicate items, mirrored copies, or repeated object instances are allowed.

      No two supporting objects may belong to the same object category or type.
      Each object must represent a distinctly different category
      (for example: one miniature landmark, one cultural symbol, one food item, one travel accessory, one ticket-like item).
      Do NOT include multiple objects of the same type under any circumstances.

      All objects are physically resting on the same flat surface as the map.
      Objects must not float or hover.
      Every object makes clear contact with the surface and casts a natural contact shadow.

      All supporting objects are placed directly adjacent to the Polaroid photo and tightly grouped around it.

      The objects are arranged in a dense, compact flat-lay composition with minimal spacing.
      Objects visually cluster around the Polaroid, with reduced gaps between items.
      Multiple objects touch or closely align with the edges of the Polaroid and the frame.
      Some objects are partially cropped by the frame, reinforcing a tightly filled, edge-to-edge layout.

      The Polaroid, flight ticket, and surrounding objects together occupy more than 85% of the frame.
      There is minimal empty or negative space anywhere in the composition.

      Include a flight ticket next to the Polaroid.
      The destination city name on the ticket must always be fully visible, unobstructed, and clearly readable.
      It must not be cropped, covered, or partially hidden.
      Do NOT include any label such as “Name”, “Passenger Name”, personal names, or form fields.

      The background is a single, large world map filling the entire frame.
      The surface appears in a very light beige, off-white tone.
      Both landmasses and ocean areas are rendered in extremely low-contrast, near-identical neutral tones, with only subtle tonal differences separating sea and land.
      Geographic outlines are barely visible and softly faded.
      The map appears visually recessed and subdued, functioning strictly as a background layer and never competing with the Polaroid, ticket, or surrounding objects.

      Soft natural daylight enters from one direction.
      Soft, scattered sunlight falls across the surface of the world map,
      creating gentle patches of light and shadow that enhance texture while remaining subtle and unobtrusive.

      Lighting & Atmosphere:
      Balanced exposure, natural contrast, clean composition.
      Modern, refined, realistic finish.
      Explicitly non-vintage and non-retro.
      No aged, nostalgic, rustic, or old-fashioned aesthetic.
      No reference to any specific year or time period.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: false
    min_images: 2
    max_images: 2
    num_iterations: 50


# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (images can be reused)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: true
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
