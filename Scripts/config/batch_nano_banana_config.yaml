  - folder: Media Files/Nano Banana/0317 2 Styles/0317 Collage- Circle Pop
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "1:1"
    prompt: |
      <div>

      <h1>Photo Protection Rules</h1>
      <p>
      Photo usage rules (strict):<br>
      Each input photo must be used exactly once.<br>
      Every circle must contain a different photo.<br>
      No photo may appear more than once in the entire layout.<br>
      Duplicating or cloning photos across circles is strictly forbidden.<br>
      One circle contains exactly one photo only.<br>
      A single photo cannot be split or reused across multiple circles.<br><br>

      Photo integrity rules:<br>
      Do not remove the background from the photo.<br>
      User photos must preserve their original colors, lighting, subjects, and facial details.<br>
      Photos may be cropped when necessary to fit the circular composition cleanly, but the subject’s face and key subjects must remain fully visible and unobstructed.<br>
      No distortion, recoloring, filtering, or retouching is allowed.<br>
      No graphic elements, text, or decorations may cover a person’s face.

      </p>

      <hr>

      <h1>Design Description</h1>
      <p>

      Visual style:  
      Flat graphic editorial collage with a lively, playful, childlike graphic mood.  
      The overall design should feel energetic, cheerful, simple, and bold.

      Background:  
      Pure white full-bleed background.  
      Do not use turquoise, gray, beige, gradients, textures, shadows, or paper effects.

      Layout structure:  
      The canvas is vertically divided into two zones:  
      1. title area at the top  
      2. photo grid area in the middle  

      Title area:  
      The main title stays at the top center.

      Title typography:  
      Playful rounded display lettering with a hand-drawn, bubbly, slightly uneven look.  
      The title color must be solid black.

      Photo grid area:  
      The number of circles must exactly match the number of user photos.  
      Each user photo must appear inside one circular tile.  
      Do not generate extra circles.  
      No empty circles are allowed.

      Circle arrangement rules:  
      The circles must be arranged in a clean and intentional composition.  
      Do not scatter circles randomly.

      If there is 1 photo, place one circle centered.  
      If there are 2 photos, place two circles in one horizontal row.  
      If there are 3 photos, arrange the circles as a tidy triangle: one circle centered above, two circles below.  
      If there are 4 photos, arrange the circles in two rows of two.  
      If there are 5 photos, arrange the circles in two rows with two circles on the top row and three circles on the bottom row. The two rows must not be perfectly aligned; the top row should be slightly offset so the layout feels intentionally staggered rather than forming a strict centered grid.  
      If there are 6 photos, arrange the circles in two rows of three.

      Spacing and alignment:  
      All circles must remain evenly spaced with clean visual balance.  
      The composition should feel tidy and organized, while following the required layout rules above.

      Circle color system (strict order):  
      Circles must follow this fixed color sequence in reading order from left to right, top to bottom:

      1. red  
      2. blue  
      3. green  
      4. yellow  
      5. pink  
      6. light blue  

      Only the number of circles needed should appear, following this sequence.

      Circle styling:  
      Each circle uses one solid color only.  
      Do not add an outer border plus inner fill structure.  
      Do not use double rings, outlines, or multi-layer circle frames.  
      Each circle must appear as a clean, single solid-color circular tile.

      Photo placement rules:  
      Each user photo appears inside one circular tile only.  
      Photos may be cropped as needed to fit the circular composition cleanly, while keeping faces and key subjects fully visible.

      Decorative graphic style reference:  
      Decorative elements should be inspired by a playful hand-drawn doodle style: simple floral shapes, rounded petals, organic leaves, loose squiggles, starburst marks, and thick childlike brush shapes.

      The doodles should feel flat, graphic, spontaneous, and fun.  
      No realistic rendering, no texture, and no shading.

      Decorative Quantity:
      Use only 5 to 8 decorative elements total.

      Decorative element behavior:  
      Scatter a small number of playful doodle graphics around the circular photo area to enhance the lively mood.  
      They must remain secondary to the photos.  
      Do not cover faces.  
      Do not overcrowd the canvas.

      Overall composition:  
      Keep the design bright, fresh, and energetic, with a pure white background, a black playful title, colorful circular photo tiles, and small doodle accents.  
      The circle arrangement must follow the required photo-count layout exactly.

      </p>

      </div>
