tasks:
  - folder: Media Files/Nano Banana/0529 Full Body Reference - Male
    text_to_image: true
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "1:1"
    prompt: |
      Create a photorealistic full-body outdoor reference image of one original, non-famous adult man, generated from scratch.

      The person is centered in a square 1:1 frame, standing upright in a relaxed neutral pose, facing the camera directly. Show the entire body clearly from the top of the head to the soles of the shoes, with both feet fully visible and a small amount of empty space above the head and below the feet. The subject should occupy about 75% of the image height.

      The person is standing on a clean flat walking path in a simple natural outdoor setting. The background has soft greenery, open space, and gentle depth, but should remain minimal and not visually busy. The scenery should be softly blurred and realistic, with no crowds, no animals, no vehicles, no signs, no buildings close to the subject, no props, and no distracting objects. The ground should clearly support the person, with a natural contact shadow under the feet.

      Lighting is soft, even, and natural, like mild daylight or lightly overcast weather. Avoid harsh sunlight, dramatic shadows, strong backlight, or sunset lighting. Camera angle is straight-on at chest height with a natural 50mm portrait lens look, no wide-angle distortion, no fisheye effect, and no tilted perspective.

      The person should have realistic anatomy, natural proportions, a realistic face, clear hands, clear feet, relaxed shoulders, arms resting naturally slightly away from the body, straight legs, and feet planted naturally on the path.

      Use simple modern casual clothing that makes the body shape and joints easy to read: a plain fitted top, straight-leg pants, and clean simple sneakers. No accessories, no props, no logos, no text, no patterns, and no other people.

      The image should look like a clean source frame for image-to-video generation: stable neutral pose, clear full-body silhouette, realistic outdoor grounding, uncropped limbs, sharp focus, high detail, realistic hands, realistic feet, and balanced composition.
    num_iterations: 15
    concurrent_requests: 10

