tasks:
  - folder: ../Media Files/Nano Banana/1210 1 Style/1210 Strawberry Shot V3
    model: gemini-2.5-flash-image
    prompt: |
      Use the uploaded person as the subject, ensuring their face, face shape, facial features, hairstyle, skin tone, makeup, expression, and body proportions are completely identical to the person in the input photo.
      The clothing in the image must remain consistent: the person must wear a red knitted cardigan and a festive Santa hat. Underneath the cardigan is a thick white wool dress. The person's face, face shape, and facial features must be identical to those in the uploaded image.
      The environment, pose, props, and set design must strictly adhere to the following description.
      Above image: The entire scene must be shot from the front, with the person and table directly facing the camera, not from the side or three-quarters angle. The person is seated at a wooden table laden with gingerbread houses, desserts, candles, and trinkets. She raises her hands above her head, elbows bent, hands placed on either side of her cheeks in a playful pose, but without making a "V" sign. Each hand gently holds a small strawberry or berry. The person's expression is lively and expressive, with a hint of surprise, and her gaze is slightly upward or forward, conveying a cheerful and positive mood. The warm-toned lighting in the background creates a cozy indoor atmosphere, while the falling confetti adds to the soft and festive ambiance.
      Bottom shot: A cinematic close-up, filmed at a perfect 90-degree vertical angle, precisely capturing her clear profile. The camera must remain at a right angle, revealing only one eye; the other eye, eyebrows, and cheeks must be completely hidden, with absolutely no three-quarters or partial frontal rotation. Her nose, lips, and chin must present a clear, flat profile. Her chin rests almost on the wooden table—almost lying down—her gaze level with the head of the wooden reindeer placed in front of her. She looks directly at the wooden reindeer, about 30 centimeters away, maintaining a natural distance. She rests her head and one arm on the wooden table, gently touching or stroking the wooden reindeer. A Santa hat must be clearly visible from this angle. On the table around her are half a grapefruit, cut fruit, a cherry, and a drink with a straw in the foreground. The image highlights her profile, her hands, and the wooden reindeer, presented with dreamy, high-contrast warm lighting.
      Both images must maintain a consistent style, using warm, comfortable, soft color tones to create a vintage, handcrafted, sweet, and dreamy atmosphere, with a cinematic, soft tone. The overall color scheme must avoid excessive yellow or orange tones; whites should remain clean and natural, with a warm, balanced tone, rather than being overly yellow. Highlights should be brightened to enhance contrast between light and dark areas. Reds, oranges, and cream tones should be rich and vibrant, but maintain a warm balance. Her face and skin should appear fair, bright, and porcelain-like, clean, soft, and slightly luminous. Skin tones must avoid strong yellows or yellow-orange hues, maintaining a natural glow, and whites must always remain clean.
      The overall color saturation of the scene must be reduced by approximately 50% compared to the original reference photograph to create a significantly softer, darker visual effect, while still meeting all other style and color requirements mentioned above. In addition, the saturation must be reduced by approximately 30% compared to the original reference photo to ensure a softer, more understated image without compromising the intended warm and dreamy artistic atmosphere. The final output must strictly avoid any yellow or overly yellowish orange tones. The two images must be seamlessly joined, without any black lines, borders, shadows, or visible gaps; the transition between the upper and lower parts must be perfectly smooth and integrated. The scene must depict a warm interior space furnished with various objects; minimalist or blank backgrounds are strictly prohibited.
    reference_folder: ""
    use_comparison_template: false
    use_multi_image: false


