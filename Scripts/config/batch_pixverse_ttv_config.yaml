comments:
  output_folder: |
    Root folder where generated videos will be saved.
    Generated_Video and Metadata subfolders will be created automatically.
  generation_count: |
    Global generation count. Each task generates this many videos unless overridden.
  default_settings: |
    Global default settings applied to all tasks.
  model: |
    Pixverse model version.
    Options: 'v4.5', 'v5', 'v5.5', 'v5.6', 'v6', 'c1'
    Default: 'v6'
  aspect_ratio: |
    Video aspect ratio.
    Options: '16:9', '4:3', '1:1', '3:4', '9:16', '2:3', '3:2', '21:9'
    Note: '2:3', '3:2', '21:9' are v6/c1 only.
    Default: '16:9'
  duration: |
    Video duration for v4.5-v5.6 models.
    Options: '5s', '8s', '10s'
    Default: '5s'
  v6_duration: |
    Video duration in seconds for v6/c1 models (1-15s).
    Default: 5
  motion_mode: |
    Motion intensity for the video.
    Options: 'normal', 'fast'
    Default: 'normal'
  quality: |
    Output video quality/resolution.
    Options: '360p', '540p', '720p', '1080p'
    Default: '1080p'
  style: |
    Visual style preset.
    Options: 'anime', '3d_animation', 'clay', 'comic', 'cyberpunk', 'none'
    Default: 'none'
  effect: |
    Preset effect name from Pixverse effect list.
    Default: 'none'
  custom_effect_id: |
    Custom effect ID for user-created or special effects.
    Takes priority over the 'effect' field when specified.
  prompt: |
    Text prompt describing the video to generate.
  negative_prompt: |
    Elements to avoid in the generated video.
  seed: |
    Random seed for reproducibility. -1 for random.
    Default: -1
  thinking_type: |
    Prompt reasoning mode.
    Options: 'auto', 'enabled', 'disabled'
    Default: 'auto'
