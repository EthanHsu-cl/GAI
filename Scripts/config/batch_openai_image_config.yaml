  - folder: Media Files/OpenAI Image/0529 Full Body Reference - Male
    text_to_image: true
    model: gpt-image-2
    quality: high
    resolution: "2K"
    aspect_ratio: "1:1"
    prompt: |
      Create a photorealistic full-body studio reference image of one original, non-famous adult man, generated from scratch.

      The person is centered in a square 1:1 frame, standing upright in a relaxed neutral pose, facing the camera directly. Show the entire body clearly from the top of the head to the soles of the shoes, with both feet fully visible and a small amount of empty space above the head and below the feet. The subject should occupy about 75% of the image height.

      Use a clean minimal studio background with a plain light warm-gray seamless backdrop and a subtle floor contact shadow. Lighting should be soft, even, and natural, with no harsh shadows. Camera angle is straight-on at chest height, with a natural 50mm portrait lens look, no wide-angle distortion, and no tilted perspective.

      The person should have realistic anatomy, natural proportions, a clear silhouette, relaxed shoulders, arms resting naturally slightly away from the body, visible hands, straight legs, and feet planted naturally. Use simple modern casual clothing that makes the body shape and joints easy to read: a plain fitted top, straight-leg pants, and clean simple sneakers. No accessories, no props, no logos, no text, no patterns, and no other people.

      The image should look like a clean character reference frame prepared for image-to-video generation: stable pose, clear body outline, uncropped limbs, sharp focus, high detail, realistic face, realistic hands, realistic feet, and balanced composition.
    num_iterations: 5
    concurrent_requests: 3

