# Configuration Reference
comments:
  model: |
    OpenAI image generation model.
    Options: 'gpt-image-1', 'gpt-image-2'
    Default: 'gpt-image-2'
  quality: |
    Output image quality.
    Options: 'auto', 'low', 'medium', 'high'
    Default: 'auto'
  resolution: |
    Output resolution. Options: '1K' (default), '2K'.
  aspect_ratio: |
    Output aspect ratio. Valid options:
      'auto', '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4',
      '9:16', '16:9', '21:9'.
    Default: 'auto' — let the API pick the best ratio.
  prompt: |
    Text prompt describing the desired image. Reference the input via
    phrases like "the uploaded photo" or "the reference image".
  folder: |
    Path to the task folder. Must contain a 'Source' subfolder with input images.
    For multi-image mode, may also contain an 'Additional' subfolder.
    For reference mode, may also contain a 'Reference' subfolder.
    Output is written to 'Generated_Output/' and metadata to 'Metadata/'
    (both auto-created).
  reference_folder: |
    Optional folder containing reference images for comparison reports.
  use_comparison_template: |
    true uses comparison_template_path (3-media slides);
    false uses template_path (2-media slides). Default: false.
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N to group N tasks into one report."

  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (NO REPEATS until pool exhausted)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: 10)"
    num_iterations: "Number of API calls. Defaults to number of source files if 0."
    optimal_formula: "sources_needed = num_iterations × (min + max) / 2"
    use_deterministic_random: |
      true  -> shuffles source pool with a deterministic seed (reproducible randomness)
      false -> sequential alphabetical order
    random_seed: |
      Optional integer seed. If omitted, seed is auto-derived from folder path.

  reference_images:
    description: "Prepend images from a 'Reference' subfolder to every API call"
    use_reference_images: |
      true: prepends every image from <folder>/Reference/ to the images list.
            Reference images do NOT count toward min_images / max_images.
    folder_structure: "Place reference images in <task_folder>/Reference/ (sibling of Source/). Auto-created when enabled."

  generations_per_source:
    description: "Number of times each iteration's source group is sent to the API"
    default: 1
    note: "Total API calls = num_iterations × generations_per_source. Output files get '_gen00', '_gen01' suffixes when > 1."

  multi_image_config:
    description: "Pair Source images with Additional/ images (advanced)"
    enabled: "Must be true to use multi-image pairing features"
    mode: "sequential | random_pairing"
    folders: "List of folder paths to source additional images from"

  folder_structure: |
    Expected layout per task:
      task_folder/
      ├── Source/                 # input images
      ├── Reference/              # optional, prepended to every call
      ├── Additional/             # optional, paired in multi-image mode
      ├── Generated_Output/       # auto-created
      └── Metadata/               # auto-created
