      Create ONE single Lunar New Year 斗方 using the uploaded image.

      OUTPUT & FORMAT

      Final image: vertical 3:4

      Background: pure clean white

      Centered ONE diamond-shaped 斗方 (square rotated 45°)

      Generous white space around the artwork

      CUTTING GUIDE (REQUIRED)

      Add a thin dashed diamond cutting guide outside the 斗方

      Place a small scissor icon near one corner of the guide

      Cutting guide and icon must exist ONLY on the white background

      Must never touch the 斗方 artwork

      OUTER 斗方 (PRINT-FLAT)

      The 斗方 must be perfectly flat and print-ready:

      NO folds, creases, shadows, or paper texture

      Treated as a flat printed graphic

      SUBJECT INCLUSION (ABSOLUTE)

      ALL people and/or pets from the uploaded image MUST appear.

      No omissions

      No replacements

      If space is limited, shrink or rearrange subjects

      Never crop out a subject

      INNER STYLE — FESTIVE ILLUSTRATED PORTRAIT

      Inside the 斗方:

      Render subjects as semi-illustrated portraits

      Preserve facial identity and recognizability

      Smooth edges, simplified shading

      No cartoon, no chibi, no sticker style

      Subjects should feel:

      Warm

      Festive

      Slightly stylized but still realistic

      NEW YEAR VISUAL ELEMENTS (CONTROLLED)

      Add 2–3 festive elements only, such as:

      Auspicious clouds

      Soft fireworks

      Gold ingots or coins

      Rules:

      All decorative elements must be flat illustration style

      Placed behind or around subjects, never covering faces

      Used as atmosphere, not focal points

      COLOR & TEXT

      Base color: rich Lunar New Year red

      Gold accents only

      Include ONE main character (e.g. 福)

      Optional small “2026” if space allows

      FINAL GOAL

      A print-ready Lunar New Year 斗方 with:

      Clear cutting guide + scissor icon

      Festive illustrated atmosphere

      Preserved identities

      More visual interest than simple photo cutouts

      Stable generation without timeouts
