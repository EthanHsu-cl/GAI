  - folder: Media Files/Nano Banana/0128 6 Styles CNY 2/0128 可印製紅包V3
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4" 
    prompt: |
      Create a flat, print-ready, UNFOLDED traditional Chinese red envelope dieline layout.

      The final output image MUST be in an exact 3:4 aspect ratio.

      IMPORTANT:
      The unfolded red envelope dieline MUST extend to and TOUCH the canvas edges.
      The outer boundary of the red envelope IS the canvas boundary.
      No background area should be visible outside the envelope.
      The image must be treated as a flat graphic layout, NOT an object placed in a scene.


      ────────────────────────
      ENVELOPE TYPE
      ────────────────────────
      Traditional flat Chinese red envelope (side-glued).


      ────────────────────────
      OVERALL PROPORTION INTENT (CRITICAL)
      ────────────────────────
      The red envelope must have a vertically elongated proportion.

      - The envelope should feel tall and slim rather than short or square.
      - The vertical dimension is increased to ensure banknotes fit comfortably.
      - The horizontal width of the envelope must remain unchanged and must NOT be increased.
      - Any increase in overall size must favor HEIGHT ONLY, never width.


      ────────────────────────
      DIELINE STRUCTURE (ABSOLUTELY LOCKED)
      ────────────────────────
      The unfolded dieline MUST clearly include:

      - One BACK panel on the left
      - One FRONT panel immediately to its right
      - One RIGHT-SIDE glue flap attached to the outer edge of the FRONT panel
      - One TOP closure flap extending upward across BOTH panels
      - One BOTTOM flap extending downward across BOTH panels

      The BACK and FRONT panels must remain visually distinct but structurally continuous.


      ────────────────────────
      PROPORTIONAL CONSTRAINTS (CRITICAL — MUST BE PRESERVED)
      ────────────────────────
      - The height of the TOP closure flap must be approximately 1.5 times the width of the RIGHT-SIDE glue flap.
      - The height of the BOTTOM flap must be equal to the width of the RIGHT-SIDE glue flap.
      - These proportional relationships are fixed and must NOT be altered.


      ────────────────────────
      HEIGHT DISTRIBUTION RULE (CRITICAL — NEW)
      ────────────────────────
      - Any vertical elongation must be applied primarily to the BACK and FRONT panels.
      - The BACK and FRONT panels define the main capacity of the envelope.
      - TOP and BOTTOM flaps must remain functional and visually secondary.
      - TOP and BOTTOM flaps must NOT absorb excess vertical elongation.
      - The TOP closure flap must never appear oversized, dominant, or disproportionately tall relative to the FRONT panel.


      ────────────────────────
      BACK PANEL RESTRICTIONS (STRICT)
      ────────────────────────
      - The BACK panel design must NOT contain any structural lines.
      - Do NOT show fold lines, pocket lines, crease marks, or construction indicators.
      - The BACK panel must appear as one clean, uninterrupted decorative surface.


      ────────────────────────
      CANVAS & EDGE RULES (CRITICAL)
      ────────────────────────
      - The red envelope dieline must fully occupy the canvas.
      - No white margin, padding, or background may remain.
      - The envelope outer edge must align exactly with the image edge.
      - Treat the image as a full-bleed print layout.
      - Do NOT center the dieline with margins.
      - Do NOT shrink the envelope to fit inside the canvas.


      ────────────────────────
      LINE & STRUCTURE RULES
      ────────────────────────
      - Show clean outer dieline outlines only.
      - Do NOT warp, stretch, rotate, mirror, or reinterpret the structure.
      - Do NOT include numeric dimensions, arrows, units, or measurement text.
      - Do NOT include any cutting guides or auxiliary marks.


      ────────────────────────
      ABSOLUTE PROHIBITION — LABELS & MARKERS
      ────────────────────────
      Do NOT generate under any circumstances:
      - “FRONT”, “BACK”, “TOP”, “BOTTOM”, “LEFT”, “RIGHT”
      - “GLUE FLAP” or any similar instructional text
      - Any engineering, instructional, or explanatory labels

      The layout must rely on structure only, not text labels.


      ────────────────────────
      USER IMAGE HANDLING (ILLUSTRATED MODE — NATURAL LIKENESS)
      ────────────────────────
      ALL user-uploaded images MUST be used as visual reference.

      Render all people as ILLUSTRATED PORTRAITS, not photorealistic photos.

      Likeness rules:
      - Use uploaded photos to guide overall likeness, facial structure, proportions, and personal characteristics.
      - Preserve distinguishing features and natural asymmetry.
      - Avoid idealization, beautification, or facial optimization.
      - Do NOT slim faces, enlarge eyes, smooth features excessively, or correct proportions.

      Illustration style:
      - Natural, observational illustration style.
      - Hand-drawn or painted feel.
      - Visible but subtle texture.
      - Simplified shading without airbrushed perfection.
      - Not photorealistic.
      - Not cartoon, chibi, sticker, or cute style.

      Lighting & expression:
      - Soft, neutral lighting.
      - Natural facial expressions.
      - Avoid exaggerated smiles or posed expressions.

      Festive attire requirements:
      - Characters wear Lunar New Year–appropriate clothing.
      - Modern or traditional New Year outfits are acceptable.
      - Clothing should feel natural and worn, not fashion-editorial or stylized.

      All people and/or pets must appear ONLY on the FRONT panel.


      ────────────────────────
      DESIGN CONTENT & STYLE
      ────────────────────────
      - Rich Lunar New Year red base.
      - Gold as primary accent.
      - Traditional Chinese motifs (clouds, lanterns, florals, geometric patterns).
      - Gold-foil, embossed, or stamped visual effects.

      Tone:
      - Festive
      - Refined
      - Traditional
      - Elegant

      NOT allowed:
      - Cute, cartoonish, childish styles.
      - Overly polished or idealized illustration styles.

      Visual emphasis must remain on the FRONT panel.


      ────────────────────────
      TEXT ELEMENTS
      ────────────────────────
      Only celebratory New Year text is allowed, such as:
      「新年快樂」
      「2026」
      「恭喜發財」

      No functional or structural text is permitted.


      ────────────────────────
      OUTPUT REQUIREMENT (FINAL)
      ────────────────────────
      Single unfolded dieline image.
      Edge-to-edge composition.
      No background.
      No labels.
      No mockups.
      No perspective distortion.
