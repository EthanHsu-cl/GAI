    prompt: |
      MODEL: Gemini 3 / Banana Pro

      ==================================================
      CRITICAL FACE ID LOCK — PRIORITY 1 (EXTREME)
      ==================================================

      Use the uploaded photo(s) as the ONLY and ABSOLUTE source of the person’s face.

      The generated face must be the SAME REAL PERSON as in the input photo,
      copied directly from the input, NOT reconstructed, NOT reinterpreted.

      Do NOT beautify, optimize, stylize, idealize, or normalize the face in any way.
      Do NOT adjust facial proportions, features, symmetry, skin texture, or age.

      Do NOT change ethnicity, race, or regional facial characteristics.

      The facial expression must remain natural and consistent with the input photo.
      Do NOT modify or enhance expression.

      If the face does not immediately look identical to the input person,
      the result is INVALID and must be regenerated.
      The face must be directly copied from the input photo at the pixel-structure level, not re-generated or averaged.
      ==================================================
      SUBJECT & SOURCE IMAGE RULES
      ==================================================

      Use the uploaded user photos as the ONLY human sources.

      - The number of people in the final image must EXACTLY match the number of uploaded photos (1–4 only)
      - No extra people
      - No duplicated faces
      - No merged identities
      - No face swapping

      All facial features must come ONLY from the input photos.
      Input photos override all stylistic, aesthetic, or generative tendencies.

      ==================================================
      SCENE & BACKGROUND
      ==================================================

      Professional studio photoshoot.
      Clean, seamless light grey to off-white background.
      Plain, smooth, minimal.
      No texture, no gradients, no patterns.

      ==================================================
      OUTFITS (STRICT COLOR CONTROL)
      ==================================================

      - All subjects wear solid red knit sweaters
        - No logos
        - No patterns
      - Bottoms are pure white only:
        - Adults: white trousers or white skirts
        - Children: white skirts or white shorts
      - Shoes: white or red only

      No other colors allowed on clothing.

      ==================================================
      POSE & MOOD
      ==================================================

      Avoid stiff or posed standing positions.

      Subjects should appear natural and relaxed:
      - Slight leaning toward each other
      - Relaxed arms
      - Natural body angles
      - Warm, casual family interaction

      Mood should feel joyful, festive, and candid.
      Do NOT exaggerate expressions.
      Preserve the natural expression from the input photos.

      ==================================================
      PROP — CHINESE CHARACTER「好」(MANDATORY)
      ==================================================

      All subjects hold ONE oversized Chinese character「好」with the following REQUIRED properties:

      FORM & MATERIAL
      - Must be a physical hand-cut paper or cardboard prop
      - The paper is CUT ALONG THE CHARACTER OUTLINE
      - The outer edge follows the brush strokes of 「好」

      PROHIBITED:
      - Rectangular boards
      - Square cards
      - Any geometric base with a character printed on it

      COLOR & EDGE
      - Main character color: festive red
      - A clearly visible white border outlines the character
      - The white border follows the brushstroke silhouette
      - Border thickness is natural and hand-cut, not vector-perfect

      TYPOGRAPHY STYLE
      - Traditional calligraphy similar to 凝書體
      - Thick, rounded brush strokes
      - Handcrafted, organic feeling
      - Slight natural imperfections

      NOT allowed:
      - Geometric forms
      - Modern fonts
      - Sharp edges
      - Digital or vector typography

      ==================================================
      HAND-DRAWN DECORATIONS
      ==================================================

      Add subtle hand-drawn doodles:

      - Handwritten “Happy New Year”
      - Small hand-drawn flowers
      - Simple festive icons

      Style:
      - Childlike
      - Playful
      - Hand-sketched

      Decorations must NOT cover faces or distort bodies.

      ==================================================
      LIGHTING & CAMERA
      ==================================================

      Soft, even studio lighting.
      No harsh shadows.
      Eye-level camera.
      High resolution.
      Sharp focus.
      Clean commercial photography.

      ==================================================
      FINAL IDENTITY VERIFICATION (MANDATORY)
      ==================================================

      Before finalizing, verify:

      - Faces immediately and clearly match the uploaded photos
      - Ethnicity and regional facial characteristics are unchanged
      - Facial structure and natural expression are preserved

      If ANY check fails, the result is INVALID and must be regenerated.
