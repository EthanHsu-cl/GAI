    prompt: |
      Create ONE single photorealistic Lunar New Year “斗方” using the uploaded image (any subject type: person, baby, pet, or group photo).

      The result must look like a real New Year photograph, NOT an illustration, collage, graphic mockup, or digital composite.

      ==================================================
      ASPECT RATIO
      ==================================================

      Final image must be vertical 4:5.

      ==================================================
      MANDATORY SUBJECT INCLUSION (CRITICAL – NO EXCEPTIONS)
      ==================================================

      ALL people and/or pets present in the uploaded image MUST be included in the final design.

      No person or pet may be omitted, removed, cropped out, replaced, or substituted.

      If the uploaded image contains multiple people and/or pets:
      - Every individual must appear together within the SAME single 斗方.
      - Partial inclusion is strictly prohibited.

      Do NOT generate additional people or animals.
      Do NOT replace any subject with illustrations, symbols, silhouettes, or decorative substitutes.

      All subjects must remain recognizable and clearly identifiable, preserving their key features and identity.

      Any result that fails to include ALL people and/or pets is INVALID and must be regenerated.

      ==================================================
      STRICT COMPOSITION RULES
      ==================================================

      The image must contain ONLY ONE 斗方.
      Do NOT generate multiple 斗方.

      The 斗方 must be slightly smaller than typical center decorations, leaving visible surrounding space.
      The 斗方 must be centered but not oversized or edge-to-edge.

      ==================================================
      PLACEMENT SCENE (CHOOSE ONE ONLY)
      ==================================================

      Choose ONE scene only:
      - A traditional or modern dark wooden door
      - A clean white wall

      If placed on a wooden door:
      - The 斗方 is centered on the door.
      - Hang traditional Lunar New Year firecracker decorations (鞭炮串) vertically on BOTH the left and right sides of the door.
      - Firecrackers must be festive, red-dominant, and clearly visible.
      - Firecrackers must NOT overlap, cover, or block the 斗方.

      ==================================================
      DESIGN & COLOR REQUIREMENTS
      ==================================================

      The 斗方 must be square (1:1) and rotated 45 degrees (diamond orientation).

      Base color must be predominantly RED.
      Gold is accent color only (text, patterns, highlights).

      Avoid pale, beige, pink, pastel, or non-festive base colors.

      ==================================================
      CONTENT REQUIREMENTS
      ==================================================

      Preserve the identity and key features of ALL uploaded subjects.

      Include ONE main Chinese New Year character or phrase (e.g. 福, 春, 財).

      The year “2026” may appear optionally.

      Randomly include several Lunar New Year decorative elements:
      - pineapple
      - peanuts
      - gold ingots
      - 财神
      - festive clouds
      - coins
      - firecrackers

      Decorative elements must support the design and must NOT dominate, replace, or obscure the main subject or the 斗方.

      ==================================================
      REALISM REQUIREMENTS
      ==================================================

      The final image must look like a real, professionally photographed Lunar New Year scene.

      The 斗方 must look like real printed paper:
      - Subtle paper texture
      - Clean, natural edges
      - No artificial glow or graphic effects

      Lighting must match the door or wall environment naturally.
      No collage look, no floating objects, no surreal or illustrated effects.

      ==================================================
      PHYSICAL INTEGRATION & LIGHTING REALISM (CRITICAL)
      ==================================================

      The 斗方 must be physically integrated into the environment as a real, rigid paper decoration,
      NOT a graphic overlay, sticker, or post-production pasted element.

      The 斗方 must interact naturally with the surrounding environmental light:
      - It must receive the SAME light direction, intensity, color temperature, and shadow behavior as the door or wall surface.
      - Highlights, midtones, and shadows on the 斗方 must match the ambient and directional lighting of the scene.
      - The paper must show subtle light falloff and soft contact shadows where it meets the wall or door.

      The 斗方 must NOT appear flat, glowing, floating, uniformly lit, or digitally composited.

      ==================================================
      PAPER MATERIAL CONSTRAINTS (STRICT)
      ==================================================

      The 斗方 must be made of rigid, flat printed paper:
      - The paper surface must remain smooth and planar.
      - NO wrinkles, creases, folds, bends, waves, curls, or fabric-like behavior.
      - The paper must NOT sag, ripple, deform, or behave like cloth.
      - The edges must remain crisp and clean, consistent with freshly printed New Year paper.

      The 斗方 must clearly read as printed paper stock,
      NOT fabric, banner, scroll, textile, or flexible material.

      ==================================================
      FINAL VALIDATION RULE
      ==================================================

      Any result where the 斗方 appears as a flat digital overlay, sticker, collage element,
      or post-processed pasted graphic is INVALID and must be regenerated.

      ==================================================
      FINAL GOAL
      ==================================================

      A realistic vertical 3:4 Lunar New Year photograph showing ONE single, slightly smaller red-based 斗方,
      naturally pasted on a door or wall, with ALL uploaded people and/or pets fully included,
      balanced festive decorations, physically correct lighting, and a joyful traditional atmosphere.
