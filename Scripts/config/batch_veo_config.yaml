comments:
  output_directory: 'Optional: Global output directory for all generated PPTX files. Default is current directory.'
  generation_count: Global default number of videos to generate per task. Default is 1. Can be overridden per task.
  schedule: 'Time format: HH:MM (24-hour format). Leave empty to start immediately'
  style_name: 'Task-specific style identifier used in output filename: [Style name]-[Number].mp4'
  task_generation_count: Task-specific number of videos to generate. Overrides global generation_count if specified.
  model_id: 'Options: ''veo-2.0-generate-001'', ''veo-3.0-generate-001'', ''veo-3.0-fast-generate-001'', ''veo-3.0-generate-preview'',
    ''veo-3.0-generate-preview'', ''veo-3.1-generate-preview'', ''veo-3.1-generate-preview'''
  duration_seconds: Video duration in seconds (numeric value)
  aspect_ratio: 'Options: ''16:9'', ''9:16'''
  resolution: 'Options: ''720p'', ''1080p'''
  compression_quality: 'Options: ''optimized'', ''lossless'' (Veo 3+ only)'
  seed: Random seed for reproducibility. Use 0 for random generation.
  output_storage_uri: 'Optional: Cloud storage URI for output'
  enhance_prompt: Whether to enhance the prompt automatically (true/false)
  generate_audio: Whether to generate audio for the video (true/false)
  person_generation: 'Options: ''default'', ''allow_adult'', ''dont_allow'', ''allow_all'''
  output_folder: Path where generated videos will be saved. Metadata folder will be created automatically.
  text_to_video_note: Veo is a text-to-video API - no input files required. Each task generates one video from a text prompt.
