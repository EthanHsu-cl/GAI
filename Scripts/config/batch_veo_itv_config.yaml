    model_id: veo-3.1-generate-001
    duration_seconds: 8
    aspect_ratio: '16:9'
    resolution: 1080p
    compression_quality: optimized
    seed:
    enhance_prompt: true
    generate_audio: true
    person_generation: allow_all

  - style_name: Violin
    folder: Media Files/Veo_ITV/0130 6 Styles/Violin
    prompt: |
      Based on the visual benchmark of image_8.png, cinematic realism style captured with a 50mm prime lens. The woman with wavy blonde hair in the black dress performs a highly dynamic violin performance with extremely large-amplitude, expressive bowing movements. Her entire body executes a slow, continuous fluid rotation (pirouette) while playing. A stable Steadicam tracking orbit shot synchronizes perfectly with her rotation speed, encircling her to capture the constantly shifting body postures and intense kinetic energy. The dramatic side Rembrandt lighting and warm golden rim light established in image_8.png rapidly flow and shift across her face, hair, and the violin body as she turns. The atmosphere is ultra-pristine and crystal clear, explicitly characterized by the complete absence of any floating dust, rosin particles, or volumetric fog against the deep pitch-black background.
    negative_prompt: ''
    model_id: veo-3.1-generate-001
    duration_seconds: 8
    aspect_ratio: '16:9'
    resolution: 1080p
