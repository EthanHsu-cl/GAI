# Veo Image-to-Video (ITV) Batch Configuration
# Each style folder should contain a 'Source' subfolder with source images
# Generated videos will be placed in 'Generated_Video' subfolder
# Metadata will be placed in 'Metadata' subfolder

template_path: templates/I2V templates.pptx

output:
  directory: /Users/ethanhsu/Desktop/EthanHsu-cl/GAI/Report
  # Group N tasks into one combined report. Set to 0 or omit for individual reports.
  # Example: with 5 tasks and group_tasks_by=5, creates 1 report with all 5 styles.
  # The report filename and title will include all style names.
  group_tasks_by: 

# Global generation count - how many videos to generate per source image
# Can be overridden per task
generation_count: 1

# Root folder containing all style subfolders
root_folder: ../Media Files/Veo_ITV

schedule:
  start_time: ''

root_source_video_link: https://cyberlinkcorp-my.sharepoint.com/:f:/g/personal/onedrive_qa1_cyberlink_com/IgBNB0-d20AqTbGxgEdEuhUFAUwzHpdO_m8vv0_yb_fjAJw?e=bABlN4
root_design_link: https://docs.google.com/presentation/d/1kF8imHlU9i6uJtCOL8JWkxWVgKbW7mdq1JaquM7HfwY/edit?slide=id.g3aad1030c6f_20_3#slide=id.g3aad1030c6f_20_3

