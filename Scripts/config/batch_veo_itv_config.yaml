# Veo Image-to-Video (ITV) Batch Configuration
# Each style folder should contain a 'Source' subfolder with source images
# Generated videos will be placed in 'Generated_Video' subfolder
# Metadata will be placed in 'Metadata' subfolder

template_path: templates/I2V templates.pptx

output:
  directory: /Users/ethanhsu/Desktop/EthanHsu-cl/GAI/Report
  # Group N tasks into one combined report. Set to 0 or omit for individual reports.
  # Example: with 5 tasks and group_tasks_by=5, creates 1 report with all 5 styles.
  # The report filename and title will include all style names.
  group_tasks_by: 

# Global generation count - how many videos to generate per source image
# Can be overridden per task
generation_count: 5

# Root folder containing all style subfolders
root_folder: Media Files/Veo_ITV

schedule:
  start_time: ''

root_source_video_link: https://cyberlinkcorp-my.sharepoint.com/:f:/g/personal/onedrive_qa1_cyberlink_com/IgDjKNkivMT8SLH9W6IuXhxEAd3sEyX6cDdPgLRQozw_xuk?e=Oe38WA
root_design_link: https://docs.google.com/presentation/d/1XWlCZ0QVzoQcUIYvHrm5CFk6s1QHn4mh7NaJWzESJ7k/edit?slide=id.g3bc2c5bd915_1_0#slide=id.g3bc2c5bd915_1_0

# Example task structure:
# Each task represents a style folder under the root_folder
# The folder should contain a 'Source' subfolder with the source images
tasks:
  - style_name: Street Rap
    folder: Media Files/Veo_ITV/0130 6 Styles/Street Rap
    prompt: |
      Cinematic music video opening shot, urban noir aesthetic, core subject is a young African American male rapper with short dreadlocks, wearing a high-gloss black shiny puffer jacket over a black tee, adorned with heavy layered diamond Cuban link chains and a large iced-out pendant, diamond rings and watch, confident rapping performance with mouth open, right hand raised in a rhythmic gesture, set in a narrow brick alleyway covered in graffiti, lighting provided by ambient cyan, pink, and purple neon signs scattered in the background mid-ground, casting diffused colored light onto the scene but specifically avoiding direct backlighting or rim lighting behind the subject's head, environmental details include wet pavement with strong ray-tracing reflections, subtle atmospheric haze and light wisps of smoke drifting gently from the left side, shot on Arri Alexa Mini LF with a 50mm Anamorphic lens, f/1.8 aperture, cinematic shallow depth of field with creamy bokeh, sharp focus on subject, cool color palette with high contrast, 8k ultra-realistic texture.
    negative_prompt: ''
    model_id: veo-3.1-generate-001
    duration_seconds: 8
    aspect_ratio: '16:9'
    resolution: 1080p
    compression_quality: optimized
    seed:
    enhance_prompt: true
    generate_audio: true
    person_generation: allow_all

  - style_name: Eyes Zoom-in
