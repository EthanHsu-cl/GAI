    seed:
    enhance_prompt: true
    generate_audio: true
    person_generation: allow_all


# To add more styles, copy the task block above and modify:
# - style_name: Name of the style (used in logging)
# - folder: Path to the style folder containing Source subfolder
# - prompt: The prompt for video generation
# - Other parameters as needed

comments:
  folder_structure: |
    Expected folder structure:
    root_folder/
    ├── Style 11_Statue Selfie/
    │   ├── Source/
    │   │   ├── image1.jpg
    │   │   └── image2.png
    │   ├── Generated_Video/  (created automatically)
    │   │   ├── image1_1.mp4
    │   │   ├── image1_2.mp4
    │   │   └── image2_1.mp4
    │   └── Metadata/  (created automatically)
    │       ├── image1_1_metadata.json
    │       ├── image1_2_metadata.json
    │       └── image2_1_metadata.json
    └── Style 12_Another Style/
        ├── Source/
        └── ...

  output_naming: |
    Generated videos are named: {source_image_name}_{generation_number}.mp4
    Example: If source is 'selfie.jpg' with generation_count=2:
      - selfie_1.mp4
      - selfie_2.mp4

  generation_count: |
    Global default number of videos to generate per source image.
    Can be overridden per task. Default is 1.

  group_tasks_by: |
    Controls how tasks are grouped into PowerPoint reports:
    - Set to 0 (or omit) to create individual reports per task
    - Set to N (e.g., 5) to group N tasks into one combined report
    Example: with 5 tasks and group_tasks_by=5, creates 1 report containing all 5 styles
    The report filename and title will include all style names from the grouped tasks.

  schedule: |
    Time format: HH:MM (24-hour format). Leave empty to start immediately.

  model_id: |
    Options:
      - veo-2.0-generate-001
      - veo-3.0-generate-001
      - veo-3.0-fast-generate-001
      - veo-3.0-generate-preview
      - veo-3.0-fast-generate-preview
      - veo-3.1-generate-preview
      - veo-3.1-fast-generate-preview
      - veo-3.1-generate-001 (default)
      - veo-3.1-fast-generate-001

  duration_seconds: Video duration in seconds (numeric value, default 8)
  aspect_ratio: "Options: '16:9', '16:9'"
  resolution: "Options: '1080p', '1080p'"
  compression_quality: "Options: 'optimized', 'lossless' (Veo 3+ only)"
  seed: Random seed for reproducibility. Use 0 for random generation.
  output_storage_uri: "Optional: Cloud storage URI for output"
  enhance_prompt: Whether to enhance the prompt automatically (true/false)
  generate_audio: Whether to generate audio for the video (true/false)
  person_generation: "Options: 'default', 'allow_adult', 'dont_allow', 'allow_all'"
