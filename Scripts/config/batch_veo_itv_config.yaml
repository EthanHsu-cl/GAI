  - style_name: Girl with Pearl Earrings
    folder: Media Files/Veo_ITV/0130 6 Styles/Girl with Pearl Earrings
    prompt: |
      Style Anchor: Cinematic Moving Oil Painting, Vermeer Aesthetic, continuous heavy impasto texture visible throughout; Optical Specs: 50mm Prime Lens, shallow depth of field, 8k resolution; Dynamic Camera Encoding: Fixed Mid-Shot composition maintaining absolute framing integrity with no camera movement; Visual Subject: The Girl with a Pearl Earring matching reference images, features strictly limited to exactly one single visible pearl earring on the visible earlobe, no second earring exists; Action Trajectory: The subject's left hand ascends gracefully and slowly from the lower frame to execute a delicate, elegant surface-only fingertip graze upon the fixed pearl earring attached to her earlobe, synchronized with a natural, gentle eye blink; Physical Details: Spatial Lock [The single pearl remains physically anchored to the ear], Chiaroscuro lighting, slow fluid motion
