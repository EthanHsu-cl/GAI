    negative_prompt: ''
    model_id: veo-3.1-generate-001
    duration_seconds: 8
    aspect_ratio: '16:9'
    resolution: 1080p
    compression_quality: optimized
    seed:
    enhance_prompt: true
    generate_audio: true
    person_generation: allow_all

  - style_name: Running in the field
    folder: Media Files/Veo_ITV/0130 6 Styles/Running in the field
