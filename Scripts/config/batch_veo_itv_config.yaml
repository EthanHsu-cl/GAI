  - style_name: ASMR hamburger
    folder: Media Files/Veo_ITV/0130 6 Styles/ASMR hamburger
    prompt: |
      Cinematic Commercial ASMR, Static Side Profile Close-Up, shot on ARRI Alexa 35 with 100mm Macro lens. Subject: Woman with voluminous curly red hair, glowing under intense Golden Hour backlighting with sharp rim light. Action: She holds a large, golden-brown fried chicken drumstick with both hands, manicured dark blue nails, mouth engaged in a deliberate, high-pressure bite. Visual Synesthesia for Audio: Focus strictly on the solid mechanics of the crunch; the sharp, crystalline fracturing of the deep-fried batter, the rigid fragmentation of the irregular crispy skin clearly separating from the meat under tooth pressure, and the clean tear of the dense chicken fibers without any moisture mist. Constraint: Zero steam, no heat waves, no atmospheric haze; maintaining absolute optical sterility. Subject's face, skin, and lips remain impeccably clean, free of grease or crumbs. Lighting: Vacuum-level clarity, high contrast texture rendering. Background: Creamy heavy optical bokeh of a cafe interior. 8K resolution.
