  - folder: ../Media Files/Nano Banana/0129 3 Styles/0129 花束般的戀愛
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Use the two uploaded people as the only subjects. Their real identities must remain perfectly accurate to the uploaded photos. Do not alter their faces, facial features, bone structure, skin tone, expressions, makeup style, hairstyle, or proportions. Do not beautify, stylize, smooth, age, or replace them with any other person. No additional people may appear.

      Create a movie poster inspired by the Japanese film “We Made a Beautiful Bouquet,” capturing an intimate, warm, extremely close-up moment between the two subjects. The framing must be very close to their faces, focusing on their eyes and expressions.

      Clothing assignment (very important):
      • Any male subject must wear a white inner shirt with a soft blue knitted cardigan on top, matching the gentle, casual tone of the reference film.
      • Any female subject must wear an orange-pink knitted sweater, and she must hold a bouquet of flowers in her arms.
      • The female subject must also hold a piece of bread in her hand, feeding it gently to the other subject.

      Scene direction:
      Create a warm, romantic, natural-feeling moment between the two subjects. The female subject looks at the other person with a soft, happy expression full of affection. The feeding gesture must look natural, delicate, and intimate. The other subject leans slightly toward her, receiving the bread gently. Their faces must be close, with soft sunlight illuminating their skin.

      Lighting & atmosphere:
      Use bright, soft Japanese-style daylight with a dreamy emotional tone. The edges of the frame should feel slightly hazy with strong depth-of-field separation: sharp focus on their eyes and faces, smooth transitions upward and outward. The bouquet should appear airy and bright, blending beautifully with the soft lighting.
      Apply a Japanese-style cool, blue-leaning color palette throughout the scene—a gentle cold-tone film look, clean, soft, slightly desaturated, and emotionally subtle—while maintaining the original cinematic softness.

      Typography (critical):
      At the bottom of the poster, transition into a subtle, reduced-height white area with gentle, minimal wave-like edges—not too tall, not too dramatic, just enough to host the title cleanly.

      Inside this white section, place the main title:

      恋をしている日々

      The title must use a typeface matching the original film poster—an elegant, delicate, lightly handwritten-style serif font with soft curves. The characters 「恋」 and 「日」 must appear slightly larger than 「をしている」 and 「々」, following the hierarchy of the original design.
      The entire title must be rendered in a deep brown color.

      Directly beneath the title, add two thin, hand-drawn-style decorative straight lines of equal thickness, also in deep brown.

      Styling notes:
      The poster must look like an authentic romantic Japanese film poster—emotional, tender, soft daylight, cinematic, and close-up on love and expression. No parody, no harsh contrast, no heavy filters. Keep it gentle, natural, and film-like, with the newly applied cool-toned Japanese blue palette.

      The final image must preserve perfect facial identity, intimate emotion, soft lighting, soft bokeh, correct clothing, correct bouquet + bread interaction, and a clean, readable Japanese title in the gently waved white area with uniform title color and the two intersecting hand-drawn decorative lines at the far right.
