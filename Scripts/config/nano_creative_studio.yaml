tasks:
  - folder: ../Media Files/Nano Banana/0126 2 Styles Creative Studio/0126 攝影兩宮格
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Please use all uploaded photos as the only source of characters in the image. Preserve every person’s real face, facial features, bone structure, skin tone, hairstyle, clothing, and overall identity exactly as shown in their original photos. Do not beautify faces, smooth skin, stylize features, alter proportions, change age, or modify identity in any way. No additional people may appear. Each uploaded person must appear only once in the final image, with no duplication, cloning, or repeated faces.

      Create a vertically oriented image divided clearly into two stacked horizontal frames, resembling a casual photo exchange between friends. The overall mood should feel natural, playful, and nostalgic, inspired by a Japanese springtime aesthetic. The setting should feel like a green park in early spring, with soft sunlight, fresh greenery, trees, and a relaxed outdoor atmosphere. The color tone should be light, airy, and slightly warm, emphasizing fresh greens and gentle daylight. The two stacked frames must be seamlessly stitched together with no white borders, gaps, margins, or visible separators of any kind. The transition between the upper and lower frames should be clean and continuous, forming a single unified image.

      [Upper Frame: The Photographer] In the upper frame, randomly select one single person from the uploaded users to act as the photographer. This person must appear alone in the upper frame. The character should be posing with a compact camera or film camera, gently and naturally holding it near their face rather than actively taking a photo. The camera should rest casually against the face, covering only one eye, while the other eye remains clearly visible. Both eyes must be open, relaxed, and clearly visible with no blinking. The upper frame must be shot from a clear low-angle (upward-looking) perspective. The background should be dominated by sky, treetops, or bright open air, with no visible ground. The pose should feel calm, casual, and intentional. The photographer must be fully intact within the upper frame with no cut-off limbs or rendering errors.

      [Lower Frame: The Viewfinder Scene] In the lower frame, depict all remaining uploaded users together, excluding the person used in the upper frame. This represents the scene being photographed. The camera viewpoint is from above (high-angle), looking downward toward the group sitting on a picnic blanket on the grass. The background consists entirely of grass and the picnic blanket, with no horizon line. Characters should be interacting casually, sitting close together with lively, genuine expressions (peace signs, leaning in, laughing).

      [Crucial: Viewfinder Overlay Construction] The lower frame must feature a strict and absolute "Edge-to-Edge Viewfinder" overlay, exactly matching the style and placement of the solid black frame in image_3.png.

      The Border: The entire lower frame must be enclosed by a single, thick, solid black rectangular bezel that acts as the absolute physical limit of the image. This black line must be perfectly flush with and become the outermost edge of the entire lower canvas. There must be ZERO padding, ZERO margins, and absolutely NO white space between the black line and the actual edge of the image file. The black line is the final, hard boundary.

      Closed Loop: The black border must be a complete, unbroken, four-sided closed rectangle. Do not use disconnected corner brackets ( ｢ ｣ ) or broken lines. It must be a solid connected box that hugs the very edge of the image boundary, containing the entire scene.

      UI Elements: Inside this black perimeter, overlay minimal white camera UI elements: a small "REC" indicator (top left corner) and a battery icon (top right corner). These icons must sit inside the image, close to the black border.

      No Other Guides: Absolutely NO grid lines, NO rule-of-thirds lines, NO focus squares in the middle, and NO face-detection boxes. Keep the center of the image completely clean.

      [Atmosphere] Both frames share consistent lighting: soft daylight, gentle shadows, springtime warmth. The final image should clearly read as a "Photographer (Top) vs. What They See (Bottom)" narrative, with accurate identities and a clean, edge-to-edge viewfinder graphic in the bottom half.
