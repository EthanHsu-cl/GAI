  - folder: ../Media Files/Nano Banana/0122 2 Styles Creative Studio/0122 拍貼系列-Style2 2005
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "3:4"
    prompt: |
      Use all uploaded photos as the only subjects.
      Their real identities must remain recognizable and consistent.
      This is a photographic purikura-style filter application, NOT a realistic portrait and NOT a modern beauty retouch. Do not redraw, replace, or re-generate the people and Adding any other person or repeating the same person is prohibited. The output must appear as one uninterrupted purikura photo.No photos should show white borders in other scenes, be held by the subject, or be framed.
      Identity preservation rules:
      – The same people must remain clearly identifiable
      – Facial structure, face shape, and hairstyle must remain consistent
      – Purikura-style facial modification is ALLOWED and REQUIRED:
      • The eyes may be slightly enlarged in a natural early-purikura manner, avoiding exaggerated manga-style proportions
      • skin may be softly airbrushed
      • proportions may be slightly exaggerated in a cute, non-realistic way
      – Do NOT replace faces or turn them into illustrations or anime
      Create a playful single-frame photo-booth image styled like an early-2000s Japanese Heisei-era purikura (プリクラ) machine.
      The image must look like it was produced directly by a real purikura booth:
      – bright
      – cute
      – slightly over-processed
      – energetic
      – nostalgic
      – intentionally a little chaotic
      Layout:
      – Single unified purikura frame only
      – NO four-frame or multi-panel layout of any kind
      – NO borders, margins, dividers, or white lines
      – One complete purikura output, not a collage and not separated images
      Subjects:
      – All subjects must appear together within the same single frame
      – Relative positions and scale remain consistent
      – Natural, playful interaction is required within the single image
      – Classic purikura poses (peace signs, close shoulders, cute expressions)
      Classic Heisei purikura facial treatment (REQUIRED):
      – Slightly larger, rounder, clearly defined eyes with restrained enlargement
      – Soft facial retouching with visible “machine smoothing”
      – Slight whitening / brightening of skin tone
      – No realistic skin texture emphasis
      – No modern beauty, no cinematic realism
      Overall color & exposure:
      – Bright, high-key look
      – Slight overexposure
      – Warm pink-magenta dominant tone, while dark solid-color backgrounds such as purple or black may also appear for contrast
      – Soft glow / bloom on highlights
      – Flat contrast (no deep shadows)
      – Avoid modern HDR, film grading, or clarity enhancement
      Decorations & stickers (KEEP MINIMAL, NOT DENSE):
      – Use ONLY 1–2 sticker elements total (e.g., one small heart + one tiny star OR one simple crown only)
      – Keep doodles simple and sparse, with lots of clean negative space
      – No layered clusters, no heavy overlap, no “sticker wall” look
      – Stickers must float on top of the image, not embedded into faces
      – Do NOT cover eyes, eyebrows, nose, or mouth
      Handwritten text style (CRITICAL):
      – Imperfect strokes, uneven thickness
      – Cute, bubbly, casual handwriting
      – White or bright colors with outlines or glow
      Main text content (choose ONLY ONE, placed once in the single image):
      「ずーっと心友!!」
      「ずっとなかよし♡」
      「ずっ友!!」
      「だいすき♡」
      Optional supporting sticker text:
      Do NOT add supporting text, or at most add ONLY ONE short phrase from the list once, small and unobtrusive:
      一生仲仔、最強仲仔、仲仔、宝物、最強、最高、ぶちあげ、アゲ、
      我等友情永久不滅、Best Friend、FOREVER FRIEND、心友、信友
      Mood & intent:
      Joyful, intimate, nostalgic friendship energy.
      The final image must unmistakably look like an authentic early-2000s Japanese purikura print:
      – bright
      – cute
      – over-decorated
      – handwritten
      – emotionally warm
      – unmistakably Heisei-era
