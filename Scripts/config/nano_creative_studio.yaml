tasks:
  - folder: ../Media Files/Nano Banana/0120 4 Styles Creative Studio/0120 Collage - Film Strip
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |
      **Role:** Professional Graphic Designer & Editorial Layout Expert.

      **Task:** Create a vertical "Travel Memory" poster composition using the uploaded reference images.

      **Design Layout & Composition (Fixed Structure):**
      1.  **Split Composition:** Divide the visual field. The layout must be strictly 2D flat graphic design, NO 3D perspective distortion.
      2.  **Left Column (The Film Strip):**
          -   Create a **perfectly straight, strictly vertical**, solid black film strip running from the absolute top to the bottom of the left edge. **Constraint:** It must be parallel to the canvas edge with absolutely **NO tilt, slant, or rotation**.
          -   **Constraint:** The film strip must have **NO sprocket holes**. It should appear as a solid black rectangular container.
          -   **Film Border Details:** Add subtle, understated film-style markings onto the solid black border areas between and around the stacked photos. These should include minimal technical text (e.g., film stock names like "KODAK PORTRA"), small frame numbers (e.g., "— 12A —", "▶ 13"), or tiny arbitrary symbols commonly found on photographic negatives. These markings must be decorative, faint, and not distracting.
          -   Inside this strip, vertically stack [3 to 5] **unique and distinct** photos selected from the provided source images. **Constraint:** Do not repeat the same photo within the strip.
          -   Maintain the original aspect ratio of the photos where possible; do not warp or distort the subjects.
      3.  **Background Layer:**
          -   Select one of the provided images to fill the entire background (full bleed).
          -   **Crucial Constraint:** Prioritize selecting a scenic or landscape image that features **no visible people** (or minimally visible), serving as a clean, neutral backdrop for the text.
          -   The background image should be positioned *behind* the left film strip.

      **Aesthetic & Style (The "Vintage" Filter):**
      -   **Texture:** Apply heavy analog film grain and noise across the entire image.
      -   **Color Grading:** Warm, nostalgic retro tones (Kodak Portra style). Slightly faded blacks and warm highlights.

      **Text Elements (Strict Typography & Content Control):**
      *All text must be purely typographical with no added graphic effects.*
      1.  **Color Requirement:** All text must be rendered in **pure, solid red fill** (Vintage Red/Crimson) only. **Constraint:** Absolutely NO outlines, NO drop shadows, NO gradients, and NO background color boxes behind the text letters.
      2.  **Main Title Generation:**
          -   **Content:** Analyze the visual elements of the chosen background image (e.g., mountains, ocean, city lights, forest). **Randomly generate** a short, impactful 2-3 word phrase related to travel or adventure that directly reflects the specific environment or mood of that background image.
          -   **Font Style:** Bold, Condensed Sans-Serif (like Impact or Helvetica Compressed). Large, dominant size.
      3.  **Body Text Generation:**
          -   **Content:** **Randomly generate** a very concise short paragraph (approx. 10-13 words) describing the feeling of the journey.
          -   **Font Style:** Clean, standard Sans-Serif. Much smaller size than the title.
      4.  **Layout & Density:**
          -   Position the title in the upper-right or center-right area, with the body text block directly below it.
          -   **Density Match:** The overall visual weight, line breaks, and character count should closely approximate the text block seen in the reference image ("ROAD TRIP" example).

      **Output Requirement:**
      -   Treat the user's uploaded photos as the primary assets.
      -   Do not invent new scenery; use the content from the inputs.
      -   Output a high-resolution flat graphic image with clean, solid red typography.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 3
    max_images: 4
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0120 4 Styles Creative Studio/0120 攝影兩宮格
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4" 
    prompt: |
      Please use all uploaded photos as the only source of characters in the image. Preserve every person’s real face, facial features, bone structure, skin tone, hairstyle, clothing, and overall identity exactly as shown in their original photos. Do not beautify faces, smooth skin, stylize features, alter proportions, change age, or modify identity in any way. No additional people may appear. Each uploaded person must appear only once in the final image, with no duplication, cloning, or repeated faces.

      Create a vertically oriented image divided clearly into two stacked horizontal frames, resembling a casual photo exchange between friends. The overall mood should feel natural, playful, and nostalgic, inspired by a Japanese springtime aesthetic. The setting should feel like a green park in early spring, with soft sunlight, fresh greenery, trees, and a relaxed outdoor atmosphere. The color tone should be light, airy, and slightly warm, emphasizing fresh greens and gentle daylight. The two stacked frames must be seamlessly stitched together with no white borders, gaps, margins, or visible separators of any kind. The transition between the upper and lower frames should be clean and continuous, forming a single unified image rather than two separate photos placed side by side or with padding.

      In the upper frame, randomly select one single person from the uploaded users to act as the photographer. This person must appear alone in the upper frame and must not appear anywhere else in the image. The character should be posing with a compact camera or film camera, gently and naturally holding it near their face rather than actively taking a photo. The camera should rest casually against the face, covering only one eye, while the other eye remains clearly visible. Both eyes must be open, relaxed, and clearly visible with no blinking, squinting, or eye closure. The camera must not cover both eyes or obscure the entire face. The upper frame must be shot from a clear low-angle (upward-looking) perspective, meaning the subject is being photographed from below. The background should be dominated by sky, treetops, or bright open air, with no visible ground or floor elements in the frame. The pose should feel calm, casual, and intentional, as if posing playfully for a photo during a relaxed moment in the park. The expression should feel natural, soft, and friendly, not dramatic or exaggerated. The upper frame should feel like a posed yet spontaneous portrait moment rather than an action shot.

      In the lower frame, depict all remaining uploaded users together, excluding the person already used in the upper frame. No one from the upper frame may reappear here. This lower frame represents the scene being photographed by the person above. The characters should be seated together on a picnic blanket spread over green grass, clearly engaged in a casual picnic scene. The camera viewpoint in the lower frame should be from above, looking downward toward the group, creating a gentle top-down perspective as if the photographer is standing and photographing them. The characters should be grouped naturally, sitting close together on the blanket, interacting casually as friends. Their expressions should feel lively, relaxed, and genuine, as if being photographed during a fun moment in the park. Poses can include small gestures like peace signs, relaxed seated postures, leaning toward one another, or playful body language, but should remain natural rather than exaggerated. The camera distance should not feel too far; faces and upper bodies must be clearly visible and readable.

      The lower frame must include a visible camera-viewfinder overlay, simulating what the photographer sees through the camera. The camera view should be enclosed within a clearly visible solid black rectangular frame inside the image, creating the feeling of looking through a real camera display. This black frame should add depth and realism to the camera view without blocking faces or dominating the composition. The overlay should resemble a real camera interface, with subtle black or dark gray frame lines, corner markers, and small UI details such as a REC indicator, battery icon. The overlay should clearly suggest a live camera view but must not block faces or dominate the image. It should feel like a transparent interface layered over the scene.

      Both frames should share the same park environment and seasonal feeling, reinforcing the idea that these moments are happening at the same time. Lighting should be consistent across both frames, with soft daylight, gentle shadows, and a springtime atmosphere. The overall composition should feel intimate, friendly, and observational, as if capturing a memory between friends rather than staging a photoshoot.

      The final image should read as a Japanese-style casual memory photo: warm, green, youthful, and emotionally light. It should clearly communicate the relationship between the photographer (upper frame) and the photographed picnic group (lower frame), with no duplicated characters, no identity confusion, and a strong sense of perspective and storytelling.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 4
    num_iterations: 50

