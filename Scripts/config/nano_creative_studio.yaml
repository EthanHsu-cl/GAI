tasks:
  - folder: Media Files/Nano Banana/0211 日式棒球卡
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "2:3"
    prompt: |-
      Absolute priority: the human subject must remain indistinguishable from a real photograph. If any instruction conflicts with photographic realism, photographic realism always overrides card style, visual effects, or UI design.

      Use the uploaded person as the only human subject. The person in the uploaded image must be the only character in the final result. Preserve the subject’s real face, facial features, identity, skin tone, hairstyle, facial expression, and body proportions exactly as shown in the uploaded photo. Do NOT beautify, stylize, idealize, or alter the face or body in any way. No extra people may appear.

      The subject must remain fully photorealistic at all times, appearing as if captured in a real professional baseball game by a high-speed sports camera. Skin texture, facial realism, lighting realism, and photographic detail must be preserved exactly. The subject must NOT look illustrated, painted, game-rendered, or artificially enhanced. All stylization is limited strictly to the card design and background effects.

      Transform the subject into a modern professional baseball card character, wearing a clean yet visually rich modern baseball uniform.

      Uniform restrictions (strict):
      No text, letters, logos, emblems, icons, or symbols are allowed except the jersey number. This explicitly includes no check marks, tick symbols, swooshes, V-shaped marks, abstract approval marks, or any logo-like shapes. Absolutely no brand marks, team logos, sponsor graphics, trademark-like shapes, national flags, national colors, country references, cultural symbols, or any real-world identifiable elements may appear on the uniform or helmet.

      Uniform requirements:
      A clearly visible jersey number on the chest or torso. Distinct piping or trim lines along jersey edges, sleeves, or placket. A restrained premium color scheme with one primary color and subtle secondary accents. Pants must be pure white. Fabric must appear fully realistic with natural folds, seams, stitching, and material tension. The helmet follows the same rules.

      Pose (must match exactly):
      Captured mid-run with strong forward momentum, leaning slightly forward. Both arms bent at the elbows, hands in front of the chest. Both index fingers extended, pointing straight downward; remaining fingers naturally curled. Elbows angled outward, forming a tight, inward-focused gesture. The subject shows a smile. Shoulders slightly hunched forward, chest pushed outward, expressing explosive energy and confidence. Do not alter or substitute the gesture.

      The image is vertically oriented and composed as a complete Japanese baseball card. The subject dominates the upper and central area; the lower section contains structured card UI elements and stats with metallic accents, glowing borders, layered panels, and clear hierarchy.

      The card design must convey a premium holographic rarity: Iridescent foil textures and rainbow light refraction across the card surface. Subtle prismatic highlights and metallic shimmer layers. High-end glowing borders and multi-layered frames. Light streaks, sparkles, and reflective accents that shift across the card. Deep layered depth, making the card feel thick, luxurious, and collectible. These effects must enhance the card’s rarity and prestige while never affecting the subject’s photographic realism.

      Place the following fixed text at the very top of the card, clearly separated from the stat panels and visually anchored as a header. The text must remain fixed and exact, and must appear exactly as written:

      2026 Series 1

      The rarity grade (S級 / A級 / B級 / C級 / D級) must be clearly displayed at the top-left corner of the card, visually prominent and immediately recognizable, similar to high-rarity indicators in online gacha games.

      At the bottom portion of the card, display randomly generated card stats written entirely in Japanese, following the visual style of Japanese baseball collectible cards, creating a strong gacha / collectible feeling.

      All other labels, categories, and values displayed on the card must be presented using Japanese text and numerals, including rarity grade, spirit value, cost, level state, limit break values, training status, special abilities, and numerical stats. No player names, character names, team names, or any form of personal naming may appear anywhere in the stats or UI. The random stats should appear plausible within Japanese professional baseball card systems and be presented using structured, game-style UI panels with Japanese typography, rather than floating text. Each generation should feel like a distinct card pull, with believable variation in rarity and strength, while maintaining a polished, premium collectible card appearance.
    use_random_source_selection: false
    use_deterministic_random: true
    random_seed: 42
    min_images: 4
    max_images: 5
    num_iterations: 50


comments:
  folder_structure: Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder.
  reference_folder: 'Optional: Path to folder containing third set of images for 3-way comparison'
  template_usage: 'use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)'
  model: Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored.
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: Set to true to enable multi-image mode from Additional folder, false for single-image mode
  output_group_tasks_by: 'Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports.'
  random_source_selection:
    description: Mode for selecting N images from Source folder per API call (images can be reused)
    use_random_source_selection: Set to true to enable random source selection mode
    min_images: 'Minimum images per API call (default: 1)'
    max_images: 'Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)'
    num_iterations: Number of API calls to make. Defaults to number of source files if omitted.
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: false
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  multi_image_config:
    description: Configuration for multi-image generation (Source + Additional folders mode)
    enabled: Must be true to use multi-image features
    mode: 'sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder'
    folders: Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])
    allow_duplicates: 'true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode'
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
