      The scene should be a realistic cinematic recreation rendered in a fully photorealistic style. The camera viewpoint must be from the top of a long outdoor staircase, looking downward. The staircase setting should closely resemble a residential hillside stairway in Japan. The handrails along the stairs must be a deep wine-red or burgundy color. The right side of the frame should open up to a wide, expansive city view with layered urban buildings stretching into the distance, while the left side of the frame should be lined with lush green trees and foliage. Above, the sky must be a vivid, clear blue with bright white clouds, creating a strong sense of openness and summer daylight. The composition must feel calm, emotional, and slightly nostalgic.

      Clothing follows a strict identity rule: Any male subject must wear black suit trousers paired with a white short-sleeve Japanese high school uniform shirt featuring a visible school emblem on the chest pocket, along with a green striped tie. Any female subject must wear a black pleated skirt, black socks, brown leather shoes, and a white short-sleeve Japanese high school uniform shirt with a red ribbon tie at the collar. The uniforms should feel authentic, neat, and natural, closely resembling real Japanese school uniforms rather than costumes.
      If both uploaded people are male, they must both wear male character full outfit.
      If both uploaded people are female, they must both wear  female character full outfit.

      Male character should be positioned closer to the camera at the upper part of the stairs. This male character must be positioned on the left side of the frame. This character should be mostly facing the camera, with the upper body and face clearly visible, only slightly turning back as if just beginning to glance behind. Although the body and face are oriented toward the camera, the eyes must be looking slightly to the side and must NOT look directly into the camera. The pose should show most of the front of the face rather than a side or back view. Female character should be positioned farther down the stairs, and must be positioned on the right side of the frame, looking upward toward the first character. If both uploaded photos are of the same gender, randomly assign one person to the upper position and the other to the lower position while keeping identities unchanged.

      Lighting and color grading are extremely important. The scene should be lit by strong, clear midday sunlight, creating a bright and vivid look. Emphasize rich blue skies and clean highlights, while avoiding greenish or yellowish color casts. Greens in the environment should appear fresh, not warm or muddy. The image should feel sunlit, crisp, and refreshing, with high saturation and clarity, rather than soft, yellow, or hazy. The overall atmosphere should evoke a Makoto Shinkai–inspired feeling through brightness, clarity, and emotional freshness, while remaining fully realistic.

      The final image should feel like a live-action movie poster moment frozen in time—quiet, emotional, and full of anticipation—faithfully recreating the described scene, composition, uniforms, lighting, color tone, and typography using only the two uploaded people, with no external references or additional elements.
