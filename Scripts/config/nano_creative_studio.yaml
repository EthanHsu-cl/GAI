tasks:
  - folder: ../Media Files/Nano Banana/0128 拍貼系列-Style3 2020S
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "3:4"
    prompt: |
      Use all uploaded photos as the only subjects. Their real identities must remain recognizable and consistent.
      Preserve the subjects’ facial features, identity, skin tone, hairstyle, and body proportions EXACTLY as in the uploaded photos.

      The input consists of 2 to 4 different people (all unique individuals).

      GLOBAL IDENTITY & COUNT RULES (CRITICAL):
      – Each uploaded person may appear multiple times across different frames
      – BUT the same person must NEVER appear twice within the SAME frame
      – No frame may contain duplicated faces or cloned identities
      – No hallucinated or extra people are allowed

      FRAME POPULATION RULES (VERY IMPORTANT):
      – Each frame must contain either:
        • exactly 2 people
        • exactly 3 people
        • or all 4 people together
      – A frame with ONLY 1 person is STRICTLY FORBIDDEN
      – The exact number of people per frame may vary randomly
      – Not all frames need to contain the same number of people

      Adding the same person repeatedly within a single frame
      or adding people who haven't uploaded photos
      is strictly prohibited.

      ────────────────────────
      PURPOSE & STYLE:
      ────────────────────────
      This is a photographic purikura-style filter application inspired by CURRENT Japanese purikura trends (FJK / SJK / LJK),
      NOT a realistic portrait and NOT a modern beauty editorial.

      ────────────────────────
      IDENTITY PRESERVATION RULES:
      ────────────────────────
      – The same people must remain clearly identifiable
      – Facial structure, face shape, and hairstyle must remain consistent
      – Do NOT replace faces
      – Do NOT merge faces
      – Do NOT turn subjects into illustrations, anime, or dolls

      ────────────────────────
      FACIAL TREATMENT (EYES ARE CRITICAL – CURRENT PURIKURA STYLE):
      ────────────────────────
      – Eyes must appear about 25–30% larger than the original image, achieved through facial proportion refinement, NOT exaggerated scaling
      – Slightly taller eye shape with soft rounded corners
      – Clean, soft upper eyelid line (no harsh eyeliner, no cat-eye)
      – Subtle lower eyelid fullness (natural aegyo-sal impression, not drawn)
      – Iris size and color remain realistic (no glow, no anime shine)
      – Eye whites clean and bright but NOT over-whitened
      – Eyes must feel soft, friendly, and human, never cartoonish or doll-like

      Face & skin:
      – Overall face slightly more compact and centralized (very subtle)
      – Mild jawline softening only
      – Skin retouching light, clean, and purikura-like
      – No plastic skin, no heavy whitening, no editorial beauty look

      ────────────────────────
      STYLE & BOOTH IDENTITY:
      ────────────────────────
      Create a playful four-frame photo-booth collage styled like a CURRENT Japanese purikura booth popular among FJK / SJK / LJK.

      Overall vibe:
      – cute
      – trendy
      – clean
      – soft
      – girly
      – Instagram-ready
      – unmistakably modern Japanese purikura aesthetic

      ────────────────────────
      LAYOUT:
      ────────────────────────
      – Perfect 2×2 four-frame grid
      – Equal-sized panels
      – Seamlessly stitched edge-to-edge
      – NO borders, margins, dividers, or white lines
      – One unified purikura output (not separated images)

      ────────────────────────
      SUBJECTS & POSES (REFERENCE-ALIGNED):
      ────────────────────────
      – Relative positions and scale remain consistent across frames
      – Each frame must feature a DIFFERENT pose
      – Poses must closely imitate reference purikura poses, including:
        • peace signs close to the face or eyes
        • cheek-touch pose
        • finger-heart near chin
        • slight head tilt with close shoulder distance
        • leaning together for intimacy
      – Expressions should be soft, cute, and natural:
        gentle smile / shy smile / light pout
      – Avoid exaggerated comedy poses or large spacing between subjects
      – Clothing must remain unchanged

      ────────────────────────
      HEAD ACCESSORIES:
      ────────────────────────
      – Add bows or headbands to SOME subjects only
      – Accessories appear in RANDOM 1–2 frames only
      – At most TWO frames may contain head accessories
      – Never appear in all four frames

      – Sequined pink ribbon headband
      – Lace plush headband (soft, fluffy texture)
      – Kitty-style pink glitter bow headband (purikura booth rental feel)

      – Accessories should feel playful, bold, and slightly exaggerated
      – Slightly oversized but controlled
      – Clearly readable at thumbnail size

      Color direction:
      – High-saturation candy colors:
        hot pink, vivid baby pink, cherry red, bright mint green
      – Must stand out clearly from hair and background
      – Avoid muted or dusty tones

      Placement rules:
      – On top of the head or slightly off-center
      – Do NOT obscure bangs, eyes, eyebrows, or facial features

      Restrictions:
      – Do NOT use animal ears
      – Do NOT use cosplay or luxury accessories
      – Do NOT overload accessories

      ────────────────────────
      BACKGROUND & LIGHTING:
      ────────────────────────
      – Simple, clean purikura booth background
      – Soft pastel tones only (pink / white / light purple)
      – Flat, friendly booth lighting
      – Soft glow without haze
      – No detailed environments

      ────────────────────────
      DECORATIONS (CRITICAL UPDATE – HEARTS ONLY):
      ────────────────────────
      – DO NOT add ANY text, letters, numbers, words, or typography
      – DO NOT add speech bubbles, stars, sparkles, stickers, outlines, glow effects, or neon effects
      – Add ONLY hand-drawn heart doodles

      Heart appearance:
      – Hand-drawn pen / marker style
      – Flat color fill or simple outline ONLY
      – NO glow, NO neon, NO gradient
      – Uneven, imperfect stroke thickness
      – Casual, human-drawn feeling

      Heart color palette ONLY:
      – hot pink
      – bright red
      – vivid pastel pink

      Heart distribution rules:
      – ONLY 2 out of the 4 frames may contain hearts
      – Remaining frames must have ZERO decorations
      – Do NOT distribute evenly
      – Never overlap eyes, eyebrows, nose, or mouth

      ────────────────────────
      MOOD & INTENT:
      ────────────────────────
      Cute, intimate friendship memories captured in a CURRENT Japanese purikura booth.
      The final image should feel:
      – pastel
      – bubbly
      – clean
      – softly retouched
      – trendy
      – unmistakably modern Japanese purikura.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    use_deterministic_random: false
    min_images: 2
    max_images: 4
    num_iterations: 50


# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (images can be reused)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: false
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
