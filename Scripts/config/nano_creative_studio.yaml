tasks:
  - folder: ../Media Files/Nano Banana/0211 復古愛心漫畫
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |-
      Use ONLY the uploaded photos as image content.
      Do NOT generate, invent, redraw, recolor, or hallucinate any images.
      This is a FIXED vintage magazine template insertion task, NOT a redesign.

      ────────────────────────
      INPUT IMAGE RULES (CRITICAL)
      ────────────────────────

      • Accept 4 OR 5 uploaded photos only.
      • NEVER duplicate any uploaded photo.
      • NEVER generate new people, objects, animals, or backgrounds.

      IF 5 photos are uploaded:
      – Use the full 5-frame layout exactly as defined.

      IF ONLY 4 photos are uploaded:
      – Merge the TOP-LEFT vertical frame and the MID-LEFT horizontal frame into ONE combined vertical frame.
      – This merged frame occupies the exact combined area of those two frames.
      – ALL OTHER FRAMES REMAIN UNCHANGED in size and position.
      – Do NOT shift, resize, or redesign any other frame.

      ────────────────────────
      ABSOLUTE PRIORITY (NON-NEGOTIABLE)
      ────────────────────────

      • Frame positions are FIXED.
      • Frame sizes are FIXED.
      • Black border style is FIXED.
      • Photos MUST appear INSIDE frames.
      • Photos MUST retain their original colors and lighting.
      • The page MUST NOT turn into a single-color wash.
      • The background pink filter MUST NOT override photo colors.

      If any photo is not clearly placed inside a black-bordered frame, the result is WRONG.

      ────────────────────────
      CANVAS / PAGE (FIXED)
      ────────────────────────

      Portrait magazine page, A4-like vertical layout (~3:4).

      Background:
      – Warm off-white / cream paper
      – A light pink halftone display with a delicate texture
      – Soft vintage pink paper tone ONLY on the background

      IMPORTANT:
      The pink tone applies ONLY to the paper background.
      Uploaded photos must retain their original color and contrast.

      Add very light halftone dots on the background ONLY.
      Do NOT apply halftone or color wash over the photos themselves.

      ────────────────────────
      FIXED MAGAZINE HEADER (TOP)
      ────────────────────────

      Main headline text:
      – Content: randomly generate a SIMPLE, POSITIVE English word or phrase
        Examples: “Lovely Day”, “Sweet Moments”, “Pure Joy”, “Happy Smiles”
      – MUST NOT repeat “Tickled Pink”
      – MUST NOT copy photo captions

      Font:
      – Google Font: Pacifico
      – Smooth handwritten script
      – Medium-large size, NOT oversized
      – Balanced to match the reference scale (not dominating the page)

      Color:
      – Dark brown or near-black ink
      – Printed look, NOT digital black
      – No outline, no shadow, no glow

      Placement:
      – Top center
      – Slightly organic, magazine masthead feel
      – Clean spacing above frames

      ────────────────────────
      SECONDARY CURVED TEXT (ABOVE HEART)
      ────────────────────────

      Add ONE short curved line of text that follows the upper arc of the heart frame.

      Text content:
      – Simple positive blessing or feeling
        Examples: “sweet smiles”, “warm wishes”, “pure joy”, “soft moments”

      Style:
      – Same ink color as headline
      – Smaller than headline
      – Gently curved to hug the heart shape
      – Printed, subtle, editorial

      ────────────────────────
      FIXED FRAME STRUCTURE
      ────────────────────────

      Use thick black hand-drawn comic ink borders:
      – Same stroke thickness everywhere
      – Slight organic wobble

      DO NOT add labels (A/B/C/D/E) - MUST.
      DO NOT add numbering or markers.

      FRAME DEFINITIONS:

      • Top-left: vertical rectangle
      • Center-upper: large heart frame (dominant)
      • Left-middle: small horizontal rectangle
      • Bottom-left: wide horizontal rectangle
      • Right side: tall vertical rectangle

      ────────────────────────
      PHOTO PLACEMENT RULES (CRITICAL)
      ────────────────────────

      Each uploaded photo MUST be:
      – Placed fully INSIDE a frame
      – Preserving original aspect ratio
      – No stretching, no squeezing, no warping

      If aspect ratio does not match:
      – Scale proportionally
      – Allow natural cropping OR small margins
      – Never distort faces or bodies

      Photos must look PRINTED INTO frames,
      not floating, not blended into background.

      ────────────────────────
      CAPTIONS / SMALL TEXT
      ────────────────────────

      Add 4 small captions total.

      Caption rules:
      – Content: simple positive words or blessings
      – Examples: “so lovely”, “sweet vibes”, “pure joy”
      – Small size, low contrast
      – Printed magazine feel
      – Placed near frame edges , Not in the box

      NO big subtitles.
      NO repeated headline text.

      ────────────────────────
      COLOR & FINISH
      ────────────────────────

      Overall finish:
      – Soft vintage magazine scan
      – Low contrast
      – Slight paper softness

      DO NOT:
      – Flatten image colors
      – Turn photos monochrome
      – Apply global pink overlay to photos
      – Create modern glossy HDR look

      ────────────────────────
      FINAL LOCK RULE
      ────────────────────────

      The result must look like:
      Different photos printed into the SAME fixed vintage magazine page.

      If:
      – Photos are missing from frames
      – Frames move or resize
      – Page becomes one solid color
      – New images appear

      → The result is incorrect.
    use_random_source_selection: true
    use_deterministic_random: true
    random_seed: 42
    min_images: 4
    max_images: 5
    num_iterations: 50


comments:
  folder_structure: Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder.
  reference_folder: 'Optional: Path to folder containing third set of images for 3-way comparison'
  template_usage: 'use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)'
  model: Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored.
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: Set to true to enable multi-image mode from Additional folder, false for single-image mode
  output_group_tasks_by: 'Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports.'
  random_source_selection:
    description: Mode for selecting N images from Source folder per API call (images can be reused)
    use_random_source_selection: Set to true to enable random source selection mode
    min_images: 'Minimum images per API call (default: 1)'
    max_images: 'Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)'
    num_iterations: Number of API calls to make. Defaults to number of source files if omitted.
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: false
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  multi_image_config:
    description: Configuration for multi-image generation (Source + Additional folders mode)
    enabled: Must be true to use multi-image features
    mode: 'sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder'
    folders: Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])
    allow_duplicates: 'true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode'
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
