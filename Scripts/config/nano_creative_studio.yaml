  - folder: ../Media Files/Nano Banana/0129 3 Styles/0129 鐵達尼號
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |
      Use the two uploaded people as the only subjects, preserving their real identities exactly as in the uploaded photos. Their faces, facial features, bone structure, hairstyles, skin tone, and expressions must remain unchanged. The system must not modify their proportions, makeup style, jawline, nose, or eyes, and must not apply beautification, aging, stylization, smoothing, or add any additional people.

      Clothing follows a strict identity rule:
      If the uploaded pair is one male and one female, the male must wear Jack’s outfit—an off-white collarless shirt with a black vintage suit jacket in early-1900s Titanic style—and the female must wear Rose’s outfit—a white lace corset-style top with a black outer shawl and a vintage floral silk scarf draped loosely over both forearms, hanging freely and flowing outward just like in the original Titanic movie poster (the scarf must NOT be tied around the neck).
      If both uploaded people are male, they must both wear Jack’s outfit.
      If both uploaded people are female, they must both wear Rose’s outfit with the same forearm-draped, flowing silk scarf placement, never around the neck.

      Pose assignment rule:
      If the pair is one male and one female, the female wearing Rose’s outfit must stand in front and be embraced from behind by the male wearing Jack’s outfit.
      If the uploaded people are the same gender, the front/back positions must be assigned randomly, but still follow the same intimate Titanic-style embrace.

      Create a realistic Titanic-style movie poster that recreates the emotional intimacy of the original 1997 promotional imagery. The subject standing behind wraps their arms gently around the waist of the subject in front. Both lean slightly toward each other with soft, intimate body language and gaze deeply into each other’s eyes rather than looking at the camera. Their faces must feel close, romantic, and emotionally connected, echoing the iconic Titanic embrace.

      Recreate the cinematic atmosphere of the Titanic ship deck with soft golden-hour light on their faces, a faint halo-like backlight behind their heads, and blurred hints of ship railings and heavy ropes in the background. No modern elements or additional people may appear. The overall color styling must match the warm vintage Titanic film aesthetic with golden-brown highlights, gentle film-like contrast, subtle haze, soft glow, fine grain, and deep, romantic tones without harsh saturation.

      At the bottom center of the poster, include the title “ETERNIA” in a large serif typeface with a metallic gold-white gradient and wide letter spacing. Above the title,  include the director credit “A LOVE BEYOND TIME” in the same elegant serif style. The title must visually integrate into the composition with thin decorative horizontal lines above and below the word “ETERNIA,” matching the authentic movie poster layout.

      The final poster must feel emotional, cinematic, warm, elegant, and consistent with a high-budget Titanic romance poster, maintaining perfect identity preservation of the two uploaded subjects, with no distortions, incorrect limbs, or extra reflections or figures.
