  - folder: ../Media Files/Nano Banana/0116 5 Styles Creative Studio/0116 拍貼系列-金魚
    model: gemini-3-pro-image-preview
    resolution: "1K"
    aspect_ratio: "3:4" 
    prompt: |
      Use the uploaded person as the ONLY subject in all panels. Preserve the subject’s real face, facial features, identity, skin tone, hairstyle, and body proportions EXACTLY as in the uploaded photo. Do not beautify, stylize, or alter identity in any way. No extra people may appear. No non-uploaded individuals may appear.

      Create a playful four-frame photo-booth collage styled like a goldfish aquarium photo booth, closely matching the provided reference image. The two uploaded subjects must always appear together in all four frames, maintaining realistic scale, consistent distance, and natural body proportions, wearing exactly the same clothing and hairstyles as in the uploaded photos. The entire composition must feel like it was captured in a single continuous physical aquarium environment, not four separate images.

      The subjects appear behind one continuous, invisible aquarium glass plane, with goldfish swimming naturally between the camera and the subjects. The glass must feel optically neutral and unobtrusive, showing only extremely subtle diffusion without reflections, glare, shine, light streaks, mirrored effects, or visible glass surfaces. There must never be any visible water surface, reflective bands, horizontal or vertical light lines, exposure breaks, or any form of top or bottom reflection. The image must not contain waterline artifacts, mirrored faces, ghosting, double outlines, motion trails, or duplicated facial features under any circumstances.

      The layout must be a perfectly balanced 2×2 grid, seamlessly stitched into a single continuous image with absolutely no borders, no dividers, no seams, no margins, and no panel separation cues. The background must remain visually continuous from top to bottom and side to side, with identical density, color depth, haze, and exposure across all four frames, so the collage reads as one uninterrupted space rather than stacked images.

      The background color and atmosphere must closely match the reference image, remaining deep navy-blue to near-black at all times. The background should feel dense, calm, and subdued, with no visible light sources, no beams, no gradients, no glow patches, and no directional lighting. The background must never appear cyan, teal, turquoise, greenish, bright blue, or illuminated, and must never compete with the subjects’ faces for visual attention.

      Lighting must be fully diffused, soft, and frontal. The subjects’ faces must be the brightest and most visually anchored elements in every frame, clearly lifted by exposure and midtones without altering facial structure or texture. Facial highlights should appear clean and natural on the forehead, nose bridge, and cheeks, while the surrounding environment remains darker and restrained. Skin tones must precisely match the reference image, staying within neutral-warm beige to soft peach undertones. Skin must never appear gray, bluish, cyan, greenish, desaturated, underwater-muted, or color-shifted. Any blue cast from the environment must be completely excluded from the skin while preserving the deep blue background. Skin must feel alive, human, and naturally luminous, with no smoothing, no beauty filters, and no artificial enhancement.

      Goldfish should swim gently and naturally in the foreground with soft edges and realistic depth. Their colors must remain warm golden-yellow to soft orange only, with natural variation and no white, pale, cream, lemon-yellow, glowing, or overexposed appearance. Goldfish must never cross directly in front of eyes, nose, mouth, or central facial features, and must never obscure identity. Fish may pass near hair edges, cheeks, shoulders, or the outer frame area only.

      Each of the four frames must feature a different, natural interaction between the two subjects, such as leaning closer together, softly pointing at a fish, sharing a quiet smile, reacting playfully, or gently observing the aquarium. The interactions must feel spontaneous, relaxed, and photo-booth-like, never posed, stiff, symmetrical, or repeated across frames.

      Global contrast should be slightly lowered and black levels softened to maintain a cinematic underwater depth. Highlights must bloom gently and evenly without streaks, bands, reflections, or artifacts. Avoid HDR effects, high clarity, sharpening halos, artificial edge definition, structural separation lines, or any visual cues that suggest layering or compositing.

      The final image must feel dreamy, cinematic, calm, and intimate, unmistakably resembling a real goldfish aquarium photo booth. It must contain no reflection lines, no light bands, no ghosting, no mirrored effects, and no background lighting artifacts, with color, lighting, and atmosphere tightly aligned to the reference image.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 2
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0116 5 Styles Creative Studio/0116 Collage-Graphic Pop 
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "1:1" 
    prompt: |
      Create a modern collage-style design template with bold, saturated colors and a tactile, mixed-material aesthetic.
      Use one large, vertically oriented photo as the central visual element, slightly tilted for a casual yet intentional composition.

      Ensure that all photos remain fully visible and completely unobstructed at all times.
      No stickers, graphic elements, frames, shadows, or decorative objects may overlap, cover, crop, or partially obscure any area of the photos.
      Treat the photo area as a protected zone; all design elements must be positioned outside the photo boundaries.

      Do not modify the photo content in any way — no distortion, repainting, style transfer, or content alteration.
      Display photos with randomized solid frames, alternating between black or white borders, with clean, sharp edges resembling printed photo frames.
      Attach the main photo at the top using an oversized metallic safety pin with realistic reflective metal texture, positioned outside the image area.

      When layering multiple photos, allow overlap only at the edges or corners of the photos.
      Limit the overlapping area to no more than 10% of each photo’s total surface area, ensuring the majority of each image remains clearly visible.
      Avoid central overlaps or large stacking coverage; overlaps should feel subtle, intentional, and structurally restrained.

      Layer smaller secondary photo frames behind the main image, offset to the left side, partially visible while respecting the overlap limits.

      Add exactly three sticker-based elements placed around the photo, not on top of it:
      – Two geometric stickers using stars, circles, or jagged starburst shapes only, sharing the same color and material.
      – The shared color must be randomly selected from red or blue only, with no other colors used for these two stickers.
      – One small sticky note, clearly distinct from the geometric stickers.

      Render the two geometric stickers with a simple, minimal, and understated design, avoiding decorative details or complex styling.
      Apply one shared material style to both geometric stickers, randomly selected from:
      – fabric-based textures with visible textile grain and stitched edges, resembling embroidered patches,
      – printed paper textures with subtle grain, speckled ink details, and gentle surface gloss.

      Render the sticky note as a small matte paper note with subtle edge irregularities and a natural adhesive appearance.
      Place a short handwritten-style title on the sticky note, written with a marker-like stroke, slightly imperfect and casual.
      The handwritten text should function as a photo title, conceptually matching the photo, without describing specific visual details.

      Ensure all stickers and notes have no white outlines, borders, or frames, appearing as solid cut-out shapes.
      Keep all sticker and note designs simple, minimal, and unembellished, avoiding playful or decorative illustration styles.

      Combine materials such as glossy photo paper, matte photo frames, textured paper stickers, handwritten ink, and reflective metal elements to enhance a tactile, editorial collage feel.
      Maintain a strong visual hierarchy through scale, spacing, and contrast, with ample white space surrounding the composition.
      Use a clean, solid white background with no gradients, textures, shadows, or environmental elements.
      This is a reusable design template — do not describe or reference the content of the photos.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 1
    max_images: 5
    num_iterations: 50


# Comments and documentation
comments:
  folder_structure: "Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder."
  reference_folder: "Optional: Path to folder containing third set of images for 3-way comparison"
  template_usage: "use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)"
  model: "Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored."
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: "Set to true to enable multi-image mode from Additional folder, false for single-image mode"
  output_group_tasks_by: "Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports."
  
  random_source_selection:
    description: "Mode for selecting N images from Source folder per API call (images can be reused)"
    use_random_source_selection: "Set to true to enable random source selection mode"
    min_images: "Minimum images per API call (default: 1)"
    max_images: "Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)"
    num_iterations: "Number of API calls to make. Defaults to number of source files if omitted."
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: false
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  
  multi_image_config:
    description: "Configuration for multi-image generation (Source + Additional folders mode)"
    enabled: "Must be true to use multi-image features"
    mode: "sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder"
    folders: "Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])"
    allow_duplicates: "true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode"
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
