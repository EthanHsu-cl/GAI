tasks:
  - folder: ../Media Files/Nano Banana/0209 2 Styles Creative Studio/0209 春日映瞳V5
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4"
    prompt: |-
      CRITICAL FACE ID LOCK — PRIORITY 1 (EXTREME) :
      Use the uploaded photo(s) as the ONLY and ABSOLUTE source of the SUBJECT’s face.
      The generated face must be the SAME REAL SUBJECT as in the input photo, copied directly from the input, NOT reconstructed, NOT reinterpreted.
      If the face does not immediately look identical to the input SUBJECT, the result is INVALID and must be regenerated.
      The face must be directly copied from the input photo at the pixel-structure level, not re-generated or averaged.

      In all three panels, eye contact with the camera is strictly forbidden.
      The subject shows natural facial expression with subtle, nuanced emotion.
      If the input image shows the subject wearing glasses, the glasses must remain clearly visible in all panels. Do not add glasses if the subject is not wearing glasses in the input image.

      A seamless vertical triptych composed of three horizontal panels with no visible borders or separators.
      Each panel uses a distinct camera distance to create cinematic hierarchy.
      Ultra-realistic cinematic photography, natural optics, shallow depth of field.

      Lighting must produce strong separation between highlights and shadows, avoiding flat or evenly distributed illumination.

      Primary light is strong directional daylight.
      Secondary light is soft backlit daylight, creating controlled highlight bloom and subtle halation through lens response.

      The scene contains a subtle pink-tinted ambient atmosphere,
      Pink tone exists in the air and light, not as a color filter.

      ---

      Top panel (closest framing)

      A very close-up portrait of the subject, framed tighter than the bottom panel.
      Cherry blossom branches cross the foreground.

      The body remains turned to the side while the head gently turns back, with the gaze drifting toward something behind, not forward.
      The expression is calm and gentle, with no sense of sadness or melancholy.

      Clear, direct spring sunlight visibly strikes the face,
      creating strong highlights across the cheeks, nose bridge, and eyes.
      The face must appear distinctly sunlit and luminous.
      Shadows are present but pushed onto surrounding blossoms and background,
      not flattening or dimming the face.

      A light breeze moves multiple strands of hair, with several fine hairs drifting freely across the face in mid-air.
      Foreground petals remain softly out of focus.
      Small openings between branches reveal soft blue sky in the background.

      ---

      Middle panel (visual anchor)

      An extreme close-up of one eye.
      The gaze is angled upward toward the light source above, clearly not looking at the camera.

      Only a very limited portion of the face is visible.
      The framing must strictly exclude the nose, nostrils, and nose bridge.
      Only the eye area and a small surrounding region of skin are revealed,
      as if the eye is glimpsed through a narrow opening between blossoms.

      Cherry blossoms, petals, and thin branches densely occupy the foreground.
      The nearest one or two blossoms are softly blurred due to shallow depth of field.

      A powerful, focused beam of sunlight breaks through the blossoms
      and lands directly on the eye area.
      The light is noticeably bright and intense, significantly brighter than the rest of the frame.
      Petal and branch shadows are sharply defined, clearly showing sunlight passing through layered blossoms rather than diffused evenly.

      The eye contains a strong, luminous highlight with slight flare.
      The iris shows natural radial texture and tonal variation, but remains realistic in scale and coloration.
      Avoid exaggerated iris size, overly saturated colors, or unnatural contrast commonly associated with AI-rendered eyes.

      Natural skin texture is fully preserved with no smoothing.


      ---

      Bottom panel (more distant)

      A medium side-profile shot of the subject, framed wider and farther than the top panel.
      The head is turned slightly upward and away.
      The subject does not look at the camera.

      Cherry blossoms densely surround and envelop the subject.
      Sunlight selectively illuminates parts of the face and hair,
      while deeper shadows remain in surrounding foliage,
      enhancing depth and contrast.

      Out-of-focus green tones from nearby trees appear in the background, contrasting naturally with the pink blossoms.

      ---

      Overall color & cinematic tone

      High-contrast cinematic lighting with preserved shadow depth.
      Warmth leans toward soft pink, peach, and warm-white tones — not yellow or amber.
      Highlights remain crisp and luminous.
      Shadows stay deep, warm, and dimensional, never gray or flat.

      Avoid flat lighting, evenly lit faces, golden-hour yellow, over-soft skin, glowing pupils, heavy bloom, haze, fog, text, logos, or watermarks.
    use_random_source_selection: false
    use_deterministic_random: false
    random_seed: 42
    min_images: 2
    max_images: 4
    num_iterations: 50

