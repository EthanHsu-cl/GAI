tasks:
  - folder: ../Media Files/Nano Banana/0116 5 Styles Creative Studio/0116 電影海報-FRIENDS
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4" 
    prompt: |
      Please use all uploaded photos as the only source of characters in the image. Their faces, facial features, bone structure, hairstyles, expressions, and overall identities must remain perfectly identical to the uploaded photos. The system must not alter their facial proportions, makeup style, jawline, nose shape, or eye shape. No face smoothing, beautification, aging, or stylization is allowed.

      All characters must appear as if they were photographed together at the same time and in the same studio environment, with consistent lighting, color tone, and photographic realism. The number of people in the image must match the number of uploaded photos, with no additional characters added. All characters are seated side by side behind a single wooden table, shown from the upper body up, arranged tightly in a horizontal, cinematic poster-style composition.

      The scene should follow a classic American TV show poster aesthetic. In the foreground, place a slightly vintage wooden table with visible wood texture. Several characters should naturally lean in together to share the same chocolate milkshake, with multiple people drinking from a single glass at the same time. Each character must have their own individual straw, even when sharing the same milkshake, and every character should be actively drinking through their straw. Hands must rest casually on the table or remain out of frame, and no one should be holding or gripping the straws. Avoid a one-person-one-drink arrangement; instead, emphasize shared milkshakes to reinforce a sense of closeness and friendship. If the number of uploaded people is three or fewer (including three), all characters must share and drink from one single chocolate milkshake. If the number of uploaded people is four, use exactly two chocolate milkshakes, with the characters evenly divided so that two people share one milkshake and the other two people share the second milkshake. Each milkshake should be topped with whipped cream d a cherry on top. In addition to the main chocolate milkshakes, place one to two creamy chocolate dessert drinks in tall glass cups, with cherry on top, clearly showing layers of chocolate syrup and cream on the table, to enrich the scene while keeping the composition clean and uncluttered. A white plate was placed under tall glasses containing creamy chocolate dessert drinks. The interaction between people and desserts should feel natural, candid, and friendly.

      All characters must be looking directly toward the camera while drinking, maintaining eye contact with the viewer to create a strong, engaging poster presence.

      The camera angle should be close to eye level, slightly balanced rather than dramatic, with a comfortable viewing distance that shows the group clearly without feeling too close or wide.
      All characters and the wooden table must be positioned in the lower portion of the image. At least the upper half of the canvas must remain open, uncluttered negative space reserved exclusively for the title text. The composition should clearly separate the subject area below and the title area above.
      The framing should feel calm, evenly spaced, and poster-like, allowing all characters to be seen clearly with natural proportions.

      The background should be a clean, solid-colored wall in a muted gray or blue-gray tone, with no decorations or patterns, keeping the focus on the people and the table. The camera angle should be slightly below eye level with a subtle upward perspective, creating a close, intimate group feeling where everyone appears equally important. Lighting should be soft, even, and studio-like, without harsh shadows, producing a polished yet warm poster-quality photograph.

      At the top center of the image, add the title text “FAMILY” The lettering must have a hand-drawn, slightly irregular black line style. Between each letter, place a small circular dot, alternating in red, blue, and yellow colors. The spacing, proportions, and alignment of the letters and dots should be clean, balanced, and consistent. The title must be clearly readable and positioned so it does not overlap or cover any faces. The typography should closely resemble a classic TV show poster design rather than a modern or decorative font.

      The overall mood should feel warm, relaxed, and friendship-focused, resembling an iconic ensemble TV show poster. The final image should immediately evoke a classic American sitcom group poster feeling, while featuring only the uploaded people, realistic photography, accurate faces, and a faithful recreation of the described layout, props, and typography.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 4
    num_iterations: 50

  - folder: ../Media Files/Nano Banana/0116 5 Styles Creative Studio/0116 日本綜藝海報-不良一族尋愛記
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "3:4" 
    prompt: |
      Please use exactly the two uploaded photos as the only source of characters in the image. Preserve both individuals’ real faces, facial features, bone structure, skin tone, hairstyles, expressions, and overall identities exactly as they appear in the uploaded photos. Do not beautify, stylize, smooth skin, alter facial proportions, change age, or modify identity in any way. The two people must clearly remain recognizable as the original uploaded individuals.

      Create a vertical poster-style image split cleanly into two equal halves down the center. The two sides must feel like completely different worlds with strong contrast in color, lighting, and atmosphere, while forming one unified poster. The split must be seamless, with no visible borders or lines.

      One half must depict a dark, masculine male room with strong blue-toned lighting. Introduce bright white-to-purple key lighting focused directly on the male users, illuminating their faces and upper bodies clearly. The lighting should feel intentional and stage-like, similar to a Japanese variety show poster, rather than dark or cinematic. White and soft purple lights should wash over the subjects, while blue and purple tones remain in the background, creating a lively, high-contrast yet readable look. The space must feel well-lit, energetic, and visually clear rather than shadow-heavy. Place a black leather sofa at the center, where male users are seated in relaxed but confident poses. The sofa should feature subtle Japanese graffiti-style markings. Behind them, include a small, understated vertical blue neon sign with Japanese characters reading “極惡,” arranged top-to-bottom and rendered in a bold kaishu-style (traditional brush-style) typeface with thick strokes. The character “惡” must be completely obscured by the seated figures or foreground elements and must NOT be readable at all, while only the upper character “極” may remain partially visible. The neon text should function purely as a subtle decorative accent rather than a focal point, blending naturally into the scene without drawing dominant attention or overpowering the composition. Also include shelves and sections of metal mesh or wire fencing. Add a small, curated number of Japanese-style collectible figures or hobby items to suggest personal taste without clutter. All male users must appear only in this purple-toned room.

      The other half must depict a vivid neon-pink female room inspired by Japanese Harajuku gyaru style. The space should be filled with fluorescent pink tones, bold patterns, and an exaggerated fashion-forward aesthetic. At the center, place a thick, plush, furry cushioned padded lounging mat with noticeable height and volume, clearly soft and fluffy with long fibers, and with no backrest, armrest, or vertical support. Female users should be seated or posed confidently on top of this plush floor mat. The room décor should resemble a stylish, lived-in gyaru hangout rather than a cute or childish bedroom. Include zebra-pattern accents, vanity mirrors with lights, shelves, decorative floral elements, and personality-driven Harajuku-style decorations such as edgy figurines, fashion objects, neon signs, bold accessories, and statement décor pieces. The collectibles should feel fashionable, expressive, and slightly rebellious—not overly cute dolls or childish plush toys—suggesting confident young women with strong taste and attitude. The space should feel layered, cozy, and social, as if friends actually gather and spend time there, while remaining intentional and curated rather than cluttered. The overall atmosphere should be edgy, flashy, and unapologetically bold rather than cute or sweet. Female users must maintain cool, tough, confident expressions with no smiling, conveying a strong, stylish presence typical of Harajuku gyaru aesthetics. All female users must appear only in this pink room.

      If both male and female users are uploaded, assign males exclusively to the male room and females exclusively to the female room. If all uploaded users are the same gender, randomly divide them between the two rooms while keeping identities unchanged and ensuring visual balance.

      All characters must be seated, facing forward or slightly angled toward the camera, with confident, rebellious, and streetwise body language rather than formal or polite poses. Their posture should feel relaxed, slightly slouched or asymmetrical, conveying a delinquent, tough, and cool attitude typical of Japanese street gangs. Male users should be styled in Japanese yankii fashion, while female users should wear bold, sexy, and attitude-driven outfits featuring elements such as leather textures, sheer or semi-transparent tops, short skirts, or fitted silhouettes. The clothing should be simple rather than overly layered or decorative, focusing on a hot, confident, and edgy look with strong personality instead of a traditional gyaru costume style. Subtle to visible tattoos may appear on exposed skin such as arms, shoulders, necks, or hands, reinforcing the delinquent aesthetic without overwhelming the characters. Use a medium camera distance showing upper bodies and seating clearly, with symmetrical, poster-like framing. Lighting must remain consistent within each room to reinforce the strong color contrast.

      At the bottom portion of the poster, add the title text “恋・地獄。” The typography must closely resemble the original show logo style, using extremely bold, heavy-weight Japanese characters with thick strokes and compact proportions, similar to high-impact Japanese variety show or sports-event typography. The characters should feel powerful, blocky, and visually loud rather than elegant or thin. The text must be vivid pink, bold and eye-catching, and positioned prominently near the bottom center of the poster. Add the subtitle text “— Love Is Hell —” in the same vivid pink color, using a slightly cursive, handwritten-style script that feels expressive and stylish. The subtitle should be smaller than the main title and complement it without overpowering it. Both the main title and subtitle must remain solid pink with no white, black, or any other colored outlines, strokes, shadows, or borders.

      The final image should feel bold, flashy, dramatic, and playful, strongly evoking a high-impact Japanese variety show poster through extreme color contrast, confident group presence, accurate faces, and faithful recreation of the described layout, rooms, lighting, and typography, using only the uploaded people and no external references.
    reference_folder: ""
    use_comparison_template: false
    use_random_source_selection: true
    min_images: 2
    max_images: 4
    num_iterations: 50

