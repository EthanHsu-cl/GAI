tasks:
  - folder: ../Media Files/Nano Banana/0205 櫻花日和
    model: gemini-3-pro-image-preview
    resolution: "2K"
    aspect_ratio: "9:16"
    prompt: |-
      Use the uploaded photo as the only reference for the human subject. The person in the uploaded image must be the only human in the final result. Preserve the subject’s real face, facial features, identity, skin tone, hairstyle, facial expression, and body proportions exactly as shown in the uploaded photo. Do not beautify, stylize, replace, or reinterpret the face in any way.

      Create a three-panel vertical photo composition arranged from top to bottom, resembling a springtime cherry blossom photoshoot. Each panel features the same subject in a different pose, all set within a cherry blossom park during full sakura bloom.

      The overall color tone is bright and clear with slightly increased saturation, ensuring cherry blossoms appear soft pink rather than white. Highlights remain luminous without washing out color, preserving a fresh sakura pink while maintaining a clean, neutral daylight balance. Neutral spring daylight reaches the subject’s face, creating subtle light-and-shadow contrast on the skin without warm coloration. The environment consists only of blooming cherry blossom trees, evoking purity, renewal, and quiet seasonal beauty.

      Clothing: If the subject is female: a flowing white long-sleeve one-piece LONG dress with a gently cinched waist, delicate ruffle details, and light, graceful fabric. If the subject is male: a white top layered with a cream knit cardigan, paired with dark brown wide-leg trousers, conveying a calm, refined spring aesthetic. Clothing must appear natural and realistic, with no dramatic styling.
      If the subject is an animal, no clothing or accessories are worn.

      Image 1 — Medium Close-Up: The camera frames the subject from the chest upward only. The subject stands beneath blooming cherry blossom trees in a slight side-facing pose, gently tilting the head upward toward the sakura above. Neutral spring sunlight filters through the cherry blossoms and falls directly onto the subject’s face, creating visible but soft natural shadows across the facial contours while maintaining a clean, neutral tone without warm coloration. A small number of cherry blossom petals drift lightly through the scene, creating a soft sakura rain, with all petals remaining completely clear of the face at all times. The background is densely filled with cherry blossoms and branches, softly blurred with a shallow depth of field. One hand is gently raised to lightly touch or hold a nearby cherry blossom branch in a natural, delicate manner. The expression is calm and reflective.

      Image 2 — Long Shot: The camera frames the subject from the upper thighs upward only; legs below the thighs and all footwear are completely out of frame. The subject walks away from the camera along a petal-covered path, surrounded exclusively by rows of fully blooming cherry trees. While walking forward, the subject gently turns their head to look back over the shoulder toward the camera with a warm, spontaneous smile. The subject’s body orientation must be different from the other two panels, ensuring that each panel presents a distinct body-facing direction. The movement feels light and unposed, as if captured mid-step. The expression is bright, relaxed, and genuine, conveying joy and fleeting springtime warmth.

      Image 3 — Close-Up: The camera frames the subject’s face and neck from a gentle side angle. The subject looks slightly away from the camera, not directly into the lens. Soft, neutral daylight filters through the cherry blossom canopy and illuminates the subject’s face, creating gentle highlights and natural shadow patterns across the skin to enhance depth, while strictly avoiding warm or yellow tones. A few cherry blossom petals drift lightly through the surrounding air, suggesting a sparse, gentle sakura fall, with all petals staying entirely outside the facial area and never obscuring facial features. The background is composed almost entirely of softly blurred cherry blossoms, forming an immersive pink floral backdrop. The eyes appear clear, peaceful, and quietly emotional, capturing an intimate moment of springtime stillness.
    use_random_source_selection: false
    use_deterministic_random: false
    random_seed: 42
    min_images: 2
    max_images: 4
    num_iterations: 50

comments:
  folder_structure: Each task folder should contain 'Source' and 'Generated_Output' subfolders. For multi-image tasks, also include 'Additional' subfolder.
  reference_folder: 'Optional: Path to folder containing third set of images for 3-way comparison'
  template_usage: 'use_comparison_template: true uses comparison_template_path (3 placeholders), false uses template_path (2 placeholders)'
  model: Gemini model to use for generation. 'gemini-2.5-flash-image' (max 3 images, faster), 'gemini-3-pro-image-preview' (max 14 images, better quality). Must be specified per task; defaults to 'gemini-2.5-flash-image' if omitted. Root-level model is ignored.
  resolution: "Output resolution. Options: '1K' (default). Must be specified per task if non-default value is needed."
  aspect_ratio: "Output aspect ratio. Valid options: '1:1', '2:3', '3:2', '3:4', '4:3', '4:5', '5:4', '9:16', '16:9', '21:9'. If omitted, auto-detects the closest ratio from source image dimensions."
  use_multi_image: Set to true to enable multi-image mode from Additional folder, false for single-image mode
  output_group_tasks_by: 'Set to 0 (or omit) to create individual reports per task. Set to N (e.g., 4) to group N tasks into one combined report. Example: with 4 tasks and group_tasks_by=4, creates 1 report; with 8 tasks, creates 2 reports.'
  random_source_selection:
    description: Mode for selecting N images from Source folder per API call (images can be reused)
    use_random_source_selection: Set to true to enable random source selection mode
    min_images: 'Minimum images per API call (default: 1)'
    max_images: 'Maximum images per API call (default: model max, e.g., 3 for flash, 14 for pro)'
    num_iterations: Number of API calls to make. Defaults to number of source files if omitted.
    notes: |
      - All images in 'Source' folder - no 'Additional' folder needed
      - num_iterations controls API call count (defaults to source file count)
      - Image counts spread from min to max across iterations
      - Images CAN be reused across iterations (not unique partitions)
      - DETERMINISTIC: same folder = same selections every run
      - Great for regression testing: update source images, re-run, compare results
      - Use gemini-3-pro-image-preview model for up to 14 images per call
    example: |
      # 10 source images, 50 iterations = 50 API calls, each picks 1-5 images
      use_random_source_selection: false
      min_images: 1
      max_images: 5
      num_iterations: 50  # Optional: defaults to number of source files
      model: gemini-3-pro-image-preview
  multi_image_config:
    description: Configuration for multi-image generation (Source + Additional folders mode)
    enabled: Must be true to use multi-image features
    mode: 'sequential: consistent reproducible pairing | random_pairing: randomly select from Additional folder'
    folders: Array of folder paths to select additional images from (typically ['../path/to/folder/Additional'])
    allow_duplicates: 'true for sequential mode (recommended) | false: try to avoid repeating combinations in random mode'
  multi_image_example_single: "Set 'use_multi_image': false to process only images from Source folder without additional images"
  multi_image_example_dual: "Set 'use_multi_image': true with multi_image_config to pair Source images with Additional folder images sequentially"
