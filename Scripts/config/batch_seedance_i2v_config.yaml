# Seedance Image-to-Video (I2V) Batch Configuration
# Each style folder should contain a 'Source' subfolder with source images
# Generated videos will be placed in 'Generated_Video' subfolder
# Metadata will be placed in 'Metadata' subfolder

template_path: templates/I2V templates.pptx

output:
  directory: /Users/ethanhsu/Desktop/EthanHsu-cl/GAI/Report
  group_tasks_by:

# Global generation count - how many videos to generate per source image
# Can be overridden per task
generation_count: 1

# Root folder containing all style subfolders
root_folder: Media Files/Seedance I2V

testbed: http://192.168.31.161/external-testbed/video_effect/
design_link: ""
source_video_link: ""

default_settings:
  model: dreamina-seedance-2-0-260128
  aspect_ratio: adaptive
  duration: 5
  resolution: 720p
  seed: -1
  service_tier: default
  generate_audio: true
  draft: false
  cam_fix: false
  expires: 172800

tasks:
  - style_name: Dog_Run_To_Owner
    folder: Media Files/Seedance I2V/0416 21 Styles/Dog_Run_To_Owner
    prompt: |
      A dog is happily running toward its owner with excitement
    aspect_ratio: "adaptive"

  - style_name: Capybara_Onsen_Closeup
    folder: Media Files/Seedance I2V/0416 21 Styles/Capybara_Onsen_Closeup
    prompt: |
      A close up capybara bathe in a white smoky hot spring, looking around, smoke on the water surface, foggy, blurred mountain background in Japan, bright environment
    aspect_ratio: "adaptive"

  - style_name: Cherry_Soda_Condensation
    folder: Media Files/Seedance I2V/0416 21 Styles/Cherry_Soda_Condensation
    prompt: |
      A chilled glass bottle of cherry soda with condsation, surrounded by fresh, juicy cherries. The background is a blend of soft pink and red gradients, Splashes of soda fizz and bubbles are dynamically captured around the bottle
