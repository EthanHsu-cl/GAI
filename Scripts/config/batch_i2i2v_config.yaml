      Her jersey: a fully fictional football jersey with a clean, crisp American-flag-inspired pattern — straight horizontal red and white stripes covering the entire shirt evenly including the sleeves, with small white stars scattered uniformly across the whole jersey. Navy blue V-neck collar; navy blue cuff trim on each sleeve; sleeves otherwise carry the same red-and-white stripe-and-star pattern as the body. Fabric looks fresh and pristine with vibrant saturated colors and no dirt, smudges, distressing, or wear, but shows natural fabric folds and soft creases draping realistically over the body and following her seated posture. A single random jersey number on the front in a bold athletic block font, navy blue fill with a red outline/trim. NO brand logos, NO swooshes, check marks, V-shapes, three stripes, Puma formstrips, or Mizuno line motifs. NO text or words anywhere except the jersey number.
      Makeup: light natural dewy makeup — soft foundation, subtle eyeliner, gentle blush, natural lip tint.
      Expression: calm, focused, slightly tense, lips softly parted, eyes gazing forward and slightly upward toward the field.
