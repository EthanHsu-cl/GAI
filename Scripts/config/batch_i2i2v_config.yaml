tasks:
  - style_name: 高舉獎杯慶祝 (美國版)
    folder: Media Files/I2I2V/0529 4 Styles/0529 高舉獎杯慶祝 (美國版)
    # ---- Image generation step ----
    image_service: openai_image
    # nano_banana | openai_image
    image_model: gpt-image-2
    # nano: gemini-3.1-flash-image-preview | gemini-3-pro-image-preview | gemini-2.5-flash-image
    # openai: gpt-image-1 | gpt-image-1.5 | gpt-image-2
    image_quality: auto
    # openai_image only: auto | low | medium | high
    image_resolution: '1K'
    image_aspect_ratio: '16:9'
    image_prompt: |
      A high-resolution, ultra-realistic photojournalistic shot. A detailed waist-up medium close-up focusing closely on the face and torso of a victorious person being lifted high by a dense, celebrating crowd inside a magnificent stadium at night. The stadium has an intricate illuminated truss roof network, filled with bright lights and countless smartphone flashes creating a dramatic atmosphere. The main subject, positioned center-right, has an authentic-looking portrait expressing a genuine smiling expression that preserves the overall character likeness of the input reference image while being naturally re-lit by the scene, with the face's skin tones, highlights, and shadows driven entirely by the stadium's lighting so that strong directional key light, ambient blue stadium glow, and bounced light from surrounding phone flashes fall across the face and wrap around its contours, casting soft cast shadows under the brow, nose, and chin and adding subtle specular highlights and slight color bleed on the skin that match the environment, so the face sits within the same atmospheric haze, grain, and depth-of-field as the rest of the image rather than appearing sharply composited or pasted on; looking towards the far left, while their right hand holds a victory cup high in the air. The trophy has plain light-blue and white ribbons tied to it.
      The visible part of the subject, from the waist up, wears a football jersey featuring a clean, crisp American flag-inspired pattern with red and white horizontal wavy stripes covering the entire shirt evenly, including the sleeves, and small white stars scattered uniformly across the whole jersey. The collar is a navy blue V-neck, and each sleeve has a navy blue cuff trim; otherwise the sleeves carry the same red-and-white stripe-and-star pattern as the body. The fabric looks fresh and pristine with vibrant, saturated colors and no dirt, smudges, distressing, or worn texture. This fully fictional jersey is entirely free of any real-world branding or identity elements. It excludes all brand cues such as swooshes, check marks, V-shapes, three stripes, Puma formstrips, or Mizuno-style line motifs. The jersey displays only a single random number from 1–99 placed naturally in the center of the chest, with no text, lettering, slogans, or words anywhere on the jersey.
      In the immediate foreground, numerous arms are reaching up holding smartphones; on the bottom left, a hand holds a white multi-lens smartphone surrounded by white celebration streamers. On the bottom right, a hand holds a black smartphone facing the subject, with excited faces below including a bald man and a man in a blue hat, now larger and more prominent in the lower frame. In the background right, another lifted player wearing the same football outfit is emotionally covering their face. The scene is full of dynamic energy, hands, bracelets, and pure joy, with the primary focus on the main subject's face within the scene's natural depth-of-field, and the trophy.

    # ---- Video generation step (Kling) ----
    video_model: v3
    video_mode: pro
    video_duration: 5
    video_ratio: '16:9'
    video_prompt: |
      Handheld camera simulation, dynamic camera shake. The protagonist triumphantly hoists the trophy. The entire stadium erupts in a massive visual cheer: the huge background crowd surges like waves, jumping and waving arms enthusiastically. Countless camera flashes go off continuously like a strobe. Confetti bursts into the air. Immersive and roaring stadium atmosphere. Depth of field keeping the background slightly blurred to maintain generation stability. Hyper-detailed, volumetric lighting.
    video_negative_prompt: |
      logo, badge,  ghosting,  morphing background, blending environments, blurry, Shaking up and down

