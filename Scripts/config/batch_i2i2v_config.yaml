      Lighting: bright warm stadium floodlighting, luminous white-amber, constant stable light, minimal shadows, airy and clean.
      Broadcast HUD top-left: football scoreboard showing USA flag and Brazil flag, country codes USA vs BRA, score 0:0, match time 23:14, FIFA-World-Cup broadcast graphic style, white HUD bar, official clean typography.
      Technical: photorealistic, 4K, broadcast TV quality, beauty-editorial aesthetic, flat focus across entire frame, f/11-equivalent aperture, rectilinear lens, zero lens distortion, uniform sharpness from foreground to background.
    
    video_model: v3
