# Image-to-Image-to-Video Batch Configuration
#
# Two-step pipeline per source image:
#   1. Image generation via /nano_banana OR /openai_image (chosen per task)
#   2. Video generation via Kling /Image2Video using the generated image
#
# Folder layout per task:
#   {folder}/
#   ├── Source/             # input reference images
#   ├── Generated_Frames/   # intermediate generated images (reused on resume)
#   ├── Generated_Video/    # final mp4 videos
#   └── Metadata/

template_path: templates/I2V templates.pptx

output:
  directory: /Users/ethanhsu/Desktop/EthanHsu-cl/GAI/Report
  group_tasks_by: 2

testbed: http://192.168.31.161/external-testbed/image_generation/

schedule:
  start_time: ''

root_design_link: https://docs.google.com/presentation/d/1-e6NLHCk6MQ7gbBdVuJyRU0IQSA6o6HBFdpvqXLUXjQ/edit?slide=id.g3e3ddbb87a4_0_75#slide=id.g3e3ddbb87a4_0_75
root_source_video_link: https://cyberlinkcorp-my.sharepoint.com/:f:/g/personal/onedrive_qa1_cyberlink_com/IgCTuBdoX7TrSZNaJbyRxUJ8AWESFjQ5p3SxKyOCo4eM8Jw?e=UDnQ6X

tasks:
  - style_name: 滑草V10
    folder: Media Files/I2I2V/0522 滑草V10
    # ---- Image generation step ----
    image_service: nano_banana
    # nano_banana | openai_image
    image_model: gemini-3.1-flash-image-preview
    # nano: gemini-3.1-flash-image-preview | gemini-3-pro-image-preview | gemini-2.5-flash-image
    # openai: gpt-image-1 | gpt-image-1.5 | gpt-image-2
    image_quality: auto
    # openai_image only: auto | low | medium | high
    image_resolution: '1K'
    image_aspect_ratio: '9:16'
    image_prompt: |
      === OUTPUT FORMAT (ABSOLUTE REQUIREMENT — READ FIRST) ===
      The final image MUST be a STRICTLY VERTICAL 9:16 PORTRAIT format.
      - Image height MUST be greater than image width
      - Aspect ratio MUST be exactly 9:16 (vertical portrait, like a mobile phone screen held upright, like Instagram Reels or TikTok)
      - DO NOT output horizontal / landscape format (16:9)
      - DO NOT output square format (1:1)
      - DO NOT output 4:3 or 3:4 or any other ratio
      - The canvas itself must be a tall vertical rectangle
      - If you generate horizontally by default, ROTATE or RECOMPOSE to vertical before finalizing
      This is non-negotiable. The output format is 9:16 vertical portrait, period.

      === IMAGE CONTENT ===

      Using the uploaded photo as the EXACT identity reference, create a photorealistic cinematic sports photograph.

      IDENTITY LOCK (highest priority): Generate the same person from the uploaded photo with 100% identical FACE (same face shape, jawline, eyes, nose, lips, skin tone, skin texture) and 100% identical HAIRSTYLE (same length, color, texture, parting, fringe, sideburns, and overall shape — do not restyle, do not shorten, do not slick back). The face and hair must look exactly like the uploaded reference, just placed in this new scene.

      FRAMING (designed for vertical 9:16 canvas): Tight medium close-up — show subject from mid-thigh/waist up to slightly above the head. Subject fills 70–80% of the TALL vertical frame, positioned slightly off-center, body tilted diagonally for dynamic composition. The composition is built for a portrait-oriented canvas — the subject's vertical body axis aligns with the tall vertical axis of the frame. Camera positioned slightly above head height, shooting downward at a moderate 15–30 degree angle.

      POSE: The person is captured mid-action in a CLASSIC GOAL CELEBRATION RUN — standing upright and moving forward across the pitch, both arms extended OUTWARD and slightly BACKWARD behind the body (like an airplane / soaring posture), elbows almost straight, hands open. The torso leans slightly forward with the running momentum. Legs are in a natural running stride — one leg planted, the other lifted in motion. Head is turned to one side in three-quarter / profile view, looking sideways toward teammates or the crowd, with an intense focused expression — mouth open mid-shout, eyes wide with celebratory emotion. Body at a 45-degree diagonal angle to the camera. This is the energetic running-celebration moment right after scoring a goal — NOT a standing still pose, NOT a kneel, NOT a slide on the ground.

      SCENE: Professional soccer pitch during golden hour. Green grass background with a thin strip of blurred stadium at the top of the tall vertical frame. Warm sunlight with soft rim light, 85mm lens, shallow depth of field, slight motion blur in the legs and background to convey forward momentum, sharp focus on face and hair. Natural broadcast sports photography style — like a freeze-frame from a live match — not AI-rendered, not over-stylized. NO soccer ball anywhere in the frame.

      OUTFIT: Modern professional football jersey in a black and white color scheme. Realistic, premium, fully fictional.

      ZERO LOGOS / ZERO BRANDING (absolute rule — applies to jersey, shorts, socks, cleats, gloves, wristbands, and ALL accessories):
      - NO brand logos of any kind: no Nike swoosh, no Adidas three stripes, no Puma logo or formstrip, no Mizuno wave, no Under Armour, no New Balance, no Umbro, no Kappa, no Joma, no Macron, no Lotto, no Le Coq Sportif, no Hummel, no Castore, no any other sportswear brand mark
      - NO check marks, swooshes, V-shapes, parallel stripe patterns, or any abstract shape that resembles a sportswear brand mark
      - NO team crests, club badges, national flags, national emblems, federation marks, country names, country codes, or any team identity element
      - NO sponsor logos, sponsor text, sponsor patches anywhere
      - NO manufacturer tags, NO size labels, NO brand text on the neck, hem, sleeve, or any seam
      - NO copyrighted icons, cultural symbols, or real-world identity references of any kind

      The kit must be 100% clean, blank, and brand-free — as if it were a generic prototype jersey before any branding is applied. The ONLY text or marking allowed on the entire outfit is: (1) one random jersey number from 1–99 placed naturally on the chest, and (2) one fictional slogan selected from: "2026 IS OURS", "THE GREATEST STAGE", "THE WORLD IS WATCHING", or "ONE WORLD. ONE CUP."

      NO overlays, NO scoreboard, NO graphics outside the jersey.

      === FINAL FORMAT CHECK ===
      Before outputting: confirm the image is 9:16 VERTICAL PORTRAIT (taller than wide). If the generated canvas is horizontal or square, REJECT and regenerate as vertical 9:16. Face and hairstyle must match the uploaded reference exactly — identity preservation overrides all other considerations.

    # ---- Video generation step (Kling) ----
    video_model: v3
    video_mode: pro
    video_duration: 5
    video_ratio: '9:16'
    video_prompt: |
      Use the reference image as frame 1. At frame 1 the subject is 
      ALREADY on both knees and ALREADY sliding forward across the 
      grass at full speed — no run-up, no running, no jogging, no 
      standing position, no transition from standing to kneeling, no 
      dropping down motion. The subject simply exists on his knees, 
      already in mid-slide, from the very first frame.

      The subject is in the celebration pose shown in the reference: 
      both knees on the grass, calves tucked back, torso leaning 
      slightly backward, both arms spread wide to the sides with palms 
      open, head tilted slightly back, mouth slightly open in a 
      natural, focused expression — relaxed, composed, slight intensity 
      from the motion, eyes calmly looking forward or slightly upward. 
      No smile required, no forced emotion, no exaggeration.

      Hold this exact pose completely frozen and unchanged from start 
      to finish. Only the body's position moves — sliding forward 
      across the green turf on both knees at constant HIGH SPEED in 
      real time, covering a long distance,As the film ended, he gradually stopped gliding. Two long sharp parallel trails carve 
      continuously into the grass behind, small clippings and water 
      droplets constantly spraying up from the friction.

      No change in arm position, no change in head angle, no change in 
      facial expression, no standing up, no looking down — pose stays 
      identical to the reference throughout the entire shot.

      CRITICAL — Identity lock: keep the subject's face shape, jawline, 
      cheekbones, nose, eye shape, eyebrows, skin tone, beard shape 
      and density, and hairstyle exactly identical to the reference 
      image in every frame. No face morphing, no identity drift, no 
      aging. Same person from start to end.

      Expression stays natural and effortless throughout — calm, 
      focused, alive with the motion but not theatrical. No forced 
      expression, no distorted mouth, no exaggerated facial muscles, 
      no screaming, no grimacing.

      Camera: low-angle ground-level tracking shot at real-time speed, 
      NO slow motion, fast smooth camera follow with subtle motion 
      blur on the rushing background, shallow depth of field, the 
      camera dollies backward at the same constant high speed as the 
      subject, keeping the upper body centered in frame the whole time. 
      Dynamic, kinetic, high-energy feel.

      Single continuous take, one unbroken shot, no cuts, no transitions, 
      no fades.
    video_negative_prompt: |
      face distortion, face swap, changed hairstyle, extra limbs, deformed hands, pose changing, arms lowering, standing up, body returning upright, sliding right, stopping, decelerating, falling, lying down, ball, sled, screaming, shaky camera, low quality, watermark, text,logo
    

