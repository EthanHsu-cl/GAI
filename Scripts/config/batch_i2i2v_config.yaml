comments:
  pipeline: |
    Per source image, the handler runs two API calls:
      1. Image generation via the testbed at `testbed` (default: image_generation),
         using either /nano_banana or /openai_image based on `image_service`.
      2. Video generation via the Kling testbed (kling_endpoint in api_definitions.json),
         using /Image2Video with the freshly generated image.

  resume_behaviour: |
    If `Generated_Frames/{source_name}_image.{ext}` exists from a prior run,
    the image step is skipped and the existing image is fed to Kling directly.
    Delete the frame to force a re-generation.

  image_service: |
    Per-task selection of which image API to use.
    Options:
      - nano_banana   → Google Gemini Flash / Pro image models
      - openai_image  → OpenAI gpt-image-1 / gpt-image-2

  image_model: |
    nano_banana options:
      - gemini-2.5-flash-image
      - gemini-3-pro-image-preview
      - gemini-3.1-flash-image-preview (default for nano_banana)
    openai_image options:
      - gpt-image-1
      - gpt-image-2 (default for openai_image)

  image_quality: |
    openai_image only.  Options: auto | low | medium | high.  Ignored for nano_banana.

  image_aspect_ratio: |
    Valid options: auto, 1:1, 2:3, 3:2, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9.

  video_model: |
    Kling model. Options: v1.6, v1.5, v2.0-master, v2.1, v2.1-master,
    v2.5-turbo, v2.6, v3 (default).

  video_mode: |
    Kling generation mode. Options: std | pro (default).

  video_duration: |
    Video duration in seconds. Options: 5, 10.  Default: 5.

  output_naming: |
    Intermediate frame:  {source_name}_image.{ext}   in Generated_Frames/
    Final video:          {source_name}.mp4           in Generated_Video/
    Metadata:             {source_name}_metadata.json in Metadata/
