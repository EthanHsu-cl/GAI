tasks:
  - style_name: 轉身舉獎盃 (巴西款)
    folder: Media Files/I2I2V/0521 2 Styles/0521 轉身舉獎盃 (巴西款) 

    # ---- Image generation step ----
    image_service: nano_banana
    # nano_banana | openai_image
    image_model: gemini-3-pro-image-preview
    # nano: gemini-3.1-flash-image-preview | gemini-3-pro-image-preview | gemini-2.5-flash-image
    # openai: gpt-image-1 | gpt-image-1.5 | gpt-image-2
    image_quality: auto
    # openai_image only: auto | low | medium | high
    image_resolution: '1K'
    image_aspect_ratio: '16:9'
    image_prompt: |
      A 16:9 photorealistic image. Symmetrical, center-framed medium-wide shot from the waist up. Straight-on, eye-level camera angle with a deep focus, creating strong immersive depth.

      Subject: A person sitting dead center, looking directly into the lens. They have an expression of pure, vibrant excitement, mouth wide open cheering, with both fists clenched and raised to shoulder level. They have simple green and yellow horizontal stripes painted on their cheeks. They are wearing a modern professional football jersey in a green and yellow color scheme.The uniform must look realistic, premium, modern, and fully fictional(no shoulder stripes, no chest logos).

      Foreground: A large glass coffee table spanning the bottom frame, filled to create depth. On the left: three unlabeled brown glass beer bottles (one near the viewer, two further back). In the center: a larger generic green bowl overflowing with a mixture of tortilla chips and pretzels. On the right: a generic sports newspaper folded to show a headline like "HISTORIC WIN" and generic text, with a small generic sports photo.

      Midground: They sit on a light beige sofa. Draped layered and deep over the sofa back and side arms are multiple unmarked sports scarves (no club logos, only colors like plain green, green/yellow stripe, plain yellow) and the mustard yellow and dark red pillows.

      Background: A warm, rich, deep, and symmetrically lit room with architectural details like wainscoting. Flanking the sofa on both the exact left and right are four matching classic floor lamps with warm yellow shades, arranged symmetrically in pairs (two on each side), casting an immersive, deeply cinematic glow. The dark wooden bookshelf on the far left and beige curtains on the far right are retained and clearly visible due to deeper focus. The large, unbranded flag featuring a solid vivid green background with a central yellow diamond remains pinned to the wall directly behind them.

    # ---- Video generation step (Kling) ----
    video_model: v3
    video_mode: pro
    video_duration: 5
    video_ratio: '16:9'
    video_prompt: |
      Start Frame: In a warm living room, a passionate fan leaps upward, their chest heaving, neck veins popping, and fists pumping aggressively as their jersey ripples with their energetic movements.
      Camera Movement & Transition: Dynamic orbital tracking shot. The camera executes a smooth, cinematic 360-degree horizontal orbit around the person from left to right, keeping the subject dead center in the frame. During this orbital sweep, the camera maintains a strictly level horizon and tracks their head height. As they dynamically stand up, a seamless environment transition occurs: the warm living room lighting instantly flashes and shifts to bright stadium floodlights. 
      End Frame: The camera completes its orbit and locks perfectly in front of them. They stand like a hero, hoisted securely on the shoulders of an ecstatic, hyper-realistic stadium. Their bare right arm punches through the hazy air, hoisting a fiercely gleaming golden soccer trophy that catches the stadium flares. The foreground is heavily framed by out-of-focus raised fans' hands and glowing smartphone screens capturing the moment. Their facial identity remains perfectly locked to the start frame, but is now raw with emotion, muscles tensed, roaring in absolute victory. 8k, photorealistic, IMAX aspect ratio. Their facial identity remains perfectly consistent with the start frame.
    video_negative_prompt: |
      logo, badge,  ghosting, double exposure, morphing background, blending environments, residual objects, lingering background, superimposition, fading transition, floating furniture, mutated architecture, indoor elements in outdoor stadium, structural inconsistency, transparent objects, crossfade. naked

  - style_name: 高舉獎杯慶祝
    folder: Media Files/I2I2V/0521 2 Styles/0521 高舉獎杯慶祝

    # ---- Image generation step ----
    image_service: openai_image
    image_model: gpt-image-2
    image_quality: auto
    image_resolution: '1K'
    image_aspect_ratio: '16:9'
    image_prompt: |
      A high-resolution, ultra-realistic photojournalistic shot. A detailed waist-up medium close-up focusing closely on the face and torso of a victorious person being lifted high by a dense, celebrating crowd inside a magnificent stadium at night. The stadium has an intricate illuminated truss roof network, filled with bright lights and countless smartphone flashes creating a dramatic atmosphere. The main subject, positioned center-right, has an authentic-looking portrait expressing a genuine smiling expression that maintains strong character likeness and facial similarity to the input reference image, with the face's lighting, color tone, and shadows perfectly matched and seamlessly integrated into the complex stadium lighting environment, including realistic reflections from the surrounding harsh lights and blue stadium glows; looking towards the far left, while their right hand holds a victory cup high in the air. The trophy has plain light-blue and white ribbons tied to it.
      The visible part of the subject, from the waist up, wears a white football jersey with clearly visible black OR black trim on the collar and sleeve cuffs. This fully fictional jersey is entirely free of any real-world branding or identity elements. It excludes all brand cues such as swooshes, check marks, V-shapes, three stripes, Puma formstrips, or Mizuno-style line motifs. The visible jersey portion includes only a single random number from 1–99 placed naturally on the chest, plus one fictional slogan selected from: "2026 IS OURS", "THE GREATEST STAGE", "THE WORLD IS WATCHING", or "ONE WORLD. ONE CUP.".
      In the immediate foreground, numerous arms are reaching up holding smartphones; on the bottom left, a hand holds a white multi-lens smartphone surrounded by white celebration streamers. On the bottom right, a hand holds a black smartphone facing the subject, with excited faces below including a bald man and a man in a blue hat, now larger and more prominent in the lower frame. In the background right, another lifted player wearing the same white football outfit with black or black trim is emotionally covering their face. The scene is full of dynamic energy, hands, bracelets, and pure joy, with the sharpest focus on the main subject's face and the trophy.

    # ---- Video generation step (Kling) ----
    video_model: v3
    video_mode: pro
    video_duration: 5
    video_ratio: '16:9'
    video_prompt: |
      Handheld camera simulation, dynamic camera shake. The protagonist triumphantly hoists the trophy. The entire stadium erupts in a massive visual cheer: the huge background crowd surges like waves, jumping and waving arms enthusiastically. Countless camera flashes go off continuously like a strobe. Confetti bursts into the air. Immersive and roaring stadium atmosphere. Depth of field keeping the background slightly blurred to maintain generation stability. Hyper-detailed, volumetric lighting.
    video_negative_prompt: |
      logo, badge,  ghosting,  morphing background, blending environments, blurry, Shaking up and down
    

