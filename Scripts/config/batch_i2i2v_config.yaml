root_source_video_link: https://cyberlinkcorp-my.sharepoint.com/:f:/g/personal/onedrive_qa1_cyberlink_com/IgCqmspRzmtVRqK8XPMFeP2aAaIuZ5_VysbHmAmZuVmI1CA?e=ldAjWJ

tasks:
  - style_name: 轉身舉獎盃 (德國版)
    folder: Media Files/I2I2V/0616 3 Styles/0616 轉身舉獎盃 (德國版)
    image_service: openai_image
    image_model: gpt-image-2
    image_quality: auto
    image_resolution: '1K'
    image_aspect_ratio: '16:9'
    image_prompt: |
      A 16:9 photorealistic image. Symmetrical, center-framed medium-wide shot from the waist up. Straight-on, eye-level camera angle with a deep focus, creating strong immersive depth. Subject: A person sitting dead center, looking directly into the lens. They have an expression of pure, vibrant excitement, mouth wide open cheering, with both fists clenched and raised to shoulder level. They have a small German flag (three horizontal bands of black, red, and gold) painted on each cheek. They are wearing a plain, completely unbranded white short-sleeve football jersey with a single clean, bold V-shaped chevron across the chest made of three crisp, separate, equal-width parallel stripes with hard edges and no gradient or blur; from the outer edge inward the order is black, then red, then gold, with the gold stripe innermost at the point of the V; matching thin black-red-gold trim on the sleeve cuffs and V-neck collar (no shoulder stripes, no chest logos, no zigzag or jagged patterns). Foreground: A large glass coffee table spanning the bottom frame, filled to create depth. On the left: three unlabeled brown glass beer bottles (one near the viewer, two further back). In the center: a larger generic blue bowl overflowing with a mixture of tortilla chips and pretzels. On the right: a generic sports newspaper folded to show a headline like "HISTORIC WIN" and generic text, with a small generic sports photo. Midground: They sit on a light beige sofa. Draped layered and deep over the sofa back and side arms are multiple unmarked solid single-color sports scarves (no club logos, no stripes, each individual scarf is one single solid color only — some entirely black, some entirely red, some entirely gold) and solid single-color pillows, each pillow one color only (black, red, or gold). Background: A warm, rich, deep, and symmetrically lit room with architectural details like wainscoting. Flanking the sofa on both the exact left and right are four matching classic floor lamps with warm yellow shades, arranged symmetrically in pairs (two on each side), casting an immersive, deeply cinematic glow. The dark wooden bookshelf on the far left and beige curtains on the far right are retained and clearly visible due to deeper focus. The German national flag (three horizontal bands of black on top, red in the middle, and gold at the bottom) remains pinned to the wall directly behind them.

    video_model: v3
    video_mode: pro
    video_duration: 5
    video_ratio: '16:9'
    video_sound_enabled: true
    video_prompt: |
      Start Frame: In a warm living room, a passionate fan leaps upward, their chest heaving, neck veins popping, and fists pumping aggressively as their jersey ripples with their energetic movements.
      Camera Movement & Transition: Dynamic orbital tracking shot. The camera executes a smooth, cinematic 360-degree horizontal orbit around the person from left to right, keeping the subject dead center in the frame. During this orbital sweep, the camera maintains a strictly level horizon and tracks their head height. As they dynamically stand up, a seamless environment transition occurs: the warm living room lighting instantly flashes and shifts to bright stadium floodlights.
      End Frame: The camera completes its orbit and locks perfectly in front of them. They stand like a hero, hoisted securely on the shoulders of an ecstatic, hyper-realistic stadium. Their bare right arm punches through the hazy air, hoisting a fiercely gleaming golden soccer trophy that catches the stadium flares. The foreground is heavily framed by out-of-focus raised fans' hands and glowing smartphone screens capturing the moment. Their facial identity remains perfectly locked to the start frame, but is now raw with emotion, muscles tensed, roaring in absolute victory. 8k, photorealistic, IMAX aspect ratio. Their facial identity remains perfectly consistent with the start frame.
    video_negative_prompt: |
      logo, badge,  ghosting, double exposure, morphing background, blending environments, residual objects, lingering background, superimposition, fading transition, floating furniture, mutated architecture, indoor elements in outdoor stadium, structural inconsistency, transparent objects, crossfade. naked

    concurrent_requests: 3



comments:
  example: |
    nano_banana variant (alternative to the openai_image task above):
      - style_name: 看球賽 (nano)
        folder: Media Files/I2I2V/0520 看球賽 nano
        image_service: nano_banana
        image_model: gemini-3.1-flash-image-preview
        image_resolution: '1K'
        image_aspect_ratio: '16:9'
        image_prompt: |
          ...
        video_model: v3
        video_mode: pro
        video_duration: 5
        video_prompt: |
          ...
        video_negative_prompt: ''

  pipeline: |
    Per source image, the handler runs two API calls:
      1. Image generation via the testbed at `testbed` (default: image_generation),
         using either /nano_banana or /openai_image based on `image_service`.
      2. Video generation via the Kling testbed (kling_endpoint in api_definitions.json),
         using /Image2Video with the freshly generated image.

  resume_behaviour: |
    If `Generated_Frames/{source_name}_image.{ext}` exists from a prior run,
    the image step is skipped and the existing image is fed to Kling directly.
    Delete the frame to force a re-generation.

  image_service: |
    Per-task selection of which image API to use.
    Options:
      - nano_banana   → Google Gemini Flash / Pro image models
      - openai_image  → OpenAI gpt-image-1 / gpt-image-2

  image_model: |
    nano_banana options:
      - gemini-2.5-flash-image
      - gemini-3-pro-image-preview
      - gemini-3.1-flash-image-preview (default for nano_banana)
    openai_image options:
      - gpt-image-1
      - gpt-image-1.5
      - gpt-image-2 (default for openai_image)

  image_quality: |
    openai_image only.  Options: auto | low | medium | high.  Ignored for nano_banana.

  image_aspect_ratio: |
    Valid options: auto, 1:1, 2:3, 3:2, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9.

  video_model: |
    Kling model. Options: v1.6, v1.5, v2.0-master, v2.1, v2.1-master,
    v2.5-turbo, v2.6, v3 (default).

  video_mode: |
    Kling generation mode. Options: std | pro (default).

  video_duration: |
    Video duration in seconds. Options: 5, 10.  Default: 5.

  video_sound_enabled: |
    Whether Kling generates sound for the video. Options: true | false.
    Default: true. Set per task, or root-level for all tasks.

  concurrent_requests: |
    Shared parallelism cap for both stages (per task, or root-level for all
    tasks). Default: 1 (serial prefetch pipeline). When > 1 (or when a per-stage
    override below is > 1), the handler runs a two-phase concurrent pipeline:
    Phase 1 generates all intermediate frames in parallel, Phase 2 renders all
    videos in parallel. Capped at MAX_CONCURRENT_REQUESTS (10).

  image_concurrency: |
    Optional per-stage override for Phase 1 (image-gen) parallelism. The image
    testbed typically tolerates more concurrency than the Kling video testbed,
    so this can be set higher than video_concurrency. Falls back to
    concurrent_requests, then 1. Capped at 10.

  video_concurrency: |
    Optional per-stage override for Phase 2 (Kling video-gen) parallelism.
    Falls back to concurrent_requests, then 1. Capped at 10.

  output_naming: |
    Intermediate frame:  {source_name}_image.{ext}   in Generated_Frames/
    Final video:          {source_name}.mp4           in Generated_Video/
    Metadata:             {source_name}_metadata.json in Metadata/
