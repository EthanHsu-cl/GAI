# Image-to-Image-to-Video Batch Configuration
#
# Two-step pipeline per source image:
#   1. Image generation via /nano_banana OR /openai_image (chosen per task)
#   2. Video generation via Kling /Image2Video using the generated image
#
# Folder layout per task:
#   {folder}/
#   ├── Source/             # input reference images
#   ├── Generated_Frames/   # intermediate generated images (reused on resume)
#   ├── Generated_Video/    # final mp4 videos
#   └── Metadata/

template_path: templates/I2V templates.pptx

output:
  directory: /Users/ethanhsu/Desktop/EthanHsu-cl/GAI/Report
  group_tasks_by: 2

testbed: http://192.168.31.161/external-testbed/image_generation/

schedule:
  start_time: ''

root_design_link: https://docs.google.com/presentation/d/1-e6NLHCk6MQ7gbBdVuJyRU0IQSA6o6HBFdpvqXLUXjQ/edit?slide=id.g3eb84250c43_0_123#slide=id.g3eb84250c43_0_123
root_source_video_link: https://cyberlinkcorp-my.sharepoint.com/:f:/g/personal/onedrive_qa1_cyberlink_com/IgCv2IYHihRPRq30-Om_j0fmAY1YE5bz9zdFl9fqOg2N4lY?e=QNfvmF

tasks:
  - style_name: 高舉獎杯慶祝 (日本版)
    folder: Media Files/I2I2V/0603 高舉獎杯慶祝 (日本版)
    image_service: openai_image
    image_model: gpt-image-2
    image_quality: auto
    image_resolution: '1K'
    image_aspect_ratio: '16:9'
    image_prompt: |
      A high-resolution, ultra-realistic photojournalistic shot. A detailed waist-up medium close-up focusing closely on the face and torso of a victorious person being lifted high by a dense, celebrating crowd inside a magnificent stadium at night. The stadium has an intricate illuminated truss roof network, filled with bright lights and countless smartphone flashes creating a dramatic atmosphere. The main subject, positioned center-right, has an authentic-looking portrait expressing a genuine smiling expression that preserves the overall character likeness of the input reference image while being naturally re-lit by the scene, with the face's skin tones, highlights, and shadows driven entirely by the stadium's lighting so that strong directional key light, ambient blue stadium glow, and bounced light from surrounding phone flashes fall across the face and wrap around its contours, casting soft cast shadows under the brow, nose, and chin and adding subtle specular highlights and slight color bleed on the skin that match the environment, so the face sits within the same atmospheric haze, grain, and depth-of-field as the rest of the image rather than appearing sharply composited or pasted on; looking towards the far left, while their right hand holds a victory cup high in the air. The trophy has plain navy blue and white ribbons tied to it.
      The visible part of the subject, from the waist up, wears a football jersey featuring a deep navy blue base covered evenly with subtle lighter-blue wavy diagonal pinstripes across the entire shirt, including the sleeves. The collar is a red-and-white V-neck, and each sleeve has a matching navy blue cuff; otherwise the sleeves carry the same navy base with light-blue wavy pinstripe pattern as the body. The fabric looks fresh and pristine with vibrant, saturated colors and no dirt, smudges, distressing, or worn texture. This fully fictional jersey is entirely free of any real-world branding or identity elements. It excludes all brand cues such as swooshes, check marks, V-shapes, three stripes, Puma formstrips, or Mizuno-style line motifs. The jersey displays only a single random number from 1–99 placed naturally in the center of the chest, with no text, lettering, slogans, or words anywhere on the jersey.
      In the immediate foreground, numerous arms are reaching up holding smartphones; on the bottom left, a hand holds a white multi-lens smartphone surrounded by white celebration streamers. On the bottom right, a hand holds a black smartphone facing the subject, with excited faces below including a bald man and a man in a blue hat, now larger and more prominent in the lower frame. In the background right, another lifted player wearing the same football outfit is emotionally covering their face. The scene is full of dynamic energy, hands, bracelets, and pure joy, with the primary focus on the main subject's face within the scene's natural depth-of-field, and the trophy.

    video_model: v3
    video_mode: pro
    video_duration: 5
    video_ratio: '16:9'
    video_prompt: |
      Handheld camera simulation, dynamic camera shake. The protagonist triumphantly hoists the trophy. The entire stadium erupts in a massive visual cheer: the huge background crowd surges like waves, jumping and waving arms enthusiastically. Countless camera flashes go off continuously like a strobe. Confetti bursts into the air. Immersive and roaring stadium atmosphere. Depth of field keeping the background slightly blurred to maintain generation stability. Hyper-detailed, volumetric lighting.
    video_negative_prompt: |
      logo, badge,  ghosting,  morphing background, blending environments, blurry, Shaking up and down

    concurrent_requests: 3


comments:
  example: |
    nano_banana variant (alternative to the openai_image task above):
      - style_name: 看球賽 (nano)
        folder: Media Files/I2I2V/0520 看球賽 nano
        image_service: nano_banana
        image_model: gemini-3.1-flash-image-preview
        image_resolution: '1K'
        image_aspect_ratio: '16:9'
        image_prompt: |
          ...
        video_model: v3
        video_mode: pro
        video_duration: 5
        video_prompt: |
          ...
        video_negative_prompt: ''

  pipeline: |
    Per source image, the handler runs two API calls:
      1. Image generation via the testbed at `testbed` (default: image_generation),
         using either /nano_banana or /openai_image based on `image_service`.
      2. Video generation via the Kling testbed (kling_endpoint in api_definitions.json),
         using /Image2Video with the freshly generated image.

  resume_behaviour: |
    If `Generated_Frames/{source_name}_image.{ext}` exists from a prior run,
    the image step is skipped and the existing image is fed to Kling directly.
    Delete the frame to force a re-generation.

  image_service: |
    Per-task selection of which image API to use.
    Options:
      - nano_banana   → Google Gemini Flash / Pro image models
      - openai_image  → OpenAI gpt-image-1 / gpt-image-2

  image_model: |
    nano_banana options:
      - gemini-2.5-flash-image
      - gemini-3-pro-image-preview
      - gemini-3.1-flash-image-preview (default for nano_banana)
    openai_image options:
      - gpt-image-1
      - gpt-image-1.5
      - gpt-image-2 (default for openai_image)

  image_quality: |
    openai_image only.  Options: auto | low | medium | high.  Ignored for nano_banana.

  image_aspect_ratio: |
    Valid options: auto, 1:1, 2:3, 3:2, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9.

  video_model: |
    Kling model. Options: v1.6, v1.5, v2.0-master, v2.1, v2.1-master,
    v2.5-turbo, v2.6, v3 (default).

  video_mode: |
    Kling generation mode. Options: std | pro (default).

  video_duration: |
    Video duration in seconds. Options: 5, 10.  Default: 5.

  concurrent_requests: |
    Shared parallelism cap for both stages (per task, or root-level for all
    tasks). Default: 1 (serial prefetch pipeline). When > 1 (or when a per-stage
    override below is > 1), the handler runs a two-phase concurrent pipeline:
    Phase 1 generates all intermediate frames in parallel, Phase 2 renders all
    videos in parallel. Capped at MAX_CONCURRENT_REQUESTS (10).

  image_concurrency: |
    Optional per-stage override for Phase 1 (image-gen) parallelism. The image
    testbed typically tolerates more concurrency than the Kling video testbed,
    so this can be set higher than video_concurrency. Falls back to
    concurrent_requests, then 1. Capped at 10.

  video_concurrency: |
    Optional per-stage override for Phase 2 (Kling video-gen) parallelism.
    Falls back to concurrent_requests, then 1. Capped at 10.

  output_naming: |
    Intermediate frame:  {source_name}_image.{ext}   in Generated_Frames/
    Final video:          {source_name}.mp4           in Generated_Video/
    Metadata:             {source_name}_metadata.json in Metadata/
