# Available configuration options reference
comments:
  model_version: |
    Model version to use for video generation.
    Options: 'v1.6', 'v2.1', 'v2.5-turbo'
    Default: 'v2.1' if not specified.
    Can be set globally or per-task.
  mode: |
    Generation mode for video quality.
    Options: 'std' (standard, faster) or 'pro' (professional, higher quality)
    Default: 'std'
  duration: |
    Video duration in seconds.
    Options: 5, 10
    Default: 5
  cfg: |
    CFG scale (Classifier Free Guidance).
    Range: 0.0 - 1.0
    Higher values = more adherence to prompt, less creative freedom.
    Default: 0.5
  prompt: |
    Text description of desired video motion and content.
    Should describe the action, movement, and visual style.
  negative_prompt: |
    Elements to avoid in the generated video.
    Helps prevent unwanted artifacts or style elements.
  design_link: |
    URL to design reference document (e.g., Google Slides, Figma).
    Used for report generation and reference.
  source_video_link: |
    URL to source video files (e.g., OneDrive, Google Drive).
    Used for report generation and reference.
  reference_folder: |
    Path to folder containing reference images for comparison.
    Optional - used when use_comparison_template is true.
  use_comparison_template: |
    Set to true to use comparison_template_path (3 placeholders: source, reference, output).
    Set to false to use template_path (2 placeholders: source, output).
  group_tasks_by: |
    Set to 0 (or omit) to create individual reports per task.
    Set to N to group N tasks into one combined report.
    Example: with 8 tasks and group_tasks_by=4, creates 2 reports.
  schedule: |
    start_time: HH:MM (24-hour format). Leave empty to start immediately.
    Allows delayed start for batch processing.
  folder_structure: |
    Each task folder should have 'Source', 'Generated_Video', and 'Metadata' subfolders.
    Source folder contains input images to be animated.

tasks:
- mode: std
  folder: Media Files/Kling 2.5/1226 Send flower v2
  prompt: |
    A soft and romantic two-person interaction that maintains the original facial features, outfits, and body proportions. Person A reaches behind their back, retrieves a red rose from behind them with a smooth, stable motion, and brings it forward while clearly holding it in their hand before offering it to Person B.After the rose is handed over, both characters pause and remain still for a brief, clear moment to look at the rose together. Person B shows a visible, gentle expression of happiness and emotional joy while holding the rose. This “seeing the rose” moment must last for several frames and should not immediately transition into kissing.After this extended moment of shared attention on the rose, Person B continues to move closer, and both characters advance until their lips make clear, full contact. The kiss must be fully completed with visible lip overlap and several frames of held contact—never stopping before touching and never cutting away. The entire movement should remain slow, natural, and emotionally expressive. After the kiss, their foreheads rest together in a tender moment.The background remains identical to the uploaded image, with no scene changes or camera movement.
  negative_prompt: |
    Face alteration, gender alteration, hairstyle changes, outfit inconsistencies, and body proportion changes.Additional people, duplicated characters, extra limbs, missing limbs, and abnormal anatomy.Hand or finger clipping, rose intersecting with hands, arms, clothing, or any objects.Scene replacement, lighting variation, or background mismatch.Flicker, jitter, noise, distortion, unnatural or exaggerated motion.Camera movement, zooming, added objects, added effects.Jump cuts, editing seams, frame breaks, timeline misalignment, abrupt transitions, motion interruption, loss of smooth continuity.
  design_link: https://docs.google.com/presentation/d/1eIN91u_qLFNSW0n4XrXy8s7x9NjXIH4D_dibx5bMg0s/edit?slide=id.g3b142bf77d5_0_6#slide=id.g3b142bf77d5_0_6
  source_video_link: https://cyberlinkcorp-my.sharepoint.com/:f:/g/personal/onedrive_qa1_cyberlink_com/IgDQY5WNbA70SI_jyMNl9XGsAYGjN4V1-ovkNTXujUMW-Zg?e=ce8Rrn
  reference_folder: ''
  use_comparison_template: false
