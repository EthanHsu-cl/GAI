tasks:
- mode: pro
  duration: 10
  cfg: 0.5
  folder: Media Files/Kling 3.0/0623 Dominant Kiss
  prompt: |
    The protagonist is suddenly backed up a step as the second person moves in with commanding intensity. The second person raises one arm and plants it firmly beside the protagonist's head — bracing an open palm against a wall, pillar, door frame, tree, or any nearby surface if one is present, or simply caging the protagonist with the forearm in open space — trapping them in a dominant kabedon pose. The second person's posture is confident and possessive, expression serious, intense, and unsmiling. He leans in until their bodies nearly touch and their faces are inches apart, eyes locked in charged, silent tension. The camera moves slowly to a side angle, keeping both profiles clearly in frame. After a brief, breathless pause, the second person closes the final distance and presses into a deep, passionate kiss — lips fully meeting, eyes closing, fully committed.
  negative_prompt: |
    multi-shot, smiling, grinning, laughing, giggling, silly grin, cheerful, happy expression, standing apart, keeping distance, no physical contact, bodies not touching, idle, static, motionless, no action, looking at the camera, posing, missing wall, no wall behind them, empty background, hand not touching the wall, fade in, fade out, deformed face, broken limbs, unnatural posture, glitch, awkward interaction, mismatched body position, wrong camera angle, unnatural kiss, emotionless, stiff pose, anime style, cartoon style, unrealistic lighting, floating characters, extra arms, ghost hands, face change, hairstyle change, sudden fade, dissolve, crossfade, slow transformation, morphing, identity mismatch, cropped face, headless, missing arms, missing fingers, distorted kiss
  design_link: https://docs.google.com/presentation/d/1iuOioBj_19ea4vmuNgX73si78u4ndeY9-xVafa_K_6k/edit?slide=id.g3f230393929_1_0#slide=id.g3f230393929_1_0
  source_video_link: https://cyberlinkcorp-my.sharepoint.com/:f:/g/personal/onedrive_qa1_cyberlink_com/IgBQFd4QBjadRqQBtP1EHRfEATuKcbSAoJilO7aZr51GnYo?e=KWWebn
  reference_folder: ''
  use_comparison_template: false
  concurrent_requests: 3

# Comments and documentation
comments:
  output_directory: |
    Optional: Global output directory for all generated PPTX files.
    Can be overridden per task. Default is current directory.
  testbed: |
    Kling testbed endpoint used for video generation API calls.
  model_version: |
    Model version to use for video generation.
    Options: 'v1.6', 'v1.5', 'v2.0-master', 'v2.1', 'v2.1-master', 'v2.5-turbo', 'v2.6', 'v3'
    Default: 'v2.1' if not specified.
    Can be set globally or per-task.
  mode: |
    Generation mode for video quality.
    Options: 'std' (standard, faster) or 'pro' (professional, higher quality)
    Default: 'std'
  duration: |
    Video duration in seconds.
    Options: 5, 10
    Default: 5
  cfg: |
    CFG scale (Classifier Free Guidance).
    Range: 0.0 - 1.0
    Higher values = more adherence to prompt, less creative freedom.
    Default: 0.5
  prompt: |
    Text description of desired video motion and content.
    Should describe the action, movement, and visual style.
  negative_prompt: |
    Elements to avoid in the generated video.
    Helps prevent unwanted artifacts or style elements.
  design_link: |
    URL to design reference document (e.g., Google Slides, Figma).
    Used for report generation and reference.
  source_video_link: |
    URL to source video files (e.g., OneDrive, Google Drive).
    Used for report generation and reference.
  reference_folder: |
    Path to folder containing reference images for comparison.
    Optional - used when use_comparison_template is true.
  use_comparison_template: |
    Set to true to use comparison_template_path (3 placeholders: source, reference, output).
    Set to false to use template_path (2 placeholders: source, output).
  group_tasks_by: |
    Set to 0 (or omit) to create individual reports per task.
    Set to N to group N tasks into one combined report.
    Example: with 8 tasks and group_tasks_by=4, creates 2 reports.
  schedule: |
    start_time: HH:MM (24-hour format). Leave empty to start immediately.
    Allows delayed start for batch processing.
  folder_structure: |
    Each task folder should have 'Source', 'Generated_Video', and 'Metadata' subfolders.
    Source folder contains input images to be animated.

