# Kling Image-to-Video Configuration
# Generates videos from input images using the Kling testbed.
template_path: templates/I2V templates.pptx
comparison_template_path: templates/I2V Comparison Template.pptx
# Report Output Directory
output_directory: /Users/ethanhsu/Desktop/EthanHsu-cl/GAI/Report
testbed: http://192.168.31.161/external-testbed/kling/
model_version: v3
schedule:
  # Time format: HH:MM (24-hour format). Leave empty to start immediately
  start_time: ''
group_tasks_by: 4

tasks:
- mode: pro
  folder: Media Files/Kling 3.0/0520 看球賽
  prompt: |
    A person sitting in a sports stadium as a fan, wearing a light blue and white vertical striped jersey inspired by Argentine football colors — clean, plain fabric with absolutely no logos, badges, emblems, crests, brand marks, or text of any kind. The person is watching the game with a natural, relaxed expression — calm but quietly engaged, the kind of look someone has when genuinely absorbed in watching a match. Eyes gaze steadily upward and slightly to one side toward the field, never looking at the camera.
    Natural micro-movements throughout the clip: subtle shifts in facial muscle tension as the game unfolds, a barely perceptible tightening of the jaw, occasional slow natural blinks, eyes making tiny unconscious tracking movements following the game, a soft natural swallow, lips slightly parted and relaxed. Hair moves gently and organically from stadium air and very slight head micro-adjustments. Shoulders rise and fall with slow natural breathing. All movements feel completely unstaged and human — the subject is unaware of the camera.
    Camera movement: broadcast-style smooth, continuous, very subtle push-in zoom starting from a medium shot that clearly shows the upper body and jersey. The zoom is extremely gentle and minimal — barely perceptible in real time, only noticeable when comparing the first and last frames. In the final frame, the face occupies no more than 15–18% of the frame, with full upper body still visible. Perfectly smooth, linear, continuous motion — no shakiness, no abrupt cuts, no digital zoom artifacts.
    Lighting remains completely constant and stable throughout — warm stadium floodlight tone, no flickering, no shadow shifting, no exposure changes from start to finish. Background crowd and fans remain softly blurred with consistent bokeh throughout. Shallow depth of field — face always in sharp focus.
    Photorealistic, broadcast TV cinematic quality, 4K, smooth motion.
  negative_prompt: |
    shaky camera, handheld wobble, jump cut, abrupt zoom, fast zoom, aggressive push-in, digital zoom artifacts, extreme close-up, tight close-up, flickering light, shadow change, exposure shift, frozen expression, mannequin-like stillness, posed look, stiff face, over-acting, cheering, laughing, crying, sudden movement, head turning sharply, looking at camera, distorted face, low quality, watermark, logo, badge, emblem, brand mark, national crest, text on jersey, any symbol on jersey
  design_link: https://docs.google.com/presentation/d/1-e6NLHCk6MQ7gbBdVuJyRU0IQSA6o6HBFdpvqXLUXjQ/edit?slide=id.g3e36c7d2e7a_9_0#slide=id.g3e36c7d2e7a_9_0
  source_video_link: 
  reference_folder: ''
  use_comparison_template: false

# Comments and documentation
comments:
  output_directory: |
    Optional: Global output directory for all generated PPTX files.
    Can be overridden per task. Default is current directory.
  testbed: |
    Kling testbed endpoint used for video generation API calls.
  model_version: |
    Model version to use for video generation.
    Options: 'v1.6', 'v1.5', 'v2.0-master', 'v2.1', 'v2.1-master', 'v2.5-turbo', 'v2.6', 'v3'
    Default: 'v2.1' if not specified.
    Can be set globally or per-task.
  mode: |
    Generation mode for video quality.
    Options: 'std' (standard, faster) or 'pro' (professional, higher quality)
    Default: 'std'
  duration: |
    Video duration in seconds.
    Options: 5, 10
    Default: 5
  cfg: |
    CFG scale (Classifier Free Guidance).
    Range: 0.0 - 1.0
    Higher values = more adherence to prompt, less creative freedom.
    Default: 0.5
  prompt: |
    Text description of desired video motion and content.
    Should describe the action, movement, and visual style.
  negative_prompt: |
    Elements to avoid in the generated video.
    Helps prevent unwanted artifacts or style elements.
  design_link: |
    URL to design reference document (e.g., Google Slides, Figma).
    Used for report generation and reference.
  source_video_link: |
    URL to source video files (e.g., OneDrive, Google Drive).
    Used for report generation and reference.
  reference_folder: |
    Path to folder containing reference images for comparison.
    Optional - used when use_comparison_template is true.
  use_comparison_template: |
    Set to true to use comparison_template_path (3 placeholders: source, reference, output).
    Set to false to use template_path (2 placeholders: source, output).
  group_tasks_by: |
    Set to 0 (or omit) to create individual reports per task.
    Set to N to group N tasks into one combined report.
    Example: with 8 tasks and group_tasks_by=4, creates 2 reports.
  schedule: |
    start_time: HH:MM (24-hour format). Leave empty to start immediately.
    Allows delayed start for batch processing.
  folder_structure: |
    Each task folder should have 'Source', 'Generated_Video', and 'Metadata' subfolders.
    Source folder contains input images to be animated.

