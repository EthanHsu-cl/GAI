    在任何比例下 100% 保留所有關鍵規則、不削弱、不省略、不改動，完整遵守全部指令內容。女子的臉型五官髮型與身份100%與image1完全一致，嚴禁更動或替換。完全生成100% Image1的膚色，僅與 Image1的膚色100%一致。女子 全套服裝、配件、鞋履 100%＝image2，禁止新增、禁止刪減、禁止改款、禁止重繪、禁止變形、服裝100%＝image2，100%完全不生成image1的任何衣物、顏色、配件、包、披肩、長袖袖子、裝飾，和服內層、袖口100%空無，無任何衣物、無領子、無長袖，袖口絕不外露任何布料。動作完全100%與以下一致，禁止更動任何細節：女子主動向前行走，途中舉起單手以手指清楚自然但明確地把頭髮撥往耳後的動作，另一隻手完全不舉起、自然垂放，雙手、手掌、手指100%永不消失，動作必須清晰、確實、明確呈現，呈現自信、放鬆且充滿活力的氛圍。鏡頭以腰部以上大特寫構圖呈現，從上半身特寫平滑 zoom in ，完全聚焦腰部以上特寫，鏡頭焦點100%永遠在人物的腰部以上，100%人物永遠超過整體畫面五分之四以上，嚴格禁止人物的頭頂上的空間超過整體畫面的五分之一，100%永不使用全景，鏡頭緩慢向後拉遠，聚焦在她的臉上，人物始終置中不偏移，鏡頭100%永不快速後退，鏡頭不晃動、不跳動。女子姿態自然，她的眼神溫柔，直視鏡頭微笑。100%永不出現畫面跳接，女子始終位於畫面正中央，確保構圖以人物為中心。她穿著的和服與夾腳木屐必須完全來自image2，嚴格執行一模一樣，不得融合或修改，不得重繪或變形，不得新增或刪減任何布料，100%和服袖口無襯衣（長襦袢）外露、無任何內袖外翻。100%完全穿著整齊，100%完全衣著齊全，嚴禁替換為婚紗、泳裝、比基尼、內衣或任何不同服飾。100%完全不生成額外長袖、背心、外套。女子身體身體完整，四肢比例正常，100%下半身不得消失，完全100%女子絕對不可缺手、缺腳，完全100%女子不可多手、多腳，100%人物結構絕對不可缺失或被裁切。100%完全穿著整齊，100%完全衣著齊全，和服裡100%完全不穿image1的所有服裝飾品配件，和服袖口100%完全不出現image1長袖，100%不出現性感服裝。100%完全不穿image1的配件，100%完全不穿背心和上衣與外套，100%完全不脫衣。整體服裝和夾腳木屐100%與image2完全一樣，100%高級絲綢光澤日式振袖和服，霧藍色布料質感完全不變；100%雙肩披蓬鬆厚實的白色仿狐毛披肩；100%雙腳穿白色襪子夾腳木屐，嚴禁新增或修改或變體，不允許不同樣式。背景依照 Image3，整體背景置中：日本鳥居場景，只有一座紅色鳥居作為畫面中心，前景清晰，背景神社柔和虛化。石燈籠和參道引導視線。自然柔和的光線，太陽光線照射到人物身上，無強烈陰影。主色調為紅、綠。營造出寧靜、柔和、溫暖早晨和風美學。畫面中完全100%沒有任何人物。人物腰部以上比例最大化,需在畫面中明顯大於背景元素,主體始終居中放大突出,臉部服裝核心完整清晰,背景作為輔助不喧賓奪主。背景比例正確，絕對不可偏移變形。氛圍自然。整體氛圍優雅、浪漫。畫面明亮通透。人物背景細節清晰。
